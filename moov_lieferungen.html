<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOOV Lieferanten</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F7F7F5;--sur:#fff;--sur2:#F2F2F0;--bd:#E8E8E6;--bds:#CECECE;--tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;--teal:#1D9E75;--green:#059669;--red:#DC2626;--amber:#D97706;--blue:#2563EB;}
html,body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:960px;margin:0 auto;padding:22px 18px 60px;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap;}
.hdr-sub{font-size:12px;color:var(--tx2);margin-top:4px;}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 13px;border-radius:9px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .13s;}
.btn:hover{border-color:var(--bds);color:var(--tx);background:var(--sur2);}
.bp{background:var(--teal);border-color:var(--teal);color:#fff;}
.bp:hover{background:#168a64;border-color:#168a64;color:#fff;}
.bsm{font-size:11px;padding:4px 10px;border-radius:7px;}
.bd{color:var(--red);border-color:rgba(220,38,38,.2);background:#FEE2E2;}
.ba{color:var(--amber);border-color:rgba(217,119,6,.22);background:#FEF3C7;}
.oc{background:var(--sur);border:1px solid var(--bd);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 18px 12px;background:var(--sur2);}
.scard{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;}
.slbl2{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px;}
.sval{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--tx);}
.ssub{font-size:11px;color:var(--tx2);margin-top:1px;}
.cg{color:var(--green);}.cr{color:var(--red);}.ca{color:var(--amber);}
.alrt{margin:0 18px 8px;border-radius:9px;padding:9px 13px;font-size:12px;background:#FEE2E2;border:1px solid rgba(220,38,38,.2);color:var(--red);}
.sw{padding:0 18px 14px;}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:11px 0 7px;cursor:pointer;}
.slbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);}
.dc{background:var(--sur);border:1px solid var(--bd);border-radius:10px;margin-bottom:7px;overflow:hidden;}
.dcw{border-color:rgba(220,38,38,.28);}
.dco{border-color:rgba(5,150,105,.2);}
.boxrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;flex-wrap:wrap;}
.chip{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block;margin-right:3px;}
.cg2{background:#D1FAE5;color:var(--green);}
.cr2{background:#FEE2E2;color:var(--red);}
.ca2{background:#FEF3C7;color:var(--amber);}
.cb2{background:#DBEAFE;color:var(--blue);}
.pt{width:100%;border-collapse:collapse;}
.pt th{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:6px 9px;text-align:left;border-bottom:1px solid var(--bd);}
.pt td{font-size:12px;padding:8px 9px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.pt tbody tr:last-child td{border-bottom:none;}
.pt tbody tr:hover td{background:var(--sur2);}
.badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;}
.bg{background:#D1FAE5;color:var(--green);}
.bb{background:#DBEAFE;color:var(--blue);}
.br{background:#FEE2E2;color:var(--red);}
.ba2{background:#FEF3C7;color:var(--amber);}
.b5{background:var(--sur2);color:var(--tx3);}
.ib{width:26px;height:26px;border-radius:6px;border:1px solid var(--bd);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx2);transition:all .12s;}
.ib:hover{background:var(--sur2);border-color:var(--bds);}
.ibp{color:var(--green);border-color:rgba(5,150,105,.25);}
.ibp:hover{background:#D1FAE5;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(3px);}
.modal{background:var(--sur);border-radius:15px;padding:22px;width:100%;max-width:460px;box-shadow:0 4px 14px rgba(0,0,0,.09);border:1px solid var(--bd);max-height:90vh;overflow-y:auto;}
.mh{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:14px;letter-spacing:-.02em;}
.ml{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin:10px 0 4px;}
.ml:first-child{margin-top:0;}
.mi{width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:9px;padding:8px 11px;outline:none;transition:border-color .15s;}
.mi:focus{border-color:var(--teal);background:#fff;}
.mbtns{display:flex;gap:7px;margin-top:14px;}
.mbtns .btn{flex:1;justify-content:center;padding:9px;}
.mdel{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);}

/* Documents */
.docs-sec{margin-top:12px;padding-top:12px;border-top:1px solid var(--bd);}
.docs-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.docs-title{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sur);border:1px solid var(--bd);border-radius:9px;margin-bottom:5px;transition:all .13s;}
.doc-item:hover{border-color:var(--bds);box-shadow:0 1px 3px rgba(0,0,0,.06);}
.doc-icon{font-size:20px;flex-shrink:0;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-meta{font-size:11px;color:var(--tx3);margin-top:1px;}
.doc-type{font-family:'DM Mono',monospace;font-size:10px;padding:1px 7px;border-radius:20px;font-weight:500;}
.dt-r{background:#DBEAFE;color:#2563EB;}
.dt-z{background:#FEF3C7;color:#D97706;}
.dt-l{background:#D1FAE5;color:#059669;}
.dt-s{background:var(--sur2);color:var(--tx3);}
.doc-actions{display:flex;gap:4px;flex-shrink:0;}
.drop-zone{border:2px dashed var(--bd);border-radius:11px;padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sur2);}
.drop-zone:hover,.drop-zone.drag-active{border-color:var(--teal);background:var(--td);}
.drop-zone-lbl{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:3px;}
.drop-zone-sub{font-size:12px;color:var(--tx2);}
</style>
</head>

function loadState() {
  var keys = [SAVE_KEY].concat(OLD_KEYS);
  for (var i=0;i<keys.length;i++) {
    try {
      var raw = localStorage.getItem(keys[i]);
      if (!raw) continue;
      var p = JSON.parse(raw);
      if (!p) continue;
      if (!p.orders && p.deliveries) {
        var c = p.contract||{};
        p = {orders:[{id:'o1',ref:c.ref||'PF0037',supplier:c.supplier||'NRSH GmbH',currency:c.currency||'EUR',
          deliveries:p.deliveries.map(function(d){
            return {id:d.id,name:d.name,deliveryDate:d.deliveryDate||'',
              stk_ordered:d.boxes_ordered||d.stk_ordered||0,
              stk_received:d.boxes_received||d.stk_received||0,
              netPrice:d.netPrice||0,shippingCost:d.shippingCost||0,
              flavors:d.flavors||[],payments:d.payments||[]};
          })}]};
      }
      if (p.orders && p.orders.length) { ST=p; break; }
    } catch(e) {}
  }
  if (!ST) ST = JSON.parse(JSON.stringify(DEF));
  ST.orders.forEach(function(o) {
    if (SEC[o.id+'_o']===undefined) SEC[o.id+'_o']=false;
    if (SEC[o.id+'_d']===undefined) SEC[o.id+'_d']=true;
    if (SEC[o.id+'_p']===undefined) SEC[o.id+'_p']=true;
  });
}

// ---- INDEXEDDB FOR FILE STORAGE ----
var _DB = null;
function openDB() {
  return new Promise(function(res, rej) {
    if (_DB) { res(_DB); return; }
    var r = indexedDB.open('moov_docs_v1', 1);
    r.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('docs')) {
        db.createObjectStore('docs', {keyPath:'id'});
      }
    };
    r.onsuccess = function(e) { _DB = e.target.result; res(_DB); };
    r.onerror = function(e) { rej(e); };
  });
}
function dbSaveFile(rec) {
  return openDB().then(function(db) {
    return new Promise(function(res, rej) {
      var tx = db.transaction(['docs'], 'readwrite');
      tx.objectStore('docs').put(rec).onsuccess = function() { res(); };
      tx.onerror = function(e) { rej(e); };
    });
  });
}
function dbLoadFile(id) {
  return openDB().then(function(db) {
    return new Promise(function(res, rej) {
      var tx = db.transaction(['docs'], 'readonly');
      var req = tx.objectStore('docs').get(id);
      req.onsuccess = function() { res(req.result); };
      req.onerror = function(e) { rej(e); };
    });
  });
}
function dbDeleteFile(id) {
  return openDB().then(function(db) {
    return new Promise(function(res, rej) {
      var tx = db.transaction(['docs'], 'readwrite');
      tx.objectStore('docs').delete(id).onsuccess = function() { res(); };
      tx.onerror = function(e) { rej(e); };
    });
  });
}

// Open document in new tab
function viewDoc(attId) {
  dbLoadFile(attId).then(function(att) {
    if (!att) { alert('Datei nicht gefunden.'); return; }
    var blob = new Blob([att.data], {type: att.mimeType||'application/pdf'});
    var url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
  }).catch(function(e) { alert('Fehler beim Laden: '+e.message); });
}

    '<select class="mi" id="doc-type">' +

    '<div class="drop-zone" id="doc-drop">' +
    '<div class="drop-zone-lbl">&#x1F4C4; PDF hier ablegen</div>' +
    '<div class="drop-zone-sub">oder klicken zum Auswählen</div>' +
    '</div>' +
    '<input type="file" id="doc-file-input" accept=".pdf,application/pdf" style="display:none">' +
    '</div>' +
    '<div id="doc-upload-status"></div>';
  openM('Dokument hinzufügen', body.innerHTML, {t:'add-doc', oid:oid, did:did});
  // Wire up events after modal is in DOM
  setTimeout(function() {
    var drop = document.getElementById('doc-drop');
    var input = document.getElementById('doc-file-input');
    if (drop) {
      drop.addEventListener('click', function() { if(input) input.click(); });
      drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('drag-active'); });
      drop.addEventListener('dragleave', function() { drop.classList.remove('drag-active'); });
      drop.addEventListener('drop', function(e) {
        e.preventDefault(); drop.classList.remove('drag-active');
        var f = e.dataTransfer.files[0]; if(f) processDocFile(f, oid, did);
      });
    }
    if (input) {
      input.addEventListener('change', function() {
        var f = input.files[0]; if(f) processDocFile(f, oid, did); input.value='';
      });
    }
    var saveBtn = document.getElementById('modal') && document.getElementById('modal').querySelector('.btn-p');
    if (saveBtn) { saveBtn.textContent = 'Warte auf Datei...'; saveBtn.disabled = true; saveBtn.style.opacity = '0.5'; }
  }, 50);
}

function processDocFile(file, oid, did) {
  if (file.size > 10 * 1024 * 1024) {
    var s = document.getElementById('doc-upload-status');
    if (s) s.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:8px;">Datei zu gross (max. 10 MB)</div>';
    return;
  }
  var nameEl = document.getElementById('doc-name');
  if (nameEl && !nameEl.value) nameEl.value = file.name.replace(/\.pdf$/i, '');
  var status = document.getElementById('doc-upload-status');
  if (status) status.innerHTML = '<div style="font-size:12px;color:var(--teal);margin-top:8px;">&#x2714; ' + esc(file.name) + ' (' + fmtSize(file.size) + ')</div>';
  var saveBtn = document.getElementById('modal') && document.getElementById('modal').querySelector('.btn-p');
  if (saveBtn) { saveBtn.textContent = 'Speichern'; saveBtn.disabled = false; saveBtn.style.opacity = '1'; }
  var drop = document.getElementById('doc-drop');
  if (drop) drop.innerHTML = '<div class="drop-zone-lbl">&#x2714; ' + esc(file.name) + '</div><div class="drop-zone-sub">' + fmtSize(file.size) + '</div>';
  window._pendingDocFile = {file: file, oid: oid, did: did};
}

function saveDocFile() {
  var pending = window._pendingDocFile;
  if (!pending) return Promise.resolve();
  return new Promise(function(res, rej) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var attId = uid();
      var nameEl = document.getElementById('doc-name');
      var typeEl = document.getElementById('doc-type');
      var meta = {
        id: attId,
        name: (nameEl && nameEl.value.trim()) || pending.file.name,
        docType: typeEl ? typeEl.value : 'sonstiges',
        date: todayStr(),
        size: pending.file.size,
        mimeType: pending.file.type || 'application/pdf'
      };
      dbSaveFile({id: attId, data: e.target.result, mimeType: meta.mimeType}).then(function() {
        // Add metadata to delivery
        var d = findDelivery(pending.oid, pending.did);
        if (d) {
          if (!d.attachments) d.attachments = [];
          d.attachments.push(meta);
        }
        window._pendingDocFile = null;
        res(meta);
      }).catch(rej);
    };
    reader.readAsArrayBuffer(pending.file);
  });
}

function deleteDoc(attId, oid, did) {
  if (!confirm('Dokument löschen?')) return;
  dbDeleteFile(attId);
  var d = findDelivery(oid, did);
  if (d && d.attachments) {
    d.attachments = d.attachments.filter(function(a) { return a.id !== attId; });
  }
  sv(); render();
}

function uid() { return 'x'+Date.now()+Math.floor(Math.random()*9999); }
function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fd(d) { if(!d)return'-'; var p=d.split('-'); return p.length===3?p[2]+'.'+p[1]+'.'+p[0]:d; }
function fa(n,cur) { return (cur||'EUR')+String.fromCharCode(160)+(parseFloat(n)||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function todayStr() { return new Date().toISOString().split('T')[0]; }

// KEY helper: build data attribute string (no quote issues!)
function da(action, args) {
  return ' data-a="'+action+'" data-args="'+esc(JSON.stringify(args||[]))+'"';
}

function gs(p) {
  if (p.paidDate) return 'paid';
  var pd=parseFloat(p.amount_paid)||0,am=parseFloat(p.amount)||0;
  if (pd>0&&pd<am) return 'partial';
  if (!p.dueDate) return 'pending';
  var due=new Date(p.dueDate),now=new Date();now.setHours(0,0,0,0);
  if (due<now) return 'overdue';
  var s=new Date();s.setDate(s.getDate()+45);
  if (due<=s) return 'soon';
  return 'pending';
}
var SL={paid:'Bezahlt',partial:'Teilbezahlt',overdue:'Ueberfaellig',soon:'Bald faellig',pending:'Ausstehend'};
var SB={paid:'bg',partial:'bb',overdue:'br',soon:'ba2',pending:'b5'};

function totals(o) {
  var tot=0,paid=0,od=[],up=[];
  o.deliveries.forEach(function(d){
    d.payments.forEach(function(p){
      tot+=parseFloat(p.amount)||0;
      if(p.paidDate) paid+=parseFloat(p.amount)||0;
      if(gs(p)==='overdue') od.push({p:p,dn:d.name});
      if(!p.paidDate&&p.dueDate) up.push(p);
    });
  });
  up.sort(function(a,b){return a.dueDate.localeCompare(b.dueDate);});
  return {tot:tot,paid:paid,od:od,nxt:up[0]||null,
    hasUnpaid:o.deliveries.some(function(d){return(parseFloat(d.netPrice)||0)>0&&(!d.payments||d.payments.length===0);}),
    open:(function(){var v=tot-paid;o.deliveries.forEach(function(d){if((parseFloat(d.netPrice)||0)>0&&(!d.payments||d.payments.length===0))v+=parseFloat(d.netPrice)||0;});return v;})(),
    pct:(function(){var v=tot-paid;o.deliveries.forEach(function(d){if((parseFloat(d.netPrice)||0)>0&&(!d.payments||d.payments.length===0))v+=parseFloat(d.netPrice)||0;});var vt=paid+v;return vt>0?paid/vt*100:0;})()
  };
}

function fO(id){for(var i=0;i<ST.orders.length;i++)if(ST.orders[i].id===id)return ST.orders[i];return null;}
function fD(oid,did){var o=fO(oid);if(!o)return null;for(var i=0;i<o.deliveries.length;i++)if(o.deliveries[i].id===did)return o.deliveries[i];return null;}
function fP(d,pid){for(var i=0;i<d.payments.length;i++)if(d.payments[i].id===pid)return d.payments[i];return null;}

// Click dispatcher - all actions use data attributes, no inline onclick quote issues
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-a]');
  if (!el) return;
  e.stopPropagation();
  e.preventDefault();
  var action = el.getAttribute('data-a');
  var args = [];
  try { args = JSON.parse(el.getAttribute('data-args')||'[]'); } catch(ex) { console.error('args parse error', ex); }
  dispatch(action, args);
});

function dispatch(action, args) {
  var fns = {
    'toggleSec': function(a) { SEC[a[0]]=!SEC[a[0]]; render(); },
    'toggleDel': function(a) { OPEN[a[0]]=!OPEN[a[0]]; render(); },
    'qpay':      function(a) { var d=fD(a[0],a[1]),p=d&&fP(d,a[2]);if(!p)return;var dt=prompt('Bezahlt am (JJJJ-MM-TT):',todayStr());if(dt===null)return;p.paidDate=dt||todayStr();p.amount_paid=p.amount;render(); },
    'unpay':     function(a) { if(!confirm('Zahlung rueckgaengig?'))return;var d=fD(a[0],a[1]),p=d&&fP(d,a[2]);if(p){p.paidDate='';p.amount_paid=0;render();} },
    'delOrder':  function(a) { if(!confirm('Bestellung loeschen?'))return;ST.orders=ST.orders.filter(function(x){return x.id!==a[0];});render(); },
    'delDel':    function(a) { if(!confirm('Teillieferung loeschen?'))return;var o=fO(a[0]);if(o)o.deliveries=o.deliveries.filter(function(x){return x.id!==a[1];});render(); },
    'splitDel':  function(a) {
      var o=fO(a[0]),d=fD(a[0],a[1]);if(!o||!d)return;
      var stk=parseInt(d.stk_ordered)||0;
      var s1=prompt('Stk fuer Teil A:',Math.floor(stk/2));if(s1===null)return;
      var nd=JSON.parse(JSON.stringify(d));nd.id=uid();nd.name=d.name+' B';nd.stk_ordered=stk-(parseInt(s1)||stk);nd.stk_received=0;nd.payments=[];
      d.stk_ordered=parseInt(s1)||stk;
      var idx=o.deliveries.indexOf(d);o.deliveries.splice(idx+1,0,nd);render();
    },
    'editOrder': function(a) { openEditOrder(a[0]); },
    'addDel':    function(a) { openAddDel(a[0]); },
    'editDel':   function(a) { openEditDel(a[0],a[1]); },
    'boxes':     function(a) { openBoxes(a[0],a[1]); },
    'addPay':    function(a) { openAddPay(a[0],a[1]); },
    'editPay':   function(a) { openEditPay(a[0],a[1],a[2]); },
    'addFlav':   function(a) { openAddFlav(a[0],a[1]); },
    'editFlavs': function(a) { openEditFlavs(a[0],a[1]); },
    'openAddDoc': function(a) { openAddDoc(a[0],a[1]); },
    'viewDoc':    function(a) { viewDoc(a[0]); },
    'deleteDoc':  function(a) { deleteDoc(a[0],a[1],a[2]); }
  };
  if (fns[action]) fns[action](args);
}

  if (!html) html = '<div style="text-align:center;padding:40px;color:#9CA3AF;">Noch keine Bestellungen.</div>';
  document.getElementById('orders').innerHTML = html;
}

function buildOrder(o) {
  var t=totals(o), cur=o.currency||'EUR';
  var isOpen=!!SEC[o.id+'_o'];
  var dOpen=!!SEC[o.id+'_d'];
  var pOpen=!!SEC[o.id+'_p'];

  var sChip='';
  if(t.od.length)sChip=chip('cr2',t.od.length+' Ueberfaellig');
  else if(t.pct>=100&&!t.hasUnpaid&&t.paid>0)sChip=chip('cg2','Vollst. bezahlt');
  else if(t.hasUnpaid||t.open>0)sChip=chip('ca2','Zahlung offen');
  var nxt=t.nxt?fa(t.nxt.amount,cur)+' am '+fd(t.nxt.dueDate):'Keine offen';
  var bc=t.od.length?'#DC2626':(t.pct>=100&&!t.hasUnpaid)?'#059669':'#D97706';

  var hdr='<div'+da('toggleSec',[o.id+'_o'])+' style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:16px 18px 10px;">'+
    '<div style="flex:1;">'+
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'+
        '<span style="font-family:DM Mono,monospace;font-size:11px;font-weight:500;color:#1D9E75;background:rgba(29,158,117,.08);border:1px solid rgba(29,158,117,.2);padding:2px 9px;border-radius:20px;">'+esc(o.ref)+'</span>'+
        '<span style="font-size:15px;font-weight:700;color:#111827;">'+esc(o.supplier||o.ref)+'</span>'+
        sChip+
      '</div>'+
      '<div style="display:flex;gap:14px;margin-top:5px;flex-wrap:wrap;font-size:12px;">'+
        '<span style="color:#6B7280;">Gesamt: <strong style="color:#111827">'+fa(t.tot,cur)+'</strong></span>'+
        '<span style="color:#059669;">Bezahlt: '+fa(t.paid,cur)+' ('+t.pct.toFixed(0)+'%)</span>'+
        '<span style="color:#D97706;">'+nxt+'</span>'+
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:5px;">'+
      '<button class="btn bsm"'+da('editOrder',[o.id])+'>Bearbeiten</button>'+
      '<button class="btn bsm bd"'+da('delOrder',[o.id])+'>&#x1F5D1;</button>'+
    '</div>'+
    '<div style="font-size:10px;color:#9CA3AF;padding:4px;'+(isOpen?'transform:rotate(180deg);':'')+'">&#x25BC;</div>'+
  '</div>'+
  '<div'+da('toggleSec',[o.id+'_o'])+' style="padding:0 18px 10px;cursor:pointer;">'+
    '<div style="height:5px;background:#EAEAE8;border-radius:20px;overflow:hidden;"><div style="height:100%;border-radius:20px;background:'+bc+';width:'+t.pct.toFixed(1)+'%;"></div></div>'+
  '</div>';

  if (!isOpen) return '<div class="oc">'+hdr+'</div>';

  // Alerts
  var alrts='';
  t.od.forEach(function(x){
    alrts+='<div class="alrt">(!) <strong>'+esc(x.p.ref)+'</strong> &ndash; '+esc(x.dn)+': '+fa(x.p.amount,cur)+' faellig am '+fd(x.p.dueDate)+(x.p.notes?' ('+esc(x.p.notes)+')':'')+'</div>';
  });

  // Deliveries
  var dels='';
  o.deliveries.forEach(function(d){ dels+=buildDel(o,d); });

  // Payments flat
  var apays=[];
  o.deliveries.forEach(function(d){ d.payments.forEach(function(p){ apays.push({p:p,dn:d.name,did:d.id,oid:o.id}); }); });
  apays.sort(function(a,b){return (a.p.dueDate||'').localeCompare(b.p.dueDate||'');});
  var prows='';
  apays.forEach(function(x){
    var p=x.p,s=gs(p),ac=s==='overdue'?'cr':s==='paid'?'cg':'';
    var ph=parseFloat(p.amount_paid)>0&&!p.paidDate?'<div style="font-size:10px;color:#6B7280;">davon: '+fa(p.amount_paid,cur)+'</div>':'';
    var pb=p.paidDate?'<button class="ib"'+da('unpay',[x.oid,x.did,p.id])+'>&#x21A9;</button>':'<button class="ib ibp"'+da('qpay',[x.oid,x.did,p.id])+'>&#x2713;</button>';
    prows+='<tr>'+
      '<td style="font-family:DM Mono,monospace;font-size:10px;color:#9CA3AF;white-space:nowrap;">'+esc(p.ref||'-')+'</td>'+
      '<td><div style="font-weight:500;color:#111827;">'+esc(p.desc)+'</div>'+(p.notes?'<div style="font-size:11px;color:#6B7280;">'+esc(p.notes)+'</div>':'')+'<div style="font-size:10px;color:#9CA3AF;">'+esc(x.dn)+'</div></td>'+
      '<td><div style="color:#6B7280;">'+fd(p.dueDate)+'</div>'+(p.paidDate?'<div style="font-size:10px;color:#059669;">'+fd(p.paidDate)+'</div>':'')+'</td>'+
      '<td><span class="badge '+SB[s]+'">'+SL[s]+'</span></td>'+
      '<td style="text-align:right;"><div class="'+ac+'" style="font-family:DM Mono,monospace;font-size:12px;font-weight:600;">'+fa(p.amount,cur)+'</div>'+ph+'</td>'+
      '<td><div style="display:flex;gap:3px;">'+pb+'<button class="ib"'+da('editPay',[x.oid,x.did,p.id])+'>&#x270F;</button></div></td>'+
    '</tr>';
  });

  return '<div class="oc">'+hdr+
    '<div style="border-top:1px solid #E8E8E6;">'+
      '<div class="sum-row">'+
        sc('Gesamt',fa(t.tot,cur),(o.totalUnits||0).toLocaleString('de-CH')+' Stk','') +
        sc('Bezahlt',fa(t.paid,cur),t.pct.toFixed(1)+'%','cg') +
        sc('Offen',fa(t.open,cur),(100-t.pct).toFixed(1)+'%','cr') +
        sc('Naechste',t.nxt?fa(t.nxt.amount,cur):'-',t.nxt?fd(t.nxt.dueDate)+' &middot; '+esc(t.nxt.ref||''):'','ca') +
      '</div>'+
      alrts+
      '<div class="sw">'+
        '<div class="shdr"'+da('toggleSec',[o.id+'_d'])+'>'+
          '<div class="slbl">Teillieferungen ('+o.deliveries.length+')</div>'+
          '<div style="display:flex;gap:6px;">'+
            '<button class="btn bsm bp"'+da('addDel',[o.id])+'>+ Teillieferung</button>'+
          '</div>'+
        '</div>'+
        (dOpen?'<div>'+dels+'</div>':'')+
      '</div>'+
      '<div class="sw" style="border-top:1px solid #E8E8E6;">'+
        '<div class="shdr"'+da('toggleSec',[o.id+'_p'])+'>'+
          '<div class="slbl">Zahlungsplan ('+apays.length+' Eintraege)</div>'+
        '</div>'+
        (pOpen&&prows?'<div style="overflow-x:auto;"><table class="pt"><thead><tr><th>Ref.</th><th>Beschreibung</th><th>Faellig</th><th>Status</th><th style="text-align:right">Betrag</th><th></th></tr></thead><tbody>'+prows+'</tbody></table></div>':'')+
      '</div>'+
    '</div>'+
  '</div>';
}

function buildDocSection(o, d) {
  var atts = d.attachments || [];
  var addBtn = '<button class="btn bsm bp"' + da('openAddDoc',[o.id,d.id]) + ' style="font-size:11px;padding:4px 11px;">&#x1F4CE; Dokument</button>';
  if (!atts.length) {
    return '<div class="docs-sec"><div class="docs-hdr"><div class="docs-title">Dokumente</div>' + addBtn + '</div>' +
      '<div style="font-size:12px;color:var(--tx3);padding:6px 0;">Noch keine Dokumente angehängt.</div></div>';
  }
  var items = atts.map(function(a) {
    return '<div class="doc-item">' +
      '<span class="doc-icon">' + docIcon(a.mimeType) + '</span>' +
      '<div class="doc-info">' +
        '<div class="doc-name">' + esc(a.name) + '</div>' +
        '<div class="doc-meta"><span class="doc-type ' + docTypeClass(a.docType) + '">' + docTypeLabel(a.docType) + '</span>' +
          (a.size ? ' &middot; ' + fmtSize(a.size) : '') +
          (a.date ? ' &middot; ' + fmtDate(a.date) : '') +
        '</div>' +
      '</div>' +
      '<div class="doc-actions">' +
        '<button class="ib" title="Oeffnen"' + da('viewDoc',[a.id]) + '>&#x1F441;</button>' +
        '<button class="ib bd" title="Loeschen"' + da('deleteDoc',[a.id,o.id,d.id]) + '>&#x2715;</button>' +
      '</div>' +
    '</div>';
  }).join('');
  return '<div class="docs-sec"><div class="docs-hdr"><div class="docs-title">Dokumente (' + atts.length + ')</div>' + addBtn + '</div>' + items + '</div>';
}

function buildDel(o, d) {
  var pays=d.payments||[],tot=0;
  pays.forEach(function(p){tot+=parseFloat(p.amount)||0;});
  var od=pays.some(function(p){return gs(p)==='overdue';});
  var ap=pays.length>0&&pays.every(function(p){return!!p.paidDate;})&&!((parseFloat(d.netPrice)||0)>0&&pays.length===0);
  var isO=!!OPEN[d.id];
  var stk=parseInt(d.stk_ordered)||0,rec=parseInt(d.stk_received)||0;
  var pct=stk>0?Math.min(rec/stk*100,100):0;
  var bc=od?'#DC2626':ap?'#059669':'#D97706';
  var cur=o.currency||'EUR';
  var nc=parseFloat(d.netPrice)||0,sc2=parseFloat(d.shippingCost)||0;

  var chips=ap&&d.id!=='d0'?chip('cg2','Bezahlt'):od?chip('cr2','Ueberfaellig'):pays.some(function(p){return gs(p)==='soon';})?chip('ca2','Bald faellig'):'';
  if(rec>0&&stk>0) chips+=chip('cb2',rec.toLocaleString('de-CH')+'/'+stk.toLocaleString('de-CH'));

  // Box progress
  var boxH=stk>0?'<div class="boxrow">'+
    '<div style="flex:1;"><div style="font-size:12px;font-weight:500;margin-bottom:3px;">Wareneingang</div>'+
    '<div style="height:4px;background:#EAEAE8;border-radius:20px;overflow:hidden;margin-bottom:2px;"><div style="height:100%;background:#1D9E75;width:'+pct.toFixed(0)+'%;border-radius:20px;"></div></div>'+
    '<div style="font-size:11px;color:#6B7280;">'+rec.toLocaleString('de-CH')+' von '+stk.toLocaleString('de-CH')+' Stk ('+pct.toFixed(0)+'%)</div></div>'+
    '<button class="btn bsm ba"'+da('boxes',[o.id,d.id])+'>Eingang buchen</button>'+
  '</div>':'';

  // Costs
  var costsH='';
  if(nc||sc2){
    costsH='<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;">';
    if(nc) costsH+='<div style="background:#fff;border:1px solid #E8E8E6;border-radius:7px;padding:4px 10px;font-size:12px;"><span style="color:#6B7280;">Netto </span><span style="font-family:DM Mono,monospace;font-weight:600;">'+fa(nc,cur)+'</span></div>';
    if(sc2) costsH+='<div style="background:#fff;border:1px solid #E8E8E6;border-radius:7px;padding:4px 10px;font-size:12px;"><span style="color:#6B7280;">Versand </span><span style="font-family:DM Mono,monospace;font-weight:600;">'+fa(sc2,cur)+'</span></div>';
    if(nc&&sc2) costsH+='<div style="background:#fff;border:1px solid #E8E8E6;border-radius:7px;padding:4px 10px;font-size:12px;"><span style="color:#6B7280;">Total </span><span style="font-family:DM Mono,monospace;font-weight:600;">'+fa(nc+sc2,cur)+'</span></div>';
    costsH+='</div>';
  }

  // Flavors
  var flavH='';
  if(d.flavors&&d.flavors.length){
    flavH='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">';
    d.flavors.forEach(function(f){ flavH+='<div style="background:#fff;border:1px solid #E8E8E6;border-radius:6px;padding:3px 9px;font-size:12px;"><span style="color:#6B7280;">'+esc(f.name)+'</span> <span style="font-family:DM Mono,monospace;font-weight:600;">'+f.qty+'</span></div>'; });
    flavH+='<button class="btn bsm"'+da('editFlavs',[o.id,d.id])+' style="font-size:10px;padding:2px 7px;">Edit</button></div>';
  }

  // Payment rows
  var prows='';
  pays.forEach(function(p){
    var s=gs(p),ac=s==='overdue'?'cr':s==='paid'?'cg':'';
    var ph=parseFloat(p.amount_paid)>0&&!p.paidDate?'<div style="font-size:10px;color:#6B7280;">davon: '+fa(p.amount_paid,cur)+'</div>':'';
    var pb=p.paidDate?'<button class="ib"'+da('unpay',[o.id,d.id,p.id])+'>&#x21A9;</button>':'<button class="ib ibp"'+da('qpay',[o.id,d.id,p.id])+'>&#x2713;</button>';
    prows+='<tr><td style="font-family:DM Mono,monospace;font-size:10px;color:#9CA3AF;white-space:nowrap;">'+esc(p.ref||'-')+'</td>'+
      '<td><div style="font-weight:500;color:#111827;">'+esc(p.desc)+'</div>'+(p.notes?'<div style="font-size:11px;color:#6B7280;">'+esc(p.notes)+'</div>':'')+'</td>'+
      '<td><div style="color:#6B7280;">'+fd(p.dueDate)+'</div>'+(p.paidDate?'<div style="font-size:10px;color:#059669;">'+fd(p.paidDate)+'</div>':'')+'</td>'+
      '<td><span class="badge '+SB[s]+'">'+SL[s]+'</span></td>'+
      '<td style="text-align:right;"><div class="'+ac+'" style="font-family:DM Mono,monospace;font-size:12px;font-weight:600;">'+fa(p.amount,cur)+'</div>'+ph+'</td>'+
      '<td><div style="display:flex;gap:3px;">'+pb+'<button class="ib"'+da('editPay',[o.id,d.id,p.id])+'>&#x270F;</button></div></td></tr>';
  });

  var dcCls='dc'+(od?' dcw':'')+(ap?' dco':'');
  return '<div class="'+dcCls+'">'+
    '<div style="display:flex;align-items:center;cursor:pointer;"'+da('toggleDel',[d.id])+'>'+
      '<div style="width:3px;align-self:stretch;background:'+bc+';border-radius:3px 0 0 0;flex-shrink:0;"></div>'+
      '<div style="flex:1;display:flex;align-items:center;gap:10px;padding:11px 13px;flex-wrap:wrap;">'+
        '<div style="flex:1;">'+
          '<div style="font-size:13px;font-weight:600;color:#111827;">'+esc(d.name)+'</div>'+
          '<div style="font-size:11px;color:#6B7280;margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;">'+
            (d.deliveryDate?'<span>'+fd(d.deliveryDate)+'</span>':'')+
            (stk?'<span>'+stk.toLocaleString('de-CH')+' Stk</span>':'')+
            (nc?'<span>Netto '+fa(nc,cur)+'</span>':'')+
          '</div>'+
        '</div>'+
        '<div>'+chips+'</div>'+
        '<div style="font-family:DM Mono,monospace;font-size:12px;font-weight:600;color:#111827;">'+fa(tot,cur)+'</div>'+
      '</div>'+
      '<div style="display:flex;gap:3px;padding-right:10px;">'+
        '<button class="ib"'+da('editDel',[o.id,d.id])+'>&#x270F;</button>'+
        '<button class="ib"'+da('splitDel',[o.id,d.id])+' title="Aufteilen">&#x2702;</button>'+
        '<button class="ib"'+da('addPay',[o.id,d.id])+'>+</button>'+
      '</div>'+
      '<div style="font-size:9px;color:#9CA3AF;padding:4px 10px 4px 2px;'+(isO?'transform:rotate(180deg);':'')+'">&#x25BC;</div>'+
    '</div>'+
    '<div style="border-top:1px solid #E8E8E6;padding:12px 13px 13px;background:#F7F7F5;display:'+(isO?'block':'none')+';">'+
      boxH+costsH+flavH+
      (prows?'<div style="overflow-x:auto;margin-top:4px;"><table class="pt"><thead><tr><th>Ref.</th><th>Beschreibung</th><th>Faellig</th><th>Status</th><th style="text-align:right">Betrag</th><th></th></tr></thead><tbody>'+prows+'</tbody></table></div>':'')+
      buildDocSection(o, d) +
      '<div style="display:flex;gap:5px;margin-top:12px;padding-top:10px;border-top:1px solid #E8E8E6;flex-wrap:wrap;">'+
        '<button class="btn bsm"'+da('addPay',[o.id,d.id])+'>+ Zahlung</button>'+
        '<button class="btn bsm"'+da('addFlav',[o.id,d.id])+'>+ Geschmack</button>'+
        '<button class="btn bsm bd" style="margin-left:auto;"'+da('delDel',[o.id,d.id])+'>Loeschen</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// Modal
function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function openM(title,body,ctx,hasDel){CTX=ctx;document.getElementById('mh').textContent=title;document.getElementById('mb').innerHTML=body;document.getElementById('mdel').style.display=hasDel?'block':'none';document.getElementById('modal').style.display='flex';}
function closeModal(){document.getElementById('modal').style.display='none';CTX=null;}

function pf(p){var x=p||{};return fRow('Referenz','mr',x.ref||'')+fRow('Betrag','ma',x.amount||'','number')+fRow('Beschreibung','md',x.desc||'')+fRow('Faellig am','mdu',x.dueDate||'','date')+fRow('Bezahlt am','mp',x.paidDate||'','date')+fRow('Teilzahlung','map',x.amount_paid||0,'number')+fRow('Notiz','mn',x.notes||'');}
function df(d){var x=d||{};return fRow('Name','dn',x.name||'')+fRow('Lieferdatum','dd',x.deliveryDate||'','date')+fRow('Stk bestellt','ds',x.stk_ordered||0,'number')+fRow('Stk angekommen','dr',x.stk_received||0,'number')+fRow('Netto Preis','dnet',x.netPrice||0,'number')+fRow('Versandkosten','dship',x.shippingCost||0,'number');}
function fRow(lbl,id,val,type){return '<label class="ml">'+lbl+'</label><input class="mi" id="'+id+'" type="'+(type||'text')+'" value="'+esc(String(val))+'">';}

function openAddOrder(){openM('Neue Bestellung',fRow('Referenz','oref','PF0038')+fRow('Lieferant','osup','NRSH GmbH')+fRow('Waehrung','ocur','EUR'),{t:'add-order'});}
function openEditOrder(oid){var o=fO(oid);openM('Bestellung bearbeiten',fRow('Referenz','oref',o.ref||'')+fRow('Lieferant','osup',o.supplier||'')+fRow('Waehrung','ocur',o.currency||'EUR'),{t:'edit-order',oid:oid},true);}
function openAddDel(oid){openM('Neue Teillieferung',df(),{t:'add-del',oid:oid});}
function openEditDel(oid,did){var d=fD(oid,did);openM('Teillieferung bearbeiten',df(d),{t:'edit-del',oid:oid,did:did},true);}
function openBoxes(oid,did){var d=fD(oid,did);openM('Wareneingang buchen','<div style="background:#F2F2F0;border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:13px;color:#6B7280;">Bestellt: <strong>'+(d.stk_ordered||0).toLocaleString('de-CH')+' Stk</strong></div>'+fRow('Angekommen total','dr',d.stk_received||0,'number'),{t:'boxes',oid:oid,did:did});}
function openAddPay(oid,did){openM('Zahlung hinzufuegen',pf(),{t:'add-pay',oid:oid,did:did});}
function openEditPay(oid,did,pid){var d=fD(oid,did),p=d&&fP(d,pid);openM('Zahlung bearbeiten',pf(p),{t:'edit-pay',oid:oid,did:did,pid:pid},true);}
function openAddFlav(oid,did){openM('Geschmack hinzufuegen',fRow('Name','fn','')+fRow('Stk','fq',0,'number'),{t:'add-flav',oid:oid,did:did});}
function openEditFlavs(oid,did){
  var d=fD(oid,did),rows='';
  d.flavors.forEach(function(f,i){rows+=fRow(f.name,'ffn'+i,f.name)+fRow('Stk','ffq'+i,f.qty,'number');});
  openM('Geschmacksverteilung',rows,{t:'edit-flavs',oid:oid,did:did});
}

function modalSave(){
  if(!CTX)return;var t=CTX.t;
  if(t==='add-order'){var no={id:uid(),ref:gv('oref'),supplier:gv('osup'),currency:gv('ocur')||'EUR',deliveries:[]};ST.orders.push(no);SEC[no.id+'_o']=false;SEC[no.id+'_d']=true;SEC[no.id+'_p']=true;}
  else if(t==='edit-order'){var o=fO(CTX.oid);if(o){o.ref=gv('oref');o.supplier=gv('osup');o.currency=gv('ocur')||'EUR';}}
  else if(t==='add-del'){var o=fO(CTX.oid);if(o){var nd={id:uid(),name:gv('dn')||'Neue Teillieferung',deliveryDate:gv('dd'),stk_ordered:parseInt(gv('ds'))||0,stk_received:parseInt(gv('dr'))||0,netPrice:parseFloat(gv('dnet'))||0,shippingCost:parseFloat(gv('dship'))||0,flavors:[],payments:[]};o.deliveries.push(nd);}}
  else if(t==='edit-del'){var d=fD(CTX.oid,CTX.did);if(d){d.name=gv('dn')||d.name;d.deliveryDate=gv('dd');d.stk_ordered=parseInt(gv('ds'))||0;d.stk_received=parseInt(gv('dr'))||0;d.netPrice=parseFloat(gv('dnet'))||0;d.shippingCost=parseFloat(gv('dship'))||0;}}
  else if(t==='boxes'){var d=fD(CTX.oid,CTX.did);if(d)d.stk_received=parseInt(gv('dr'))||0;}
  else if(t==='add-pay'){var d=fD(CTX.oid,CTX.did);if(d)d.payments.push({id:uid(),ref:gv('mr'),desc:gv('md'),amount:parseFloat(gv('ma'))||0,amount_paid:parseFloat(gv('map'))||0,dueDate:gv('mdu'),paidDate:gv('mp'),notes:gv('mn')});}
  else if(t==='edit-pay'){var d=fD(CTX.oid,CTX.did),p=d&&fP(d,CTX.pid);if(p){p.ref=gv('mr');p.desc=gv('md');p.amount=parseFloat(gv('ma'))||0;p.amount_paid=parseFloat(gv('map'))||0;p.dueDate=gv('mdu');p.paidDate=gv('mp');p.notes=gv('mn');}}
  else if(t==='add-flav'){var d=fD(CTX.oid,CTX.did);if(d){if(!d.flavors)d.flavors=[];d.flavors.push({name:gv('fn'),qty:parseInt(gv('fq'))||0});}}
  else if(t==='edit-flavs'){var d=fD(CTX.oid,CTX.did);if(d)d.flavors=d.flavors.map(function(f,i){var ne=document.getElementById('ffn'+i),qe=document.getElementById('ffq'+i);return{name:ne?ne.value:f.name,qty:qe?parseInt(qe.value)||f.qty:f.qty};});}
  closeModal();render();
}

function modalDelete(){
  if(!CTX)return;var t=CTX.t;
  if(t==='edit-order'){if(!confirm('Bestellung loeschen?'))return;ST.orders=ST.orders.filter(function(x){return x.id!==CTX.oid;});}
  else if(t==='edit-del'){if(!confirm('Teillieferung loeschen?'))return;var o=fO(CTX.oid);if(o)o.deliveries=o.deliveries.filter(function(x){return x.id!==CTX.did;});}
  else if(t==='edit-pay'){if(!confirm('Zahlung loeschen?'))return;var d=fD(CTX.oid,CTX.did);if(d)d.payments=d.payments.filter(function(x){return x.id!==CTX.pid;});}
  if (t === 'add-doc') {
    var saveBtn = document.getElementById('modal') && document.getElementById('modal').querySelector('.btn-p');
    if (saveBtn) { saveBtn.textContent = 'Speichern...'; saveBtn.disabled = true; }
    saveDocFile().then(function() {
      sv(); closeModal(); render();
    }).catch(function(e) {
      alert('Fehler: ' + e.message);
    });
    return;
  }
  closeModal();render();
}

function resetToDefaults(){if(!confirm('Alle Daten zuruecksetzen?'))return;localStorage.removeItem(SAVE_KEY);ST=JSON.parse(JSON.stringify(DEF));OPEN={};SEC={};loadState();render();}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

// data-stop handled in dispatcher

loadState();
render();

</script>
</body>
