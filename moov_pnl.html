<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOOV P&L Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F7F5;--sur:#fff;--sur2:#F2F2F0;--sur3:#EAEAE8;
  --bd:#E8E8E6;--bds:#CECECE;
  --tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;
  --teal:#1D9E75;--td:rgba(29,158,117,.09);--tb:rgba(29,158,117,.22);
  --green:#059669;--gd:#D1FAE5;
  --red:#DC2626;--rd:#FEE2E2;
  --amber:#D97706;--ad:#FEF3C7;
  --blue:#2563EB;--bld:#DBEAFE;
  --sh:0 1px 3px rgba(0,0,0,.07);--shm:0 4px 14px rgba(0,0,0,.09);
}
html,body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:920px;margin:0 auto;padding:20px 16px 60px;}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--sur2);border-radius:11px;padding:4px;border:1px solid var(--bd);}
.tab{flex:1;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--tx2);cursor:pointer;transition:all .15s;text-align:center;}
.tab.on{background:var(--sur);color:var(--tx);box-shadow:var(--sh);font-weight:600;}
/* VIEWS */
.view{display:none;}.view.on{display:block;}
/* CARDS */
.rc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.rc{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;box-shadow:var(--sh);}
.rc-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px;}
.rc-val{font-size:18px;font-weight:700;letter-spacing:-.02em;}
.rc-sub{font-size:11px;color:var(--tx2);margin-top:2px;}
.rc.pos .rc-val{color:var(--green);}
.rc.neg .rc-val{color:var(--red);}
.rc.amber .rc-val{color:var(--amber);}
/* COST BAR */
.cost-bar-wrap{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:16px;box-shadow:var(--sh);}
.cost-bar-title{font-size:13px;font-weight:600;margin-bottom:8px;}
.cost-bar{height:22px;border-radius:6px;overflow:hidden;display:flex;margin-bottom:8px;}
.cost-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:width .4s;}
#cost-legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--tx2);}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.chart-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:14px;box-shadow:var(--sh);}
.chart-title{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:10px;}
.chart-wrap{height:180px;position:relative;}
/* FORM */
.form-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--sh);}
.wk-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.wk-title{font-size:16px;font-weight:700;letter-spacing:-.02em;}
.inp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.inp-row{display:flex;flex-direction:column;gap:4px;}
.inp-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);}
.inp{width:100%;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:8px;padding:8px 10px;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--teal);background:#fff;}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:7px 14px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;}
.btn:hover{border-color:var(--bds);color:var(--tx);}
.btn-p{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-p:hover{background:#168a64;}
.btn-d{color:var(--red);border-color:rgba(220,38,38,.2);background:rgba(220,38,38,.04);}
/* FIX CHIPS */
.fix-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--sur2);border:1px solid var(--bd);color:var(--tx2);}
/* WEEK SELECT */
.sel-wrap{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.wk-sel{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:var(--sur2);border:1.5px solid var(--bd);border-radius:8px;padding:6px 10px;color:var(--tx);cursor:pointer;outline:none;}
/* HISTORY */
.history-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
.ht{width:100%;border-collapse:collapse;}
.ht th{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd);background:var(--sur2);}
.ht td{font-size:12px;padding:8px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.ht tbody tr:last-child td{border-bottom:none;}
.ht tbody tr:hover td{background:var(--sur2);}
/* SETTINGS */
.sett-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--sh);}
.sett-title{font-size:13px;font-weight:600;margin-bottom:12px;}
.sett-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(3px);}
.modal-box{background:var(--sur);border-radius:14px;padding:22px;width:100%;max-width:420px;box-shadow:var(--shm);}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal-row{margin-bottom:10px;}
.modal-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:4px;}
.modal-inp{width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:8px;padding:8px 10px;outline:none;}
.modal-inp:focus{border-color:var(--teal);}
.modal-btns{display:flex;gap:7px;margin-top:14px;}
.modal-btns .btn{flex:1;justify-content:center;text-align:center;padding:9px;}
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <div>
      <img src="/moov_logo.png" alt="MOOV" style="height:22px;filter:brightness(0);display:block;margin-bottom:3px;">
      <div style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);">P&amp;L Tracker</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-week" onclick="showTab('week')">Diese Woche</button>
    <button class="tab" id="tab-overview" onclick="showTab('overview')">&#x1F4CA; Übersicht</button>
    <button class="tab" id="tab-history" onclick="showTab('history')">Verlauf</button>
    <button class="tab" id="tab-settings" onclick="showTab('settings')">Einstellungen</button>
  </div>

  <!-- WEEK VIEW -->
  <div class="view on" id="view-week">
    <div class="form-card">
      <div class="wk-hdr">
        <div>
          <div class="wk-title" id="week-title">KW —</div>
        </div>
        <div class="sel-wrap">
          <select class="wk-sel" id="week-select" onchange="switchWeek(this.value)"></select>
          <button class="btn btn-p" onclick="openNewWeekModal()">+ KW</button>
        </div>
      </div>
      <div class="inp-grid">
        <div class="inp-row"><label class="inp-lbl">Umsatz (CHF)</label><input class="inp" id="inp-umsatz" type="number" oninput="recalc()"></div>
        <div class="inp-row"><label class="inp-lbl">Bestellungen</label><input class="inp" id="inp-best" type="number" oninput="recalc()"></div>
        <div class="inp-row"><label class="inp-lbl">Artikel</label><input class="inp" id="inp-art" type="number" oninput="recalc()"></div>
        <div class="inp-row"><label class="inp-lbl">Meta Ads (CHF)</label><input class="inp" id="inp-meta" type="number" oninput="recalc()"></div>
        <div class="inp-row"><label class="inp-lbl">Retouren (CHF)</label><input class="inp" id="inp-ret" type="number" oninput="recalc()"></div>
        <div class="inp-row"><label class="inp-lbl">Weitere Kosten</label><input class="inp" id="inp-extra" type="number" oninput="recalc()"></div>
      </div>
      <div style="display:flex;gap:7px;">
        <button class="btn btn-p" onclick="saveWeek()">Woche speichern</button>
        <button class="btn btn-d" onclick="deleteCurrentWeek()">KW löschen</button>
      </div>
    </div>

    <div class="rc-grid" id="result-cards"></div>

    <div class="cost-bar-wrap" id="cost-bar-wrap">
      <div class="cost-bar-title">Kostenstruktur</div>
      <div class="cost-bar" id="cost-bar"></div>
      <div id="cost-legend"></div>
    </div>

    <div id="vs-avg"></div>

    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Umsatz vs. Kosten</div><div class="chart-wrap"><canvas id="chart-umsatz"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">ROAS pro Woche</div><div class="chart-wrap"><canvas id="chart-roas"></canvas></div></div>
    </div>
    <div class="charts-grid" id="extra-charts" style="display:none">
      <div class="chart-card"><div class="chart-title">Nettogewinn pro Woche</div><div class="chart-wrap"><canvas id="chart-gewinn"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">CPA-Verlauf</div><div class="chart-wrap"><canvas id="chart-cpa"></canvas></div></div>
    </div>
    <div class="charts-grid" id="mix-chart" style="display:none">
      <div class="chart-card" style="grid-column:1/-1"><div class="chart-title">Kosten-Mix pro Woche</div><div class="chart-wrap" style="height:220px"><canvas id="chart-mix"></canvas></div></div>
    </div>
  </div>

  <!-- OVERVIEW VIEW -->
  <div class="view" id="view-overview">
    <div id="overview-content"></div>
  </div>

  <!-- HISTORY VIEW -->
  <div class="view" id="view-history">
    <div class="history-card">
      <table class="ht" id="history-table">
        <thead><tr>
          <th>KW</th><th>Umsatz</th><th>Meta</th><th>ROAS</th><th>Gewinn</th><th>Marge</th><th>CPA</th>
        </tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="sett-card">
      <div class="sett-title">Variable Kosten</div>
      <div class="sett-grid">
        <div class="inp-row"><label class="inp-lbl">COGS pro Artikel (CHF)</label><input class="inp" id="s-cogs" type="number" step="0.01"></div>
        <div class="inp-row"><label class="inp-lbl">SVZ pro Bestellung (CHF)</label><input class="inp" id="s-svz" type="number" step="0.01"></div>
        <div class="inp-row"><label class="inp-lbl">Payment Fee (%)</label><input class="inp" id="s-fee" type="number" step="0.1"></div>
      </div>
    </div>
    <div class="sett-card">
      <div class="sett-title">Fixkosten pro Woche</div>
      <div class="sett-grid">
        <div class="inp-row"><label class="inp-lbl">Coworking (CHF/Woche)</label><input class="inp" id="s-cow" type="number" step="0.01"></div>
        <div class="inp-row"><label class="inp-lbl">Shopify (CHF/Woche)</label><input class="inp" id="s-shop" type="number" step="0.01"></div>
      </div>
    </div>
    <button class="btn btn-p" onclick="saveSettings()">Einstellungen speichern</button>
  </div>
</div>

<!-- NEW KW MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">Neue Kalenderwoche</div>
    <div class="modal-row"><label class="modal-lbl">Woche (KW)</label><input class="modal-inp" id="m-kw" type="number" min="1" max="53"></div>
    <div class="modal-row"><label class="modal-lbl">Jahr</label><input class="modal-inp" id="m-year" type="number" value="2026"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-p" onclick="createNewWeek()">Erstellen</button>
    </div>
  </div>
</div>

<script>
var STORE = 'moov_pnl_v2';
var DEF_SETTINGS = {cogs_per_unit:6.00,svz_per_order:10.99,payment_fee_pct:2.8,coworking_weekly:64.62,shopify_weekly:32.31};
var DEF_WEEKS = [
  {id:'ref',kw:'KW 09-18 Ø',year:2026,isRef:true,umsatz:5397,bestellungen:71,artikel:139,meta:1534,retouren:0,extra:0},
  {id:'kw20',kw:'KW 20',year:2026,isRef:false,umsatz:3806,bestellungen:71,artikel:139,meta:1507,retouren:0,extra:0}
];
var DEF_STATE = {settings:DEF_SETTINGS,weeks:DEF_WEEKS,currentId:'kw20',_kwMigrated:true};

var state;
(function(){
  try{var s=localStorage.getItem(STORE);if(s)state=JSON.parse(s);}catch(e){}
  if(!state||!state.weeks){
    // Migrate from old format
    var oldW=null,oldS=null;
    try{oldW=JSON.parse(localStorage.getItem('moov_pnl_w')||'null');}catch(e){}
    try{oldS=JSON.parse(localStorage.getItem('moov_pnl_s')||'null');}catch(e){}
    var weeks=JSON.parse(JSON.stringify(DEF_WEEKS));
    if(oldW&&Array.isArray(oldW)){
      oldW.forEach(function(w){
        if(w&&w.kw){weeks.push({id:'w'+Date.now()+Math.random(),kw:w.kw,year:w.year||2026,isRef:false,
          umsatz:w.umsatz||0,bestellungen:w.bestellungen||0,artikel:w.artikel||0,
          meta:w.meta||0,retouren:w.retouren||0,extra:0});}
      });
    }
    state={settings:oldS?{cogs_per_unit:oldS.cogs||6,svz_per_order:oldS.svz||10.99,payment_fee_pct:oldS.fee_pct||2.8,
      coworking_weekly:oldS.coworking||64.62,shopify_weekly:oldS.shopify||32.31}:JSON.parse(JSON.stringify(DEF_SETTINGS)),
      weeks:weeks,currentId:'kw20'};
  }
  if(!state._kwMigrated){
    state.weeks.forEach(function(w){
      if(!w.isRef){var m=String(w.kw).match(/^KW (\d+)$/);if(m)w.kw='KW '+(parseInt(m[1])-1);}
    });
    state._kwMigrated=true;
    try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}
  }
})();

function save(){try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}
function cf(n){return 'CHF '+(parseFloat(n)||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pf(n){return(parseFloat(n)||0).toFixed(1)+'%';}
function rf(n){return(parseFloat(n)||0).toFixed(2)+'x';}

function calc(w,s){
  var u=parseFloat(w.umsatz)||0,b=parseFloat(w.bestellungen)||0,a=parseFloat(w.artikel)||0;
  var m=parseFloat(w.meta)||0,r=parseFloat(w.retouren)||0,ex=parseFloat(w.extra)||0;
  var cogs=a*(parseFloat(s.cogs_per_unit)||6);
  var svz=b*(parseFloat(s.svz_per_order)||10.99);
  var fee=u*(parseFloat(s.payment_fee_pct)||2.8)/100;
  var cow=parseFloat(s.coworking_weekly)||64.62;
  var sh=parseFloat(s.shopify_weekly)||32.31;
  var fix=cow+sh;
  var total_costs=cogs+svz+fee+fix+m+r+ex;
  var gewinn=u-total_costs;
  var marge=u>0?gewinn/u*100:0;
  var roas=m>0?u/m:0;
  var cpa=b>0?m/b:0;
  return{u:u,b:b,a:a,m:m,r:r,ex:ex,cogs:cogs,svz:svz,fee:fee,cow:cow,sh:sh,fix:fix,
    total_costs:total_costs,gewinn:gewinn,marge:marge,roas:roas,cpa:cpa};
}

// TABS
var currentTab='week';
var chartInstances={umsatz:null,roas:null,gewinn:null,cpa:null,mix:null};
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  document.getElementById('tab-'+t).classList.add('on');
  document.getElementById('view-'+t).classList.add('on');
  if(t==='overview')renderOverview();
  if(t==='history')renderHistory();
  if(t==='settings')renderSettings();
}

// WEEK MANAGEMENT
function getRefWeek(){return state.weeks.filter(function(w){return w.isRef;})[0]||null;}
function getCurrentWeek(){
  return state.weeks.filter(function(w){return w.id===state.currentId;})[0]||
         state.weeks.filter(function(w){return !w.isRef;})[0];
}
function buildSelect(){
  var sel=document.getElementById('week-select');
  if(!sel)return;
  sel.innerHTML='';
  var nonRef=state.weeks.filter(function(w){return !w.isRef;});
  nonRef.forEach(function(w){
    var o=document.createElement('option');
    o.value=w.id;o.textContent=w.kw+' / '+w.year;
    if(w.id===state.currentId)o.selected=true;
    sel.appendChild(o);
  });
}
function switchWeek(id){state.currentId=id;save();renderWeekView();}

function openNewWeekModal(){
  var d=new Date(),dn=d.getDay()||7;d.setDate(d.getDate()+4-dn);
  var ys=new Date(Date.UTC(d.getFullYear(),0,1));
  var wn=Math.ceil(((d-ys)/86400000+1)/7);
  document.getElementById('m-kw').value=wn;
  document.getElementById('m-year').value=new Date().getFullYear();
  document.getElementById('modal').style.display='flex';
  setTimeout(function(){document.getElementById('m-kw').focus();},50);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function createNewWeek(){
  var kw=parseInt(document.getElementById('m-kw').value)||1;
  var year=parseInt(document.getElementById('m-year').value)||2026;
  var exists=state.weeks.filter(function(w){return w.kw==='KW '+kw&&w.year===year&&!w.isRef;});
  if(exists.length){alert('KW '+kw+' / '+year+' existiert bereits.');return;}
  var nw={id:'kw'+kw+'y'+year+'_'+Date.now(),kw:'KW '+kw,year:year,isRef:false,umsatz:0,bestellungen:0,artikel:0,meta:0,retouren:0,extra:0};
  state.weeks.push(nw);state.currentId=nw.id;
  save();closeModal();renderWeekView();
}
function saveWeek(){
  var w=getCurrentWeek();if(!w)return;
  w.umsatz=parseFloat(document.getElementById('inp-umsatz').value)||0;
  w.bestellungen=parseFloat(document.getElementById('inp-best').value)||0;
  w.artikel=parseFloat(document.getElementById('inp-art').value)||0;
  w.meta=parseFloat(document.getElementById('inp-meta').value)||0;
  w.retouren=parseFloat(document.getElementById('inp-ret').value)||0;
  w.extra=parseFloat(document.getElementById('inp-extra').value)||0;
  save();
  var btn=document.querySelector('.btn-p[onclick="saveWeek()"]');
  if(btn){btn.textContent='\u2713 Gespeichert';setTimeout(function(){btn.textContent='Woche speichern';},1500);}
  renderWeekView();
}
function deleteCurrentWeek(){
  var w=getCurrentWeek();if(!w||w.isRef)return;
  if(!confirm('KW '+w.kw+' / '+w.year+' l\u00f6schen?'))return;
  state.weeks=state.weeks.filter(function(x){return x.id!==w.id;});
  var rem=state.weeks.filter(function(x){return !x.isRef;});
  state.currentId=rem.length?rem[rem.length-1].id:'';
  save();renderWeekView();
}

// RENDER WEEK VIEW
function renderWeekView(){
  buildSelect();
  var w=getCurrentWeek();if(!w)return;
  document.getElementById('week-title').textContent=w.kw+' / '+w.year;
  document.getElementById('inp-umsatz').value=w.umsatz||'';
  document.getElementById('inp-best').value=w.bestellungen||'';
  document.getElementById('inp-art').value=w.artikel||'';
  document.getElementById('inp-meta').value=w.meta||'';
  document.getElementById('inp-ret').value=w.retouren||'';
  document.getElementById('inp-extra').value=w.extra||'';
  var c=calc(w,state.settings);
  updateResultCards(c);updateFixChips(c);updateCostBar(c);updateVsAvg(c);
  var nw=state.weeks.filter(function(x){return !x.isRef;}).length;
  var ec=document.getElementById('extra-charts');
  var mc=document.getElementById('mix-chart');
  if(ec)ec.style.display=nw>=2?'grid':'none';
  if(mc)mc.style.display=nw>=2?'grid':'none';
  renderCharts();
}

function recalc(){
  var w={umsatz:parseFloat(document.getElementById('inp-umsatz').value)||0,
    bestellungen:parseFloat(document.getElementById('inp-best').value)||0,
    artikel:parseFloat(document.getElementById('inp-art').value)||0,
    meta:parseFloat(document.getElementById('inp-meta').value)||0,
    retouren:parseFloat(document.getElementById('inp-ret').value)||0,
    extra:parseFloat(document.getElementById('inp-extra').value)||0};
  var c=calc(w,state.settings);
  updateResultCards(c);updateFixChips(c);updateCostBar(c);
}

function rc(lbl,val,sub,cls){
  return '<div class="rc '+(cls||'')+'"><div class="rc-lbl">'+lbl+'</div><div class="rc-val">'+val+'</div><div class="rc-sub">'+sub+'</div></div>';
}
function updateResultCards(c){
  var el=document.getElementById('result-cards');if(!el)return;
  el.innerHTML=
    rc('Gewinn',cf(c.gewinn),'nach allen Kosten',c.gewinn>=0?'pos':'neg')+
    rc('Nettomarge',pf(c.marge),'nach allen Kosten',c.marge>=20?'pos':c.marge>=0?'':'neg')+
    rc('ROAS',rf(c.roas),cf(c.m)+' Meta Spend',c.roas>=2.5?'pos':c.roas>=1?'amber':'neg')+
    rc('CPA',cf(c.cpa),'pro Bestellung','');
}
function updateFixChips(c){
  var el=document.getElementById('cost-bar-wrap');if(!el)return;
  var chips=document.getElementById('cost-bar-wrap').querySelector('.fix-chips');
  if(!chips){var d=document.createElement('div');d.className='fix-chips';el.appendChild(d);chips=d;}
  chips.innerHTML=
    '<span class="chip">COGS '+cf(c.cogs)+'</span>'+
    '<span class="chip">SVZ '+cf(c.svz)+'</span>'+
    '<span class="chip">Fee '+cf(c.fee)+'</span>'+
    '<span class="chip">Fix '+cf(c.fix)+'</span>';
}
function updateCostBar(c){
  var bar=document.getElementById('cost-bar');
  var leg=document.getElementById('cost-legend');
  if(!bar||!c.total_costs)return;
  var t=c.total_costs;
  var segs=[['COGS',c.cogs,'#1D9E75'],['SVZ',c.svz,'#2563EB'],['Meta',c.m,'#7C3AED'],['Fees',c.fee,'#D97706'],['Fix',c.fix,'#6B7280']];
  bar.innerHTML=segs.map(function(s){
    var pct=t>0?s[1]/t*100:0;
    return pct>3?'<div class="cost-bar-seg" style="width:'+pct.toFixed(1)+'%;background:'+s[2]+';">'+Math.round(pct)+'%</div>':'';
  }).join('');
  if(leg)leg.innerHTML=segs.map(function(s){
    return '<span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:'+s[2]+';display:inline-block;"></span>'+s[0]+' ('+cf(s[1])+' | '+(c.u>0?s[1]/c.u*100:0).toFixed(1)+'% Umsatz)</span>';
  }).join('');
}
function updateVsAvg(c){
  var nonRef=state.weeks.filter(function(w){return !w.isRef&&(parseFloat(w.umsatz)||0)>0;});
  var ref=getRefWeek();
  var hist;
  if(nonRef.length>1){
    var avg=function(fn){return nonRef.reduce(function(s,w){return s+fn(w);},0)/nonRef.length;};
    hist={u:avg(function(w){return parseFloat(w.umsatz)||0;}),
      gewinn:avg(function(w){return calc(w,state.settings).gewinn;}),
      marge:avg(function(w){return calc(w,state.settings).marge;}),
      roas:avg(function(w){return calc(w,state.settings).roas;})};
  }else if(ref){
    hist=calc(ref,state.settings);
  }else{document.getElementById('vs-avg').innerHTML='';return;}
  var avgLabel=nonRef.length>1?'Ø '+nonRef.length+' Wochen':'Ø Referenz';
  var card=function(label,curr,h,fmt){
    var d=curr-h,good=d>=0;
    return '<div style="background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;box-shadow:var(--sh);">'+
      '<div style="font-family:DM Mono,monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px;">'+label+'</div>'+
      '<div style="font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--tx)">'+fmt(curr)+'</div>'+
      '<div style="margin-top:5px;font-size:11px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;">'+
        '<span style="padding:2px 7px;border-radius:20px;background:'+(good?'var(--gd)':'var(--rd)')+';color:'+(good?'var(--green)':'var(--red)')+'">'+
          (good?'&#x25B2;':'&#x25BC;')+' '+fmt(Math.abs(d))+
        '</span>'+
        '<span style="color:var(--tx3);">vs. '+fmt(h)+' ('+avgLabel+')</span>'+
      '</div>'+
    '</div>';
  };
  var html='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">';
  html+=card('Gewinn vs. Ø',c.gewinn,hist.gewinn,cf);
  html+=card('Marge vs. Ø',c.marge,hist.marge,pf);
  html+=card('ROAS vs. Ø',c.roas,hist.roas,rf);
  html+=card('Umsatz vs. Ø',c.u,hist.u,cf);
  html+='</div>';
  document.getElementById('vs-avg').innerHTML=html;
}

// CHARTS
function renderCharts(){
  var nonRef=state.weeks.filter(function(w){return !w.isRef;});
  if(!nonRef.length)return;
  var labels=nonRef.map(function(w){return w.kw;});
  var calcs=nonRef.map(function(w){return calc(w,state.settings);});
  var uData=calcs.map(function(c){return parseFloat(c.u.toFixed(2));});
  var kData=calcs.map(function(c){return parseFloat(c.total_costs.toFixed(2));});
  var rData=calcs.map(function(c){return parseFloat(c.roas.toFixed(2));});
  var gData=calcs.map(function(c){return parseFloat(c.gewinn.toFixed(2));});
  var cData=calcs.map(function(c){return parseFloat(c.cpa.toFixed(2));});
  var rWithData=rData.filter(function(r){return r>0;});
  var avgR=rWithData.length?rWithData.reduce(function(a,b){return a+b;},0)/rWithData.length:0;
  var beData=nonRef.map(function(w){var c=calc(w,state.settings);return c.m>0?parseFloat(((c.total_costs-c.m)/c.m+1).toFixed(2)):null;});
  var bColors=rData.map(function(r,i){return i===rData.length-1?(r>=avgR?'rgba(5,150,105,.85)':'rgba(220,38,38,.85)'):(r>=avgR?'rgba(5,150,105,.55)':'rgba(220,38,38,.55)');});
  var baseOpt={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#9CA3AF',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}};

  if(chartInstances.umsatz)chartInstances.umsatz.destroy();
  var c1=document.getElementById('chart-umsatz');
  if(c1)chartInstances.umsatz=new Chart(c1,{type:'bar',data:{labels:labels,datasets:[
    {label:'Umsatz',data:uData,backgroundColor:'rgba(29,158,117,.6)',borderRadius:4},
    {label:'Kosten',data:kData,backgroundColor:'rgba(220,38,38,.5)',borderRadius:4}
  ]},options:JSON.parse(JSON.stringify(baseOpt))});

  if(chartInstances.roas)chartInstances.roas.destroy();
  var c2=document.getElementById('chart-roas');
  if(c2)chartInstances.roas=new Chart(c2,{type:'bar',data:{labels:labels,datasets:[
    {label:'ROAS',data:rData,backgroundColor:bColors,borderRadius:4},
    {label:'Ø '+avgR.toFixed(2)+'x',data:labels.map(function(){return parseFloat(avgR.toFixed(2));}),
     type:'line',borderColor:'rgba(29,158,117,.8)',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false},
    {label:'Break-even',data:beData,type:'line',borderColor:'rgba(220,38,38,.5)',
     borderWidth:1.5,borderDash:[3,3],pointRadius:0,fill:false}
  ]},options:JSON.parse(JSON.stringify(baseOpt))});

  if(nonRef.length<2)return;

  if(chartInstances.gewinn)chartInstances.gewinn.destroy();
  var c3=document.getElementById('chart-gewinn');
  if(c3)chartInstances.gewinn=new Chart(c3,{type:'line',data:{labels:labels,datasets:[{
    label:'Nettogewinn',data:gData,borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,.08)',
    tension:0.3,fill:true,pointRadius:5,
    pointBackgroundColor:gData.map(function(v){return v>=0?'#1D9E75':'#DC2626';})
  }]},options:JSON.parse(JSON.stringify(baseOpt))});

  if(chartInstances.cpa)chartInstances.cpa.destroy();
  var c4=document.getElementById('chart-cpa');
  if(c4)chartInstances.cpa=new Chart(c4,{type:'line',data:{labels:labels,datasets:[{
    label:'CPA (CHF)',data:cData,borderColor:'#2563EB',backgroundColor:'rgba(37,99,235,.07)',
    tension:0.3,fill:true,pointRadius:5
  }]},options:JSON.parse(JSON.stringify(baseOpt))});

  if(chartInstances.mix)chartInstances.mix.destroy();
  var c5=document.getElementById('chart-mix');
  if(c5)chartInstances.mix=new Chart(c5,{type:'bar',data:{labels:labels,datasets:[
    {label:'COGS',data:calcs.map(function(c){return parseFloat(c.cogs.toFixed(2));}),backgroundColor:'rgba(29,158,117,.7)',borderRadius:2},
    {label:'SVZ',data:calcs.map(function(c){return parseFloat(c.svz.toFixed(2));}),backgroundColor:'rgba(37,99,235,.7)',borderRadius:2},
    {label:'Meta',data:calcs.map(function(c){return parseFloat(c.m.toFixed(2));}),backgroundColor:'rgba(124,58,237,.7)',borderRadius:2},
    {label:'Fees',data:calcs.map(function(c){return parseFloat(c.fee.toFixed(2));}),backgroundColor:'rgba(217,119,6,.7)',borderRadius:2},
    {label:'Fix',data:calcs.map(function(c){return parseFloat((c.cow+c.sh).toFixed(2));}),backgroundColor:'rgba(107,114,128,.5)',borderRadius:2}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},
    scales:{x:{stacked:true,ticks:{color:'#9CA3AF',font:{size:10}},grid:{display:false}},
            y:{stacked:true,ticks:{color:'#9CA3AF',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}

// OVERVIEW TAB
function renderOverview(){
  var nonRef=state.weeks.filter(function(w){return !w.isRef;});
  if(!nonRef.length){
    document.getElementById('overview-content').innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3);">Noch keine Wochen erfasst.</div>';
    return;
  }
  var sorted=nonRef.slice().sort(function(a,b){
    var ay=parseInt(a.year)||2026,by=parseInt(b.year)||2026;
    var akw=parseInt(String(a.kw).replace(/[^0-9]/g,''))||0,bkw=parseInt(String(b.kw).replace(/[^0-9]/g,''))||0;
    return ay!==by?ay-by:akw-bkw;
  });
  function sumW(weeks){
    var u=0,m=0,cg=0,sv=0,fe=0,fi=0,gew=0,best=0;
    weeks.forEach(function(w){var c=calc(w,state.settings);u+=c.u;m+=c.m;cg+=c.cogs;sv+=c.svz;fe+=c.fee;fi+=c.cow+c.sh;gew+=c.gewinn;best+=c.b;});
    return{u:u,m:m,cogs:cg,svz:sv,fee:fe,fix:fi,gew:gew,best:best,roas:m>0?u/m:0,marge:u>0?gew/u*100:0,cpa:best>0?m/best:0};
  }
  var curYear=new Date().getFullYear();
  var withData=sorted.filter(function(w){return(parseFloat(w.umsatz)||0)>0;});
  var yearW=withData.filter(function(w){return parseInt(w.year)===curYear;});
  var last4=withData.slice(-4);
  var sYear=sumW(yearW.length?yearW:withData);
  var s4=sumW(last4);
  function kpi(lbl,val,sub,col){
    return '<div style="background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:13px 15px;">'+
      '<div style="font-family:DM Mono,monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:5px;">'+lbl+'</div>'+
      '<div style="font-size:18px;font-weight:700;letter-spacing:-.02em;color:'+(col||'var(--tx)')+'">'+val+'</div>'+
      (sub?'<div style="font-size:11px;color:var(--tx3);margin-top:2px;">'+sub+'</div>':'')+
    '</div>';
  }
  function pill(lbl,val,pct){
    return '<div style="background:var(--sur2);border-radius:8px;padding:8px 10px;text-align:center;">'+
      '<div style="font-size:10px;color:var(--tx3);">'+lbl+'</div>'+
      '<div style="font-size:13px;font-weight:600;color:var(--tx);">'+cf(val)+'</div>'+
      '<div style="font-size:10px;color:var(--tx3);">'+pct.toFixed(1)+'%</div>'+
    '</div>';
  }
  function section(title,sub,s,nw){
    var pc=function(v){return s.u>0?v/s.u*100:0;};
    return '<div style="background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--sh);">'+
      '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap;">'+
        '<div style="font-size:15px;font-weight:700;color:var(--tx);">'+title+'</div>'+
        '<div style="font-size:12px;color:var(--tx3);">'+sub+'</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;">'+
        kpi('Umsatz',cf(s.u),nw+' Wochen')+
        kpi(s.gew>=0?'Gewinn':'Verlust',cf(s.gew),pf(s.marge)+' Nettomarge',s.gew>=0?'var(--green)':'var(--red)')+
        kpi('ROAS',rf(s.roas),cf(s.m)+' Meta',s.roas>=2?'var(--green)':s.roas>=1?'var(--amber)':'var(--red)')+
        kpi('CPA',cf(s.cpa),s.best+' Bestellungen')+
      '</div>'+
      '<div style="font-family:DM Mono,monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:7px;">Kostenstruktur</div>'+
      '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;">'+
        pill('COGS',s.cogs,pc(s.cogs))+pill('SVZ',s.svz,pc(s.svz))+pill('Meta',s.m,pc(s.m))+
        pill('Fees',s.fee,pc(s.fee))+pill('Fix',s.fix,pc(s.fix))+
      '</div>'+
    '</div>';
  }
  function weekTable(){
    if(!withData.length)return'';
    var rows=withData.map(function(w){
      var c=calc(w,state.settings);
      return'<tr style="border-bottom:1px solid var(--bd);">'+
        '<td style="padding:8px 12px;font-weight:500;font-size:12px;">'+w.kw+' / '+w.year+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;">'+cf(c.u)+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;color:'+(c.gewinn>=0?'var(--green)':'var(--red)')+'">'+cf(c.gewinn)+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;">'+pf(c.marge)+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;color:'+(c.roas>=2?'var(--green)':c.roas>=1?'var(--amber)':'var(--red)')+'">'+rf(c.roas)+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;">'+cf(c.m)+'</td>'+
        '<td style="padding:8px 12px;font-size:12px;">'+cf(c.cpa)+'</td>'+
      '</tr>';
    }).join('');
    var ths=['KW','Umsatz','Gewinn','Marge','ROAS','Meta Spend','CPA'].map(function(h){
      return'<th style="padding:8px 12px;text-align:left;font-family:DM Mono,monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;border-bottom:1px solid var(--bd);">'+h+'</th>';
    }).join('');
    return'<div style="background:var(--sur);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:var(--sh);">'+
      '<div style="padding:13px 16px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:600;color:var(--tx);">Alle Wochen</div>'+
      '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;">'+
        '<thead><tr style="background:var(--sur2);">'+ths+'</tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table></div>'+
    '</div>';
  }
  var nYear=yearW.length||withData.length;
  document.getElementById('overview-content').innerHTML=
    section('Jahr '+curYear,'alle Wochen kumuliert',sYear,nYear)+
    section('Letzte 4 Wochen',last4.map(function(w){return w.kw;}).join(', '),s4,last4.length)+
    weekTable();
}

// HISTORY TAB
function renderHistory(){
  var tbody=document.getElementById('history-body');if(!tbody)return;
  var nonRef=state.weeks.filter(function(w){return !w.isRef&&(parseFloat(w.umsatz)||0)>0;});
  nonRef=nonRef.slice().sort(function(a,b){
    var ay=parseInt(a.year)||2026,by=parseInt(b.year)||2026;
    var akw=parseInt(String(a.kw).replace(/[^0-9]/g,''))||0,bkw=parseInt(String(b.kw).replace(/[^0-9]/g,''))||0;
    return ay!==by?ay-by:akw-bkw;
  });
  tbody.innerHTML=nonRef.map(function(w){
    var c=calc(w,state.settings);
    return'<tr><td>'+w.kw+' / '+w.year+'</td><td>'+cf(c.u)+'</td><td>'+cf(c.m)+'</td>'+
      '<td style="color:'+(c.roas>=2?'var(--green)':c.roas>=1?'var(--amber)':'var(--red)')+'">'+rf(c.roas)+'</td>'+
      '<td style="color:'+(c.gewinn>=0?'var(--green)':'var(--red)')+'">'+cf(c.gewinn)+'</td>'+
      '<td>'+pf(c.marge)+'</td><td>'+cf(c.cpa)+'</td></tr>';
  }).join('');
}

// SETTINGS TAB
function renderSettings(){
  var s=state.settings;
  document.getElementById('s-cogs').value=s.cogs_per_unit||6;
  document.getElementById('s-svz').value=s.svz_per_order||10.99;
  document.getElementById('s-fee').value=s.payment_fee_pct||2.8;
  document.getElementById('s-cow').value=s.coworking_weekly||64.62;
  document.getElementById('s-shop').value=s.shopify_weekly||32.31;
}
function saveSettings(){
  state.settings.cogs_per_unit=parseFloat(document.getElementById('s-cogs').value)||6;
  state.settings.svz_per_order=parseFloat(document.getElementById('s-svz').value)||10.99;
  state.settings.payment_fee_pct=parseFloat(document.getElementById('s-fee').value)||2.8;
  state.settings.coworking_weekly=parseFloat(document.getElementById('s-cow').value)||64.62;
  state.settings.shopify_weekly=parseFloat(document.getElementById('s-shop').value)||32.31;
  save();alert('Einstellungen gespeichert.');
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
renderWeekView();
</script>
