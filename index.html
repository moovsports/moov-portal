<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOOV Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<style>
:root{
  --bg:#F7F7F5;--sur:#FFFFFF;--sur2:#F2F2F0;--sur3:#EAEAE8;
  --bd:#E8E8E6;--bds:#CECECE;
  --tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;
  --teal:#1D9E75;--teal-d:rgba(29,158,117,.08);--teal-b:rgba(29,158,117,.2);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sk-c:#6B7280;--sk-bg:#F3F4F6;
  --au-c:#D97706;--au-bg:#FEF3C7;
  --sc-c:#2563EB;--sc-bg:#DBEAFE;
  --te-c:#7C3AED;--te-bg:#EDE9FE;
  --wi-c:#059669;--wi-bg:#D1FAE5;
  --lo-c:#DC2626;--lo-bg:#FEE2E2;
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── SETUP ── */
#setup{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.setup-card{background:var(--sur);border-radius:20px;box-shadow:var(--shadow-md);padding:40px;width:100%;max-width:460px;border:1px solid var(--bd);}
.setup-logo{font-family:'Inter',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.setup-headline{font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:var(--tx);margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--tx2);margin-bottom:28px;line-height:1.6;}
.setup-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:5px;}
.setup-input{width:100%;font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px;outline:none;margin-bottom:14px;transition:border-color .15s;}
.setup-input:focus{border-color:var(--teal);background:#fff;}
.setup-input::placeholder{color:var(--tx3);}
.setup-btn{width:100%;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:12px;border-radius:10px;background:var(--teal);color:#fff;border:none;cursor:pointer;transition:all .15s;}
.setup-btn:hover{background:#179967;transform:translateY(-1px);}
.setup-err{font-size:12px;color:var(--lo-c);margin-top:8px;display:none;}
.setup-hint{font-size:12px;color:var(--tx3);margin-top:14px;line-height:1.7;}
.setup-hint a{color:var(--teal);text-decoration:none;}

/* ── SHELL ── */
.shell{display:flex;height:100vh;}

/* ── SIDEBAR ── */
.sb{width:224px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-brand{padding:20px 18px 14px;display:flex;align-items:center;gap:10px;}
.sb-logo{font-family:'Inter',sans-serif;font-size:15px;font-weight:800;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;}
.sb-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
.div{height:1px;background:var(--bd);}
.sb-section-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;padding:12px 18px 4px;}
.sb-nav{padding:3px 10px 6px;}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:var(--tx2);font-family:'Inter',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all .13s;text-align:left;}
.nb:hover{background:var(--sur2);color:var(--tx);}
.nb.on{background:var(--teal-d);color:var(--teal);font-weight:600;}
.nb-ic{font-size:14px;flex-shrink:0;width:20px;text-align:center;}
.nb-cnt{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;background:var(--sur2);color:var(--tx3);padding:1px 6px;border-radius:20px;}
.nb.on .nb-cnt{background:var(--teal-d);color:var(--teal);}
.sb-filter-section{padding:3px 10px 6px;}
.sf{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:all .12s;}
.sf:hover{background:var(--sur2);}
.sf.on{background:var(--sur2);}
.sf-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sf-lbl{font-size:12px;color:var(--tx2);flex:1;}
.sf.on .sf-lbl,.sf:hover .sf-lbl{color:var(--tx);}
.sf-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);}
.sb-stats{padding:10px 18px 12px;border-top:1px solid var(--bd);}
.stat-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.stat-lbl{font-size:12px;color:var(--tx2);flex:1;}
.stat-val{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.sb-foot{padding:8px 10px 12px;border-top:1px solid var(--bd);}
.sb-foot-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:9px;border:none;background:transparent;color:var(--tx2);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .13s;text-align:left;}
.sb-foot-btn:hover{background:var(--sur2);color:var(--tx);}
.export-btn{background:var(--teal-d);color:var(--teal);border:1px solid var(--teal-b);}
.export-btn:hover{background:rgba(29,158,117,.14)!important;color:var(--teal)!important;}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;height:100%;}
.view.on{display:flex;flex-direction:column;}
.scroll-view{overflow-y:auto;padding:26px 28px 60px;flex:1;}
.scroll-view::-webkit-scrollbar{width:5px;}
.scroll-view::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}
.vh{display:flex;align-items:baseline;gap:12px;margin-bottom:22px;}
.vh-title{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--tx);letter-spacing:-.02em;}
.vh-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);}

/* ── PIPELINE ── */
#vw-pipeline{padding:24px 24px 0;}
.kb-wrap{display:flex;gap:12px;flex:1;overflow-x:auto;overflow-y:hidden;padding-bottom:24px;align-items:flex-start;}
.kb-wrap::-webkit-scrollbar{height:5px;}
.kb-wrap::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}
.kb-col{flex-shrink:0;width:210px;background:var(--sur);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;max-height:calc(100vh - 140px);box-shadow:var(--shadow);transition:border-color .15s;}
.kb-col.dov{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-d);}
.kb-col.dov-w{border-color:var(--wi-c);box-shadow:0 0 0 3px rgba(5,150,105,.1);}
.kb-col.dov-l{border-color:var(--lo-c);box-shadow:0 0 0 3px rgba(220,38,38,.1);}
.kb-hdr{padding:11px 14px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.kb-col-bar{width:3px;height:16px;border-radius:3px;flex-shrink:0;}
.kb-name{font-size:12px;font-weight:600;color:var(--tx);flex:1;}
.kb-cnt{font-family:'DM Mono',monospace;font-size:11px;background:var(--sur2);color:var(--tx3);padding:2px 7px;border-radius:20px;}
.kb-body{flex:1;overflow-y:auto;padding:8px;}
.kb-body::-webkit-scrollbar{width:3px;}
.kb-body::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px;}
.kb-foot{padding:5px 8px 8px;flex-shrink:0;}
.kc{background:var(--sur);border:1px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:6px;cursor:grab;transition:all .15s;user-select:none;box-shadow:var(--shadow);}
.kc:hover{border-color:var(--bds);box-shadow:var(--shadow-md);}
.kc.dragging{opacity:.3;transform:scale(.96);}
.kc-title{font-size:12px;font-weight:600;color:var(--tx);line-height:1.4;}
.kc-type{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.kc-hint{font-size:10px;color:var(--tx3);margin-top:5px;opacity:0;transition:opacity .13s;}
.kc:hover .kc-hint{opacity:1;}
.kb-add{display:flex;align-items:center;gap:6px;width:100%;padding:6px 8px;border-radius:8px;border:1.5px dashed var(--bd);background:transparent;color:var(--tx3);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer;transition:all .13s;justify-content:center;}
.kb-add:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-d);}

/* ── AD CARDS ── */
.ac{background:var(--sur);border:1px solid var(--bd);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .15s,border-color .15s;}
.ac:hover{box-shadow:var(--shadow-md);}
.ac.exp{border-color:var(--teal-b);box-shadow:var(--shadow-md);}
.ac-h{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;}
.ac-status-bar{width:4px;height:36px;border-radius:3px;flex-shrink:0;}
.ac-t{font-size:14px;font-weight:600;color:var(--tx);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbb{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px;flex-shrink:0;}
.sbb.csk{background:var(--sk-bg);color:var(--sk-c);}
.sbb.cau{background:var(--au-bg);color:var(--au-c);}
.sbb.csc{background:var(--sc-bg);color:var(--sc-c);}
.sbb.cte{background:var(--te-bg);color:var(--te-c);}
.sbb.cwi{background:var(--wi-bg);color:var(--wi-c);}
.sbb.clo{background:var(--lo-bg);color:var(--lo-c);}
.typ{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--sur2);color:var(--tx3);flex-shrink:0;text-transform:uppercase;border:1px solid var(--bd);}
.arr{font-size:9px;color:var(--tx3);flex-shrink:0;transition:transform .2s;}
.arr.open{transform:rotate(180deg);}

/* ── AD DETAIL (expanded) ── */
.ac-b{border-top:1px solid var(--bd);padding:20px 20px 22px;animation:fd .15s ease;background:var(--bg);}
@keyframes fd{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}

/* Status row */
.ad-status-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.ss{font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;font-weight:500;}
.ss:hover{border-color:var(--bds);color:var(--tx);}
.ss.on{border-color:transparent;}
.ss.on.csk{background:var(--sk-bg);color:var(--sk-c);}
.ss.on.cau{background:var(--au-bg);color:var(--au-c);}
.ss.on.csc{background:var(--sc-bg);color:var(--sc-c);}
.ss.on.cte{background:var(--te-bg);color:var(--te-c);}
.ss.on.cwi{background:var(--wi-bg);color:var(--wi-c);}
.ss.on.clo{background:var(--lo-bg);color:var(--lo-c);}

/* Field groups */
.ad-field{margin-bottom:16px;}
.ad-field-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.ad-field-lbl-icon{font-size:12px;}
.ad-inp{width:100%;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:var(--tx);background:var(--sur);border:1.5px solid var(--bd);border-radius:9px;padding:10px 13px;outline:none;transition:border-color .15s;}
.ad-inp:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-d);}
.ad-inp::placeholder{color:var(--tx3);font-weight:400;}
.ad-ta{width:100%;font-family:'DM Mono',monospace;font-size:12.5px;color:var(--tx);background:var(--sur);border:1.5px solid var(--bd);border-radius:9px;padding:12px 14px;outline:none;resize:vertical;min-height:100px;line-height:1.8;transition:border-color .15s;}
.ad-ta:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-d);}
.ad-ta::placeholder{color:var(--tx3);}
.ad-ta.filming{background:#FFFBEB;border-color:#FDE68A;}
.ad-ta.filming:focus{border-color:#D97706;box-shadow:0 0 0 3px rgba(217,119,6,.1);}
.ad-ta.notes-ta{background:#F0F9FF;border-color:#BAE6FD;}
.ad-ta.notes-ta:focus{border-color:#0284C7;box-shadow:0 0 0 3px rgba(2,132,199,.1);}
.ad-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:800px){.ad-grid-2{grid-template-columns:1fr;}}
.ad-actions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);}
.btn-save{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:9px 22px;border-radius:9px;background:var(--teal);color:#fff;border:none;cursor:pointer;transition:all .15s;}
.btn-save:hover{background:#179967;transform:translateY(-1px);}
.btn-del{font-family:'Inter',sans-serif;font-size:13px;padding:9px 16px;border-radius:9px;background:transparent;color:var(--lo-c);border:1.5px solid var(--lo-bg);cursor:pointer;transition:all .15s;margin-left:auto;}
.btn-del:hover{background:var(--lo-bg);}

/* ── PERFORMANCE ── */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
@media(max-width:700px){.cards-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);}
.stat-card-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px;}
.stat-card-val{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:var(--tx);}
.stat-card-sub{font-size:11px;color:var(--tx2);margin-top:3px;}
.stat-card.green .stat-card-val{color:var(--wi-c);}
.stat-card.red .stat-card-val{color:var(--lo-c);}
.stat-card.amber .stat-card-val{color:var(--au-c);}
.upload-zone{border:2px dashed var(--bd);border-radius:14px;padding:32px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:20px;background:var(--sur);}
.upload-zone:hover,.upload-zone.drag-active{border-color:var(--teal);background:var(--teal-d);}
.upload-zone-title{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px;}
.upload-zone-sub{font-size:12px;color:var(--tx2);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
.chart-card{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
.chart-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:14px;}
.chart-wrap{position:relative;height:220px;}
.perf-table{width:100%;border-collapse:collapse;}
.perf-table th{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;padding:10px 13px;text-align:left;border-bottom:1px solid var(--bd);}
.perf-table td{font-size:13px;color:var(--tx2);padding:10px 13px;border-bottom:1px solid var(--bd);}
.perf-table tr:last-child td{border-bottom:none;}
.perf-table tr:hover td{background:var(--sur2);}
.perf-table td:first-child{color:var(--tx);font-weight:500;}
.roas-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.roas-g{background:var(--wi-bg);color:var(--wi-c);}
.roas-a{background:var(--au-bg);color:var(--au-c);}
.roas-r{background:var(--lo-bg);color:var(--lo-c);}
.week-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.week-tab{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;}
.week-tab:hover{border-color:var(--bds);color:var(--tx);}
.week-tab.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.week-tab.add-tab{border-style:dashed;color:var(--teal);border-color:var(--teal-b);}
.week-tab.add-tab:hover{background:var(--teal-d);}

/* ── HOOKS ── */
.hooks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.hk{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:12px;cursor:pointer;background:var(--sur);transition:all .15s;box-shadow:var(--shadow);}
.hk:hover{border-color:var(--bds);box-shadow:var(--shadow-md);}
.hk.sel{border-color:var(--teal-b);background:var(--teal-d);}
.hk-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s;}
.hk.sel .hk-box{background:var(--teal);border-color:var(--teal);color:#fff;}
.hk-txt{font-size:13px;color:var(--tx2);line-height:1.6;}
.hk.sel .hk-txt{color:var(--tx);}

/* ── FORM (neue Ad) ── */
.fcard{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:26px;max-width:580px;box-shadow:var(--shadow);}
.fg{margin-bottom:15px;}
.fl{display:block;font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
input[type=text],input[type=number],input[type=date],textarea,select{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;outline:none;transition:border-color .15s;}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--teal);background:#fff;}
input::placeholder,textarea::placeholder{color:var(--tx3);}
textarea{resize:vertical;min-height:80px;}
select option{background:#fff;}
.bp{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:10px 24px;border-radius:10px;background:var(--teal);color:#fff;border:none;cursor:pointer;transition:all .15s;}
.bp:hover{background:#179967;transform:translateY(-1px);}

/* ── IFRAME VIEWS ── */
.iframe-view{display:none;height:100%;}
.iframe-view.on{display:block;}
.iframe-view iframe{width:100%;height:100%;border:none;display:block;}

/* ── UTILS ── */
.msg-ok{font-family:'DM Mono',monospace;font-size:11px;color:var(--wi-c);margin-top:8px;}
.empty{text-align:center;padding:60px 0;color:var(--tx3);font-size:13px;}
.loading-overlay{position:fixed;inset:0;background:rgba(247,247,245,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;font-size:13px;color:var(--tx2);}
.toast{position:fixed;bottom:22px;right:22px;background:var(--tx);border-radius:12px;padding:12px 18px;font-size:13px;color:#fff;z-index:1000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;max-width:280px;line-height:1.5;box-shadow:var(--shadow-md);}
.toast.show{opacity:1;transform:none;}
.bsm{font-family:'Inter',sans-serif;font-size:12px;padding:6px 13px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .15s;}
.bsm:hover{border-color:var(--bds);color:var(--tx);}
.bsav{color:var(--teal);border-color:var(--teal-b);background:var(--teal-d);}
.bsav:hover{background:rgba(29,158,117,.12)!important;}
.bdel{color:var(--lo-c);border-color:rgba(220,38,38,.2);background:var(--lo-bg);}
.bdel:hover{background:rgba(220,38,38,.12);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}

/* ── HOOKS v2 ── */
.hooks-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.hk-filter-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;}
.hk-filter-btn:hover{border-color:var(--bds);color:var(--tx);}
.hk-filter-btn.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.hk-filter-btn.imp.on{background:#F59E0B;border-color:#F59E0B;color:#fff;}
.hk-section-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;}
.hk-card{background:var(--sur);border:1.5px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);transition:all .15s;}
.hk-card:hover{box-shadow:var(--shadow-md);}
.hk-card.important{border-color:#F59E0B;background:#FFFBEB;}
.hk-card.archived{background:var(--sur2);border-color:var(--bd);opacity:.75;}
.hk-top{display:flex;align-items:flex-start;gap:10px;}
.hk-star{font-size:14px;cursor:pointer;flex-shrink:0;margin-top:1px;opacity:.35;transition:all .15s;}
.hk-star:hover{opacity:1;}
.hk-star.on{opacity:1;}
.hk-text{font-size:13px;color:var(--tx);line-height:1.6;flex:1;}
.hk-edit-ta{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);background:var(--sur);border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;outline:none;resize:vertical;min-height:60px;box-shadow:0 0 0 3px var(--teal-d);flex:1;}
.hk-video-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--teal);text-decoration:none;margin-top:6px;font-weight:500;}
.hk-video-link:hover{text-decoration:underline;}
.hk-actions{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.hk-act-btn{font-family:'Inter',sans-serif;font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;transition:all .13s;display:inline-flex;align-items:center;gap:4px;}
.hk-act-btn:hover{border-color:var(--bds);color:var(--tx);background:var(--sur2);}
.hk-act-btn.teal{color:var(--teal);border-color:var(--teal-b);background:var(--teal-d);}
.hk-act-btn.amber{color:#D97706;border-color:#FDE68A;background:#FFFBEB;}
.hk-act-btn.red{color:var(--lo-c);border-color:rgba(220,38,38,.2);background:var(--lo-bg);}
.hk-archived-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;color:var(--tx2);font-size:13px;font-weight:500;border-top:1px solid var(--bd);margin-top:8px;user-select:none;}
.hk-archived-toggle:hover{color:var(--tx);}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-card">
    <img src="/moov_logo.png" alt="MOOV" style="height:34px;width:auto;display:block;margin-bottom:12px;">
    <div class="setup-headline">Portal einrichten</div>
    <div class="setup-sub">Verbinde dein Supabase Projekt um das Portal zu starten.</div>
    <label class="setup-label">Supabase Project URL</label>
    <input class="setup-input" id="cfg-url" type="text" placeholder="https://xxxxx.supabase.co">
    <label class="setup-label">Supabase Anon Key</label>
    <input class="setup-input" id="cfg-key" type="text" placeholder="eyJhbGciO...">
    <button class="setup-btn" onclick="saveConfig()">Verbinden →</button>
    <div class="setup-err" id="setup-err">Verbindung fehlgeschlagen. URL und Key prüfen.</div>
    <div class="setup-hint">URL + Key → <a href="https://supabase.com" target="_blank">Supabase → Settings → API → Legacy keys</a></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="shell" style="display:none">
  <aside class="sb">
    <div class="sb-brand">
      <div>
        <img src="/moov_logo.png" alt="MOOV" style="height:26px;width:auto;display:block;margin-bottom:2px;">
        <div class="sb-tag">Ad Portal</div>
      </div>
    </div>
    <div class="div"></div>

    <div class="sb-section-lbl">Ads</div>
    <div class="sb-nav">
      <button class="nb on" id="nb-pipeline" onclick="sw('pipeline')"><span class="nb-ic">⌂</span>Pipeline</button>
      <button class="nb" id="nb-ads" onclick="sw('ads')"><span class="nb-ic">◈</span>Alle Ads<span class="nb-cnt" id="cnt-ads">0</span></button>
      <button class="nb" id="nb-performance" onclick="sw('performance')"><span class="nb-ic">📊</span>Performance</button>
      <button class="nb" id="nb-hooks" onclick="sw('hooks')"><span class="nb-ic">🎣</span>Hooks<span class="nb-cnt" id="cnt-hooks">0</span></button>
      <button class="nb" id="nb-new" onclick="sw('new')"><span class="nb-ic">＋</span>Neue Ad</button>
    </div>

    <div class="div"></div>
    <div class="sb-section-lbl">Finanzen & Ops</div>
    <div class="sb-nav">
      <button class="nb" id="nb-pnl" onclick="sw('pnl')"><span class="nb-ic">📈</span>P&L Tracker</button>
      <button class="nb" id="nb-lieferungen" onclick="sw('lieferungen')"><span class="nb-ic">📦</span>Lieferungen</button>
    </div>

    <div id="sb-filters" style="opacity:.4;pointer-events:none;">
      <div class="div"></div>
      <div class="sb-section-lbl">Status Filter</div>
      <div class="sb-filter-section" id="sf-list"></div>
    </div>

    <div style="flex:1"></div>
    <div class="sb-stats">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">Übersicht</div>
      <div id="sb-stats-inner"></div>
    </div>
    <div class="sb-foot">
      <button class="sb-foot-btn export-btn" onclick="exportData()"><span>📤</span><span>Export für Claude</span></button>
      <button class="sb-foot-btn" onclick="sw('settings')" id="nb-settings"><span>⚙️</span><span>Einstellungen</span></button>
    </div>
  </aside>

  <div class="main">
    <!-- PIPELINE -->
    <div class="view on" id="vw-pipeline">
      <div style="padding:22px 24px 14px;flex-shrink:0;">
        <div class="vh" style="margin-bottom:0;"><div class="vh-title">Ad Pipeline</div><div class="vh-sub" id="pipe-sub"></div></div>
      </div>
      <div class="kb-wrap" id="kanban"></div>
    </div>

    <!-- ADS -->
    <div class="view" id="vw-ads"><div class="scroll-view"><div id="ads-content"></div></div></div>

    <!-- PERFORMANCE -->
    <div class="view" id="vw-performance"><div class="scroll-view"><div id="perf-content"></div></div></div>

    <!-- HOOKS -->
    <div class="view" id="vw-hooks">
      <div class="scroll-view">
        <div class="vh"><div class="vh-title">Hooks</div><div class="vh-sub" id="vh-hooks-sub"></div></div>
        <div class="hooks-toolbar">
          <button class="hk-filter-btn on" id="hkf-all" onclick="setHkFilter('all')">Alle</button>
          <button class="hk-filter-btn imp" id="hkf-important" onclick="setHkFilter('important')">⭐ Wichtig / Aufnehmen</button>
        </div>
        <div id="hooks-list"></div>
        <div style="display:flex;gap:8px;margin-top:16px;max-width:620px;">
          <input type="text" id="nh-in" placeholder="Neue Hook hinzufügen..." style="flex:1;">
          <button class="bsm bsav" onclick="addHook()">+ Hinzufügen</button>
        </div>
      </div>
    </div>

    <!-- NEUE AD -->
    <div class="view" id="vw-new"><div class="scroll-view"><div id="new-content"></div></div></div>

    <!-- SETTINGS -->
    <div class="view" id="vw-settings"><div class="scroll-view"><div id="settings-content"></div></div></div>

    <!-- P&L (iframe) -->
    <div class="iframe-view" id="vw-pnl">
      <iframe src="/moov_pnl.html" title="P&L Tracker"></iframe>
    </div>

    <!-- LIEFERUNGEN (iframe) -->
    <div class="iframe-view" id="vw-lieferungen">
      <iframe src="/moov_lieferungen.html" title="Lieferantenübersicht"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading" style="display:none">
  <div style="text-align:center;">
    <div style="font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:8px;">MOOV</div>
    <div>Lädt...</div>
  </div>
</div>

<script>
/* ── CONSTANTS ── */
const ST=[
  {id:'skript',   label:'Skripten',  cls:'csk',color:'#6B7280',pi:0},
  {id:'aufnehmen',label:'Aufnehmen', cls:'cau',color:'#D97706',pi:1},
  {id:'schneiden',label:'Schneiden', cls:'csc',color:'#2563EB',pi:2},
  {id:'testen',   label:'Testen',    cls:'cte',color:'#7C3AED',pi:3},
  {id:'winner',   label:'Winner ⭐', cls:'cwi',color:'#059669',pi:4},
  {id:'loser',    label:'Loser ❌',  cls:'clo',color:'#DC2626',pi:4}
];
const COLS=[
  {id:'skript',   label:'Skripten',  color:'#6B7280',extra:''},
  {id:'aufnehmen',label:'Aufnehmen', color:'#D97706',extra:''},
  {id:'schneiden',label:'Schneiden', color:'#2563EB',extra:''},
  {id:'testen',   label:'Testen',    color:'#7C3AED',extra:''},
  {id:'winner',   label:'Winner',    color:'#059669',extra:'col-wi'},
  {id:'loser',    label:'Loser',     color:'#DC2626',extra:'col-lo'}
];

function stC(id){return ST.find(s=>s.id===id)?.cls||'csk';}
function stL(id){return ST.find(s=>s.id===id)?.label||id;}
function stColor(id){return ST.find(s=>s.id===id)?.color||'#6B7280';}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtCHF(n){return'CHF '+(+n||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ── STATE ── */
let sb=null,ads=[],hooks=[],metaData=[],financials=[];
let curTab='pipeline',openAdId=null,dragId=null,curAdFilter='all';
const charts={};

/* ── SUPABASE ── */
function initSB(url,key){const{createClient}=supabase;sb=createClient(url,key);}
async function dbGet(table){const{data,error}=await sb.from(table).select('*').order('created_at',{ascending:true});if(error)throw error;return data||[];}
async function dbInsert(table,row){const{data,error}=await sb.from(table).insert(row).select();if(error)throw error;return data;}
async function dbUpdate(table,id,row){const{error}=await sb.from(table).update(row).eq('id',id);if(error)throw error;}
async function dbDelete(table,id){const{error}=await sb.from(table).delete().eq('id',id);if(error)throw error;}
async function dbDelSerial(table,id){const{error}=await sb.from(table).delete().eq('id',id);if(error)throw error;}

/* ── SETUP ── */
async function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  if(!url||!key)return;
  try{
    initSB(url,key);
    await sb.from('ads').select('id').limit(1);
    localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);
    document.getElementById('setup-err').style.display='none';
    startApp();
  }catch(e){document.getElementById('setup-err').style.display='block';}
}

async function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='flex';
  try{
    await loadAll();
    document.getElementById('loading').style.display='none';
    renderSidebar();renderPipeline();
  }catch(e){document.getElementById('loading').innerHTML='<div style="color:var(--lo-c)">Fehler: '+e.message+'</div>';}
}

async function loadAll(){
  [ads,hooks,metaData,financials]=await Promise.all([
    dbGet('ads'),dbGet('hooks'),
    dbGet('meta_performance').catch(()=>[]),
    dbGet('financials').catch(()=>[])
  ]);
}

/* ── NAV ── */
function sw(t){
  curTab=t;
  const normalViews=['pipeline','ads','performance','hooks','new','settings'];
  const iframeViews=['pnl','lieferungen'];
  normalViews.forEach(x=>{const el=document.getElementById('vw-'+x);if(el)el.classList.toggle('on',x===t);});
  iframeViews.forEach(x=>{const el=document.getElementById('vw-'+x);if(el)el.classList.toggle('on',x===t);});
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('nb-'+t);if(btn)btn.classList.add('on');
  const isAds=t==='ads';
  document.getElementById('sb-filters').style.opacity=isAds?'1':'0.4';
  document.getElementById('sb-filters').style.pointerEvents=isAds?'auto':'none';
  if(t==='pipeline')renderPipeline();
  else if(t==='ads')renderAds();
  else if(t==='performance')renderPerformance();
  else if(t==='hooks')renderHooks();
  else if(t==='new')renderNewAd();
  else if(t==='settings')renderSettings();
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const cn={};ST.forEach(s=>{cn[s.id]=ads.filter(a=>a.status===s.id).length;});
  document.getElementById('cnt-ads').textContent=ads.length;
  document.getElementById('cnt-hooks').textContent=hooks.length;
  let sf=`<button class="sf ${curAdFilter==='all'?'on':''}" onclick="setAF('all')"><div class="sf-dot" style="background:#9CA3AF"></div><span class="sf-lbl">Alle</span><span class="sf-n">${ads.length}</span></button>`;
  ST.forEach(s=>{sf+=`<button class="sf ${curAdFilter===s.id?'on':''}" onclick="setAF('${s.id}')"><div class="sf-dot" style="background:${s.color}"></div><span class="sf-lbl">${s.label}</span><span class="sf-n">${cn[s.id]||''}</span></button>`;});
  document.getElementById('sf-list').innerHTML=sf;
  const wi=cn.winner||0,lo=cn.loser||0,te=cn.testen||0,au=cn.aufnehmen||0;
  document.getElementById('sb-stats-inner').innerHTML=
    `<div class="stat-row"><div class="stat-dot" style="background:#059669"></div><span class="stat-lbl">Winner</span><span class="stat-val" style="color:#059669">${wi}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:#7C3AED"></div><span class="stat-lbl">Testen</span><span class="stat-val" style="color:#7C3AED">${te}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:#D97706"></div><span class="stat-lbl">Aufnehmen</span><span class="stat-val" style="color:#D97706">${au}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:#DC2626"></div><span class="stat-lbl">Loser</span><span class="stat-val" style="color:#DC2626">${lo}</span></div>`;
}

/* ── PIPELINE ── */
function renderPipeline(){
  renderSidebar();
  const wi=ads.filter(a=>a.status==='winner').length;
  document.getElementById('pipe-sub').textContent=`${ads.length} Ads · ${wi} Winner`;
  let html='';
  COLS.forEach(col=>{
    const colAds=ads.filter(a=>a.status===col.id);
    const cards=colAds.map(ad=>`
      <div class="kc" id="kc-${ad.id}" draggable="true"
        ondragstart="onDS(event,'${ad.id}')" ondragend="onDE()"
        onclick="openAdFromPipeline('${ad.id}')">
        <div class="kc-title">${esc(ad.title||'Ohne Titel')}</div>
        ${ad.type?`<div class="kc-type">${esc(ad.type)}</div>`:''}
        <div class="kc-hint">↗ Detail öffnen</div>
      </div>`).join('');
    const addBtn=col.id==='skript'?`<button class="kb-add" onclick="sw('new')">＋ Neue Ad</button>`:'';
    html+=`<div class="kb-col" id="kbc-${col.id}"
      ondragover="onDO(event,'${col.id}')" ondragleave="onDL(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')">
      <div class="kb-hdr">
        <div class="kb-col-bar" style="background:${col.color}"></div>
        <div class="kb-name">${col.label}</div>
        <div class="kb-cnt">${colAds.length}</div>
      </div>
      <div class="kb-body">${cards}</div>
      <div class="kb-foot">${addBtn}</div>
    </div>`;
  });
  document.getElementById('kanban').innerHTML=html;
}

function openAdFromPipeline(id){openAdId=id;sw('ads');}
function onDS(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('kc-'+id);if(el)el.classList.add('dragging');},0);}
function onDE(){if(dragId){const el=document.getElementById('kc-'+dragId);if(el)el.classList.remove('dragging');}dragId=null;document.querySelectorAll('.kb-col').forEach(el=>el.classList.remove('dov','dov-w','dov-l'));}
function onDO(e,col){e.preventDefault();document.querySelectorAll('.kb-col').forEach(el=>el.classList.remove('dov','dov-w','dov-l'));const el=document.getElementById('kbc-'+col);if(el)el.classList.add(col==='winner'?'dov-w':col==='loser'?'dov-l':'dov');}
function onDL(e,col){if(!e.currentTarget.contains(e.relatedTarget)){const el=document.getElementById('kbc-'+col);if(el)el.classList.remove('dov','dov-w','dov-l');}}
async function onDrop(e,col){
  e.preventDefault();
  const ad=ads.find(a=>a.id===dragId);
  if(ad&&ad.status!==col){
    ad.status=col;
    await dbUpdate('ads',ad.id,{status:col});
    if(col==='winner')showToast('⭐ '+ad.title+'\nAls Winner markiert!');
    else if(col==='loser')showToast('❌ '+ad.title+'\nAls Loser markiert.');
    else showToast('✓ Status → '+stL(col));
    renderPipeline();renderSidebar();
  }
  onDE();
}

/* ── ADS LIST ── */
function setAF(f){curAdFilter=f;renderAds();}
function renderAds(){
  renderSidebar();
  const fil=curAdFilter==='all'?ads:ads.filter(a=>a.status===curAdFilter);
  let html=`<div class="vh"><div class="vh-title">${curAdFilter==='all'?'Alle Ads':stL(curAdFilter)}</div><div class="vh-sub">${fil.length} Ad${fil.length!==1?'s':''}</div></div>`;
  if(!fil.length){html+=`<div class="empty">Keine Ads in diesem Status.</div>`;document.getElementById('ads-content').innerHTML=html;return;}
  fil.forEach(ad=>{
    const sc=stC(ad.status),sl=stL(ad.status),col=stColor(ad.status),isO=openAdId===ad.id;
    html+=`<div class="ac${isO?' exp':''}" id="acard-${ad.id}">
      <div class="ac-h" onclick="togAd('${ad.id}')">
        <div class="ac-status-bar" style="background:${col}"></div>
        <div class="ac-t">${esc(ad.title||'Ohne Titel')}</div>
        ${ad.type?`<span class="typ">${esc(ad.type)}</span>`:''}
        <span class="sbb ${sc}">${sl}</span>
        <span class="arr${isO?' open':''}">▼</span>
      </div>`;
    if(isO){
      const ssRow=ST.map(s=>`<button class="ss${ad.status===s.id?' on '+s.cls:''}" onclick="setAdStatus('${ad.id}','${s.id}')">${s.label}</button>`).join('');
      html+=`<div class="ac-b">
        <!-- Status -->
        <div class="ad-status-row">${ssRow}</div>

        <!-- Titel -->
        <div class="ad-field">
          <div class="ad-field-lbl"><span class="ad-field-lbl-icon">✏️</span>Titel</div>
          <input class="ad-inp" id="ad-title-${ad.id}" type="text" value="${esc(ad.title||'')}" placeholder="Ad Titel...">
        </div>

        <!-- Hook -->
        <div class="ad-field">
          <div class="ad-field-lbl"><span class="ad-field-lbl-icon">🎬</span>Hook</div>
          <input class="ad-inp" id="ad-hook-${ad.id}" type="text" value="${esc(ad.hook||'')}" placeholder="Erster Satz / Hook der Ad..." style="font-weight:500;font-style:italic;">
        </div>

        <!-- Script + In echt aufnehmen -->
        <div class="ad-grid-2">
          <div class="ad-field">
            <div class="ad-field-lbl"><span class="ad-field-lbl-icon">📝</span>Script</div>
            <textarea class="ad-ta" id="ad-script-${ad.id}" rows="8" placeholder="Vollständiges Script schreiben...">${esc(ad.script||'')}</textarea>
          </div>
          <div class="ad-field">
            <div class="ad-field-lbl"><span class="ad-field-lbl-icon">🎥</span>In echt aufnehmen</div>
            <textarea class="ad-ta filming" id="ad-filming-${ad.id}" rows="8" placeholder="Was muss noch in echt gefilmt werden?&#10;&#10;z.B.&#10;- Joggen-Szene im Park&#10;- Powerade Flasche wegwerfen&#10;- Glas Wasser einschenken (überläuft fast)">${esc(ad.filming_notes||'')}</textarea>
          </div>
        </div>

        <!-- Notizen -->
        <div class="ad-field">
          <div class="ad-field-lbl"><span class="ad-field-lbl-icon">📌</span>Notizen</div>
          <textarea class="ad-ta notes-ta" id="ad-notes-${ad.id}" rows="3" placeholder="Weitere Notizen, Ideen, Feedback...">${esc(ad.notes||'')}</textarea>
        </div>

        <!-- Actions -->
        <div class="ad-actions">
          <button class="btn-save" onclick="saveAd('${ad.id}')">💾 Speichern</button>
          <div id="save-msg-${ad.id}" style="display:flex;align-items:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--wi-c);margin-left:10px;"></div>
          <button class="btn-del" onclick="deleteAd('${ad.id}')">🗑 Löschen</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('ads-content').innerHTML=html;
  if(openAdId){
    setTimeout(()=>{
      const el=document.getElementById('acard-'+openAdId);
      if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
    },80);
  }
}

function togAd(id){
  if(openAdId===id){openAdId=null;}else{openAdId=id;}
  renderAds();
}

async function setAdStatus(adId,status){
  const ad=ads.find(a=>a.id===adId);
  if(ad){
    ad.status=status;
    await dbUpdate('ads',adId,{status});
    if(status==='winner')showToast('⭐ Als Winner markiert!');
    else if(status==='loser')showToast('❌ Als Loser markiert.');
    renderAds();renderSidebar();
  }
}

async function saveAd(adId){
  const ad=ads.find(a=>a.id===adId);
  if(!ad)return;
  const getVal=id=>document.getElementById(id)?.value||'';
  const updates={
    title:getVal('ad-title-'+adId),
    hook:getVal('ad-hook-'+adId),
    script:getVal('ad-script-'+adId),
    filming_notes:getVal('ad-filming-'+adId),
    notes:getVal('ad-notes-'+adId)
  };
  Object.assign(ad,updates);
  try{
    await dbUpdate('ads',adId,updates);
  }catch(e){
    // filming_notes might not exist - save without it
    const{filming_notes,...updatesWithout}=updates;
    await dbUpdate('ads',adId,updatesWithout);
  }
  const titleEl=document.querySelector('#acard-'+adId+' .ac-t');
  if(titleEl)titleEl.textContent=updates.title||'Ohne Titel';
  const msg=document.getElementById('save-msg-'+adId);
  if(msg){msg.textContent='✓ Gespeichert';setTimeout(()=>{msg.textContent='';},2000);}
  renderSidebar();
}

async function deleteAd(adId){
  if(!confirm('Diese Ad wirklich löschen?'))return;
  await dbDelete('ads',adId);
  ads=ads.filter(a=>a.id!==adId);
  openAdId=null;renderAds();renderSidebar();
}

function roasCls(r){return r>=2.5?'roas-g':r>=1?'roas-a':'roas-r';}
function fmtNum(n){return(+n||0).toLocaleString('de-CH');}

function renderPerformance(){
  // Group by KW
  const weeks=getWeeks();
  const curKW=window.selectedKW||(weeks.length?weeks[weeks.length-1]:'');
  window.selectedKW=curKW;
  const weekData=curKW?metaData.filter(r=>(r.kw||'')=== curKW):metaData;

  const totalSpend=weekData.reduce((s,r)=>s+(+r.spend||0),0);
  const totalRevenue=weekData.reduce((s,r)=>s+(+r.revenue||0),0);
  const totalRoas=totalSpend>0?(totalRevenue/totalSpend):0;
  const totalProfit=totalRevenue-totalSpend;

  // Week selector
  let weekTabs=weeks.map(w=>`<button class="week-tab${w===curKW?' on':''}" onclick="selectKW('${w}')">${w}</button>`).join('');

    <div class="stat-card"><div class="stat-card-lbl">Ad Spend</div><div class="stat-card-val">${fmtCHF(totalSpend)}</div></div>
    <div class="stat-card ${totalRevenue>0?'green':''}"><div class="stat-card-lbl">Revenue</div><div class="stat-card-val">${fmtCHF(totalRevenue)}</div></div>
    <div class="stat-card ${totalRoas>=2?'green':totalRoas>=1?'amber':'red'}"><div class="stat-card-lbl">ROAS</div><div class="stat-card-val">${totalRoas.toFixed(2)}x</div></div>
    <div class="stat-card ${totalProfit>=0?'green':'red'}"><div class="stat-card-lbl">Profit</div><div class="stat-card-val">${fmtCHF(totalProfit)}</div></div>
  </div>`;

  </div>`;

  if(weeks.length>1){
    html+=`<div class="charts-grid">
      <div class="chart-card" style="grid-column:1/-1"><div class="chart-title">ROAS-Verlauf – Top Ads über alle Wochen</div><div class="chart-wrap" style="height:260px"><canvas id="chart-trend"></canvas></div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Spend pro Woche</div><div class="chart-wrap"><canvas id="chart-wk-spend"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">ROAS-Durchschnitt pro Woche</div><div class="chart-wrap"><canvas id="chart-wk-roas"></canvas></div></div>
    </div>`;
  }

  html+=`<div style="background:var(--sur);border:1px solid var(--bd);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);">
      <div style="font-size:13px;font-weight:600;color:var(--tx);">${curKW?'Ads in '+curKW:'Alle Ads'}</div>
      <div style="display:flex;gap:7px;">
        <button class="bsm bsav" onclick="openUploadKW()">+ KW hochladen</button>
        ${curKW?`<button class="bsm bdel" onclick="deleteKW('${curKW}')">KW löschen</button>`:''}
      </div>
    </div>

      <thead><tr><th>Ad Name</th><th>Spend</th><th>Revenue</th><th>ROAS</th><th>Impressionen</th><th>CTR</th><th>Käufe</th></tr></thead>
      <tbody>${sorted.map(r=>`<tr>
        <td>${esc(r.ad_name||'–')}</td>
        <td>${fmtCHF(r.spend)}</td>

      <table class="perf-table">

  }

  document.getElementById('perf-content').innerHTML=html;

}

async function handleKWCsvFile(e){const f=e.target.files[0];if(f){const kw=getUploadKW();await parseCsvWithKW(f,kw);}e.target.value='';}
async function handleKWCsvDrop(e){e.preventDefault();document.getElementById('kw-drop-zone')?.classList.remove('drag-active');const f=e.dataTransfer.files[0];if(f){const kw=getUploadKW();await parseCsvWithKW(f,kw);}}
async function handleCsvFile(e){const f=e.target.files[0];if(f)await parseCsvWithKW(f,'');e.target.value='';}
async function handleCsvDrop(e){e.preventDefault();document.querySelector('.upload-zone')?.classList.remove('drag-active');const f=e.dataTransfer.files[0];if(f)await parseCsvWithKW(f,'');}

function findCol(headers,candidates){
  for(const c of candidates){for(const h of headers){if(h.toLowerCase()===c.toLowerCase())return h;}}
  for(const c of candidates){for(const h of headers){if(h.toLowerCase().startsWith(c.toLowerCase()))return h;}}
  for(const c of candidates){for(const h of headers){if(h.toLowerCase().includes(c.toLowerCase()))return h;}}
  return null;
}

async function parseCsvWithKW(file,kw){
  const zone=document.getElementById('kw-drop-zone');
  if(zone)zone.innerHTML='<div class="upload-zone-title">⏳ Wird verarbeitet...</div>';
  return new Promise(resolve=>{
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:async(result)=>{
      const h=result.meta.fields||[];
      const get=(cands,row)=>{const col=findCol(h,cands);return col?row[col]:'';};
      const toNum=s=>parseFloat(String(s||0).replace(/[^0-9.,-]/g,'').replace(',','.').replace("'",""))||0;
      const toInt=s=>parseInt(String(s||0).replace(/[^0-9]/g,''))||0;
      const rows=result.data.map(row=>{
        const sp=toNum(get(['ausgegebener betrag (chf)','amount spent','ausgegebener betrag'],row));
        const ro=toNum(get(['roas (return on ad spend)','roas für käufe','purchase roas','kauf-roas'],row));
        let rv=toNum(get(['purchase conversion value','kaufkonversionswert','conversion value'],row));
        if(rv===0&&ro>0&&sp>0)rv=Math.round(ro*sp*100)/100;
        return {
          ad_name:get(['name der anzeige','ad name','anzeigenname'],row)||get(['campaign name','kampagnenname'],row)||'',
          campaign_name:get(['campaign name','kampagnenname'],row)||'',
          kw:kw,
          spend:sp,
          impressions:toInt(get(['impressionen','impressions'],row)),
          clicks:toInt(get(['link-klicks','link-clicks','clicks','klicks'],row)),
          purchases:toInt(get(['käufe','purchases','results'],row)),
          revenue:rv,roas:ro,
          ctr:toNum(get(['ctr (link-klickrate)','ctr'],row)),
          cpm:toNum(get(['cpm (kosten','cpm'],row))
        };
      }).map(r=>{
        if((!r.revenue||r.revenue===0)&&r.roas>0&&r.spend>0)r.revenue=Math.round(r.roas*r.spend*100)/100;
        return r;
      }).filter(r=>r.ad_name||r.spend>0);
      if(!rows.length){showToast('❌ Keine Daten gefunden.');if(zone)zone.innerHTML='<div class="upload-zone-title">❌ Keine Daten</div>';resolve();return;}
      try{
        // Delete existing data for this KW first (prevents duplicates)
        if(kw){
          const existing=metaData.filter(m=>m.kw===kw);
          if(existing.length){
            await Promise.all(existing.map(m=>dbDelSerial('meta_performance',m.id)));
            metaData=metaData.filter(m=>m.kw!==kw);
            showToast(`🔄 Alte ${kw}-Daten ersetzt...`);
          }
        }
        const saved=await Promise.all(rows.map(r=>dbInsert('meta_performance',r)));
        saved.forEach(res=>{if(res&&res[0])metaData.push(res[0]);});
        window.selectedKW=kw||getWeeks().slice(-1)[0];
        document.getElementById('perf-modal')?.remove();
        showToast(`✓ ${rows.length} Ads für ${kw||'–'} geladen!`);
        renderPerformance();
      }catch(err){showToast('❌ Fehler: '+err.message);}
      resolve();
    }});
  });
}

async function clearMetaData(){if(!confirm('Alle Meta-Daten löschen?'))return;await Promise.all(metaData.map(m=>dbDelSerial('meta_performance',m.id)));metaData=[];window.selectedKW='';renderPerformance();showToast('✓ Daten gelöscht.');}

function renderPerfCharts(sorted, weeks){
  const top=sorted.slice(0,10);
  const labels=top.map(r=>(r.ad_name||'–').substring(0,20));
  const rv=top.map(r=>+(+r.roas||0).toFixed(2));
  const colors=rv.map(v=>v>=2.5?'rgba(5,150,105,.7)':v>=1?'rgba(217,119,6,.7)':'rgba(220,38,38,.7)');

  if(charts['chart-roas']){charts['chart-roas'].destroy();delete charts['chart-roas'];}
  const c1=document.getElementById('chart-roas');
  if(c1)charts['chart-roas']=new Chart(c1,{type:'bar',data:{labels,datasets:[{label:'ROAS',data:rv,backgroundColor:colors,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{color:'#6B7280',font:{size:11}},grid:{display:false}}}}});

  if(charts['chart-spend']){charts['chart-spend'].destroy();delete charts['chart-spend'];}
  const c2=document.getElementById('chart-spend');
  if(c2)charts['chart-spend']=new Chart(c2,{type:'bar',data:{labels,datasets:[{label:'Spend',data:top.map(r=>+r.spend||0),backgroundColor:'rgba(220,38,38,.6)',borderRadius:4},{label:'Revenue',data:top.map(r=>+r.revenue||0),backgroundColor:'rgba(5,150,105,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:10}},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}}}}});

  // Trend charts across weeks
  if(!weeks||weeks.length<=1)return;

  // ROAS trend: top 5 ads across all weeks
  const allAdNames=[...new Set(metaData.map(r=>r.ad_name).filter(Boolean))];
  const topAds=allAdNames.map(name=>{const d=metaData.filter(r=>r.ad_name===name);return{name,avgRoas:d.reduce((s,r)=>s+(+r.roas||0),0)/d.length,totalSpend:d.reduce((s,r)=>s+(+r.spend||0),0)};}).sort((a,b)=>b.totalSpend-a.totalSpend).slice(0,5);
  const trendColors=['#1D9E75','#2563EB','#7C3AED','#D97706','#DC2626'];

  if(charts['chart-trend']){charts['chart-trend'].destroy();delete charts['chart-trend'];}
  const c3=document.getElementById('chart-trend');
  if(c3)charts['chart-trend']=new Chart(c3,{type:'line',data:{labels:weeks,datasets:topAds.map((ad,i)=>({label:ad.name,data:weeks.map(w=>{const rows=metaData.filter(r=>r.kw===w&&r.ad_name===ad.name);return rows.length?+(rows.reduce((s,r)=>s+(+r.roas||0),0)/rows.length).toFixed(2):null;}),borderColor:trendColors[i],backgroundColor:trendColors[i]+'22',tension:0.3,fill:false,pointRadius:5,pointHoverRadius:7,spanGaps:true}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'},title:{display:true,text:'ROAS',color:'#9CA3AF',font:{size:10}}}}}});

  // Weekly spend chart
  if(charts['chart-wk-spend']){charts['chart-wk-spend'].destroy();delete charts['chart-wk-spend'];}
  const c4=document.getElementById('chart-wk-spend');
  if(c4)charts['chart-wk-spend']=new Chart(c4,{type:'bar',data:{labels:weeks,datasets:[{label:'Spend',data:weeks.map(w=>metaData.filter(r=>r.kw===w).reduce((s,r)=>s+(+r.spend||0),0)),backgroundColor:'rgba(220,38,38,.6)',borderRadius:4},{label:'Revenue',data:weeks.map(w=>metaData.filter(r=>r.kw===w).reduce((s,r)=>s+(+r.revenue||0),0)),backgroundColor:'rgba(5,150,105,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}}}}});

  // Weekly ROAS avg chart
  if(charts['chart-wk-roas']){charts['chart-wk-roas'].destroy();delete charts['chart-wk-roas'];}
  const c5=document.getElementById('chart-wk-roas');
  if(c5){
    const wkRoas=weeks.map(w=>{const d=metaData.filter(r=>r.kw===w&&(+r.spend||0)>0);const sp=d.reduce((s,r)=>s+(+r.spend||0),0);const rv=d.reduce((s,r)=>s+(+r.revenue||0),0);return sp>0?+(rv/sp).toFixed(2):0;});
    const roasColors=wkRoas.map(v=>v>=2.5?'rgba(5,150,105,.7)':v>=1?'rgba(217,119,6,.7)':'rgba(220,38,38,.7)');
    charts['chart-wk-roas']=new Chart(c5,{type:'bar',data:{labels:weeks,datasets:[{label:'ROAS Ø',data:wkRoas,backgroundColor:roasColors,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}}}}});
  }
}

/* ── HOOKS v2 ── */
let hkFilter='all', editingHookId=null, showArchived=false;

function setHkFilter(f){
  hkFilter=f;
  document.querySelectorAll('.hk-filter-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('hkf-'+f)?.classList.add('on');
  renderHooks();
}

function renderHooks(){
  // Sort newest first
  const sorted=[...hooks].sort((a,b)=>{
    const da=a.created_at||a.id||'';
    const db2=b.created_at||b.id||'';
    return db2.localeCompare(da);
  });

  const active=sorted.filter(h=>!h.archived);
  const archived=sorted.filter(h=>h.archived);
  const important=active.filter(h=>h.important);
  const normal=active.filter(h=>!h.important);

  const display = hkFilter==='important'
    ? important
    : [...important,...normal];

  document.getElementById('vh-hooks-sub').textContent=
    `${active.length} aktiv · ${important.length} wichtig · ${archived.length} archiviert`;

  let html='';

  if(hkFilter==='important' && important.length===0){
    html='<div class="empty" style="padding:30px 0;">Noch keine wichtigen Hooks markiert.<br>Klicke auf ⭐ um einen Hook zu markieren.</div>';
  } else {
    display.forEach(hk=>{ html+=renderHookCard(hk); });
  }

  // Archived section
  if(archived.length>0){
    html+=`<div class="hk-archived-toggle" onclick="toggleArchived()">
      <span>${showArchived?'▼':'▶'}</span>
      <span>Archiviert (${archived.length})</span>
    </div>`;
    if(showArchived){
      archived.forEach(hk=>{ html+=renderHookCard(hk); });
    }
  }

  document.getElementById('hooks-list').innerHTML=html;
}

function renderHookCard(hk){
  const isEditing=editingHookId===hk.id;
  return `<div class="hk-card${hk.important?' important':''}${hk.archived?' archived':''}">
    <div class="hk-top">
      <span class="hk-star${hk.important?' on':''}" onclick="toggleImportant('${hk.id}')" title="Als wichtig markieren">⭐</span>
      ${isEditing
        ? `<textarea class="hk-edit-ta" id="hk-edit-${hk.id}" onkeydown="hkEditKey(event,'${hk.id}')">${esc(hk.text)}</textarea>`
        : `<div class="hk-text">${esc(hk.text)}</div>`
      }
    </div>
    ${hk.video_url?`<a href="${esc(hk.video_url)}" target="_blank" class="hk-video-link">🎬 Video ansehen</a>`:''}
    <div class="hk-actions">
      ${isEditing
        ? `<button class="hk-act-btn teal" onclick="saveHookEdit('${hk.id}')">✓ Speichern</button>
           <button class="hk-act-btn" onclick="cancelHookEdit()">Abbrechen</button>`
        : `<button class="hk-act-btn" onclick="startEditHook('${hk.id}')">✏️ Bearbeiten</button>
           <button class="hk-act-btn${hk.important?' amber':''}" onclick="toggleImportant('${hk.id}')">${hk.important?'⭐ Wichtig':'☆ Markieren'}</button>
           <button class="hk-act-btn" onclick="addVideoLink('${hk.id}')">${hk.video_url?'🎬 Link ändern':'🎬 Video hinzufügen'}</button>
           ${!hk.archived
             ? `<button class="hk-act-btn red" onclick="archiveHook('${hk.id}')" title="Archivieren">📁 Archivieren</button>`
             : `<button class="hk-act-btn" onclick="unarchiveHook('${hk.id}')">↩ Wiederherstellen</button>`
           }`
      }
    </div>
  </div>`;
}

function toggleArchived(){ showArchived=!showArchived; renderHooks(); }

function startEditHook(id){ editingHookId=id; renderHooks(); setTimeout(()=>{ const ta=document.getElementById('hk-edit-'+id); if(ta){ta.focus();ta.selectionStart=ta.value.length;} },50); }
function cancelHookEdit(){ editingHookId=null; renderHooks(); }
function hkEditKey(e,id){ if(e.key==='Escape')cancelHookEdit(); if(e.key==='Enter'&&e.metaKey)saveHookEdit(id); }

async function saveHookEdit(id){
  const ta=document.getElementById('hk-edit-'+id);
  if(!ta||!ta.value.trim()){cancelHookEdit();return;}
  const hk=hooks.find(h=>h.id===id);
  if(hk){ hk.text=ta.value.trim(); await dbUpdate('hooks',id,{text:hk.text}); }
  editingHookId=null; renderHooks();
}

async function toggleImportant(id){
  const hk=hooks.find(h=>h.id===id);
  if(!hk)return;
  hk.important=!hk.important;
  try{ await dbUpdate('hooks',id,{important:hk.important}); }catch(e){ /* column may not exist yet */ }
  renderHooks();
}

async function addVideoLink(id){
  const hk=hooks.find(h=>h.id===id);
  if(!hk)return;
  const url=prompt('Video URL eingeben (Instagram, TikTok, YouTube...):', hk.video_url||'');
  if(url===null)return;
  hk.video_url=url.trim();
  try{ await dbUpdate('hooks',id,{video_url:hk.video_url}); }catch(e){ /* column may not exist */ }
  renderHooks();
}

async function archiveHook(id){
  const hk=hooks.find(h=>h.id===id);
  if(!hk)return;
  hk.archived=true;
  try{ await dbUpdate('hooks',id,{archived:true}); }catch(e){ /* column may not exist */ }
  renderHooks(); showToast('📁 Hook archiviert');
}

async function unarchiveHook(id){
  const hk=hooks.find(h=>h.id===id);
  if(!hk)return;
  hk.archived=false;
  try{ await dbUpdate('hooks',id,{archived:false}); }catch(e){ /* column may not exist */ }
  renderHooks();
}

async function togHook(id){ archiveHook(id); }

async function addHook(){
  const inp=document.getElementById('nh-in');
  if(!inp||!inp.value.trim())return;
  const newHook={text:inp.value.trim(),selected:false,important:false,archived:false,video_url:''};
  try{
    const result=await dbInsert('hooks',newHook);
    if(result)hooks.unshift(result[0]);
  }catch(e){
    // fallback minimal insert
    const result=await dbInsert('hooks',{text:inp.value.trim(),selected:false});
    if(result)hooks.unshift(result[0]);
  }
  inp.value=''; renderHooks();
}

/* ── SETTINGS ── */
function renderSettings(){
  document.getElementById('settings-content').innerHTML=`
    <div class="vh"><div class="vh-title">Einstellungen</div></div>
    <div class="fcard" style="margin-bottom:14px;">
      <div style="font-size:15px;font-weight:600;color:var(--tx);margin-bottom:16px;">Supabase Verbindung</div>
      <div class="fg"><label class="fl">Project URL</label><input type="text" id="s-url" value="${localStorage.getItem('sb_url')||''}"></div>
      <div class="fg"><label class="fl">Anon Key</label><input type="text" id="s-key" value="${localStorage.getItem('sb_key')||''}"></div>
      <button class="bp" onclick="updateConfig()">Speichern</button>
    </div>
    <div class="fcard">
      <div style="font-size:15px;font-weight:600;color:var(--tx);margin-bottom:12px;">Daten</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:14px;">${ads.length} Ads · ${hooks.length} Hooks · ${metaData.length} Meta-Einträge</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="bp" onclick="reloadAll()">Daten neu laden</button>
        <button class="bsm bdel" onclick="disconnect()">Supabase trennen</button>
      </div>
    </div>`;
}
function updateConfig(){const url=document.getElementById('s-url').value.trim();const key=document.getElementById('s-key').value.trim();localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);initSB(url,key);showToast('✓ Gespeichert!');}
async function reloadAll(){document.getElementById('loading').style.display='flex';await loadAll();document.getElementById('loading').style.display='none';renderSidebar();renderSettings();showToast('✓ Daten aktualisiert.');}
function disconnect(){localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');location.reload();}

/* ── EXPORT ── */
function exportData(){
  const blob=new Blob([JSON.stringify({exportDate:new Date().toLocaleDateString('de-CH'),hinweis:'Schick mir diese Datei im Chat und sag mir was du ändern möchtest!',ads,hooks,metaData,financials},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`moov_export_${new Date().toISOString().split('T')[0]}.json`});
  a.click();URL.revokeObjectURL(a.href);
  showToast('📤 Exportiert!\nSchick die Datei im Chat für Anpassungen.');
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg.replace('\n','<br>');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── BOOT ── */
(function(){
  const url=localStorage.getItem('sb_url');
  const key=localStorage.getItem('sb_key');
  if(url&&key){initSB(url,key);startApp();}
})();
</script>
