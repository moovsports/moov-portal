<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOOV Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<style>
:root{
  --bg:#0a0a0a;--sur:#141414;--sur2:#1c1c1c;--sur3:#252525;
  --bd:rgba(255,255,255,.07);--bds:rgba(255,255,255,.13);
  --tx:#e8e8e8;--tx2:#777;--tx3:#3a3a3a;
  --acc:#C4FF45;--acc-d:rgba(196,255,69,.08);--acc-g:rgba(196,255,69,.18);
  --red:#FF5F5F;--red-d:rgba(255,95,95,.08);
  --green:#7FFF47;--green-d:rgba(127,255,71,.08);
  --amber:#F5A623;--amber-d:rgba(245,166,35,.08);
  --blue:#4DA6FF;--purple:#B97FFF;
  --sk-c:#666;--au-c:#F5A623;--sc-c:#4DA6FF;--te-c:#B97FFF;--wi-c:#7FFF47;--lo-c:#FF5F5F;
  --sk-bg:rgba(255,255,255,.04);--au-bg:rgba(245,166,35,.09);--sc-bg:rgba(77,166,255,.09);
  --te-bg:rgba(185,127,255,.09);--wi-bg:rgba(127,255,71,.09);--lo-bg:rgba(255,95,95,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── SETUP ── */
#setup{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-card{background:var(--sur);border:1px solid var(--bd);border-radius:16px;padding:40px;width:100%;max-width:480px;}
.setup-logo{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.setup-sub{font-size:13px;color:var(--tx2);margin-bottom:32px;line-height:1.6;}
.setup-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:5px;}
.setup-input{width:100%;font-family:'DM Mono',monospace;font-size:12px;color:var(--tx);background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;outline:none;margin-bottom:14px;transition:border-color .15s;}
.setup-input:focus{border-color:var(--acc);}
.setup-input::placeholder{color:var(--tx3);}
.setup-btn{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:12px;border-radius:8px;background:var(--acc);color:#000;border:none;cursor:pointer;margin-top:4px;transition:all .15s;}
.setup-btn:hover{background:#d4ff55;}
.setup-hint{font-size:12px;color:var(--tx2);margin-top:14px;line-height:1.6;}
.setup-hint a{color:var(--acc);text-decoration:none;}
.setup-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

/* ── SHELL ── */
.shell{display:flex;height:100vh;}

/* ── SIDEBAR ── */
.sb{width:210px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;}
.sb-top{padding:18px 16px 12px;}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--acc);letter-spacing:.1em;text-transform:uppercase;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);letter-spacing:.15em;margin-top:2px;}
.div{height:1px;background:var(--bd);margin:2px 0;}
.sb-nav{padding:5px 8px;}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .13s;text-align:left;}
.nb:hover{background:var(--sur2);color:var(--tx);}
.nb.on{background:var(--sur2);color:var(--tx);font-weight:500;}
.nb-ic{font-size:13px;flex-shrink:0;width:18px;text-align:center;opacity:.8;}
.nb.on .nb-ic{opacity:1;}
.nb-cnt{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);}
.nb.on .nb-cnt{color:var(--tx2);}
.sb-section{padding:5px 8px;}
.sb-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;padding:0 10px;margin-bottom:3px;}
.sf{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:7px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:all .12s;}
.sf:hover{background:var(--sur2);}
.sf.on{background:var(--sur2);}
.sf-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sf-lbl{font-size:12px;color:var(--tx2);flex:1;}
.sf.on .sf-lbl{color:var(--tx);}
.sf-n{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);}
.sb-stats{padding:10px 16px 10px;border-top:1px solid var(--bd);}
.stat-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.stat-lbl{font-size:12px;color:var(--tx2);flex:1;}
.stat-n{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.sb-foot{padding:8px;border-top:1px solid var(--bd);}
.sb-foot-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--tx2);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all .13s;text-align:left;}
.sb-foot-btn:hover{background:var(--sur2);color:var(--tx);}
.export-btn{border:1px solid rgba(196,255,69,.2);background:var(--acc-d);color:var(--acc);}
.export-btn:hover{background:var(--acc-g) !important;border-color:rgba(196,255,69,.4);color:var(--acc) !important;}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.view{display:none;height:100%;overflow-y:auto;}
.view.on{display:block;}
.view::-webkit-scrollbar{width:5px;}
.view::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}
.pad{padding:24px 28px 60px;}
.vh{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;}
.vh-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--tx);}
.vh-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);}

/* PIPELINE = no-overflow, flex */
#vw-pipeline{display:none;flex-direction:column;overflow:hidden;}
#vw-pipeline.on{display:flex;}
.pipe-head{padding:22px 22px 12px;flex-shrink:0;}
.kb-wrap{display:flex;gap:12px;flex:1;overflow-x:auto;overflow-y:hidden;padding:0 22px 22px;align-items:flex-start;}
.kb-wrap::-webkit-scrollbar{height:5px;}
.kb-wrap::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}
.kb-col{flex-shrink:0;width:205px;background:var(--sur);border:1px solid var(--bd);border-radius:12px;display:flex;flex-direction:column;max-height:100%;transition:border-color .15s,background .15s;}
.kb-col.dov{border-color:var(--acc);background:rgba(196,255,69,.03);}
.kb-col.dov-w{border-color:var(--wi-c);background:rgba(127,255,71,.04);}
.kb-col.dov-l{border-color:var(--lo-c);background:rgba(255,95,95,.04);}
.kb-col.col-wi{border-color:rgba(127,255,71,.12);}
.kb-col.col-lo{border-color:rgba(255,95,95,.12);}
.kb-hdr{padding:10px 13px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.kb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.kb-name{font-size:12px;font-weight:500;color:var(--tx);flex:1;}
.kb-cnt{font-family:'DM Mono',monospace;font-size:11px;color:var(--tx3);}
.kb-body{flex:1;overflow-y:auto;padding:7px;min-height:40px;}
.kb-body::-webkit-scrollbar{width:3px;}
.kb-body::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px;}
.kb-foot{padding:5px 7px 7px;flex-shrink:0;}
.kc{background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;margin-bottom:5px;cursor:grab;transition:all .15s;user-select:none;}
.kc:hover{border-color:var(--bds);background:var(--sur3);}
.kc.dragging{opacity:.35;transform:scale(.97);}
.kc-title{font-size:12px;font-weight:500;color:var(--tx);line-height:1.4;}
.kc-type{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);margin-top:4px;text-transform:uppercase;}
.kc-hint{font-size:10px;color:var(--tx3);margin-top:5px;opacity:0;transition:opacity .13s;}
.kc:hover .kc-hint{opacity:1;}
.kb-add{display:flex;align-items:center;gap:5px;width:100%;padding:5px 7px;border-radius:7px;border:none;background:transparent;color:var(--tx3);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .13s;}
.kb-add:hover{background:var(--sur2);color:var(--tx2);}

/* ADS LIST */
.ac{background:var(--sur);border:1px solid var(--bd);border-radius:12px;margin-bottom:7px;overflow:hidden;transition:border-color .15s;}
.ac:hover{border-color:var(--bds);}
.ac.exp{border-color:var(--bds);}
.ac-h{display:flex;align-items:center;gap:11px;padding:13px 17px;cursor:pointer;user-select:none;}
.pipe-dots{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.pd{width:5px;height:5px;border-radius:50%;background:var(--sur3);transition:all .18s;}
.pd.act{width:16px;border-radius:3px;}
.pd.dn{background:var(--sur3);opacity:.4;}
.pd.csk{background:var(--sk-c);}.pd.cau{background:var(--au-c);}.pd.csc{background:var(--sc-c);}
.pd.cte{background:var(--te-c);}.pd.cwi{background:var(--wi-c);}.pd.clo{background:var(--lo-c);}
.ac-t{font-size:14px;font-weight:500;color:var(--tx);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.typ{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--bd);color:var(--tx3);flex-shrink:0;text-transform:uppercase;}
.sbb{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.sbb.csk{background:var(--sk-bg);color:var(--sk-c);}.sbb.cau{background:var(--au-bg);color:var(--au-c);}
.sbb.csc{background:var(--sc-bg);color:var(--sc-c);}.sbb.cte{background:var(--te-bg);color:var(--te-c);}
.sbb.cwi{background:var(--wi-bg);color:var(--wi-c);}.sbb.clo{background:var(--lo-bg);color:var(--lo-c);}
.arr{font-size:9px;color:var(--tx3);flex-shrink:0;transition:transform .2s;}
.arr.open{transform:rotate(180deg);}
.ac-b{border-top:1px solid var(--bd);padding:16px 18px 18px;animation:fd .15s ease;}
@keyframes fd{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
.ml{font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:7px;}
.ss-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;}
.ss{font-size:11px;font-family:'DM Mono',monospace;padding:5px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;transition:all .13s;}
.ss:hover{border-color:var(--bds);color:var(--tx);}
.ss.on{border-color:transparent;}
.ss.on.csk{background:var(--sk-bg);color:var(--sk-c);}.ss.on.cau{background:var(--au-bg);color:var(--au-c);}
.ss.on.csc{background:var(--sc-bg);color:var(--sc-c);}.ss.on.cte{background:var(--te-bg);color:var(--te-c);}
.ss.on.cwi{background:var(--wi-bg);color:var(--wi-c);}.ss.on.clo{background:var(--lo-bg);color:var(--lo-c);}
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.hook-disp{font-size:13px;color:var(--tx2);font-style:italic;line-height:1.65;margin-bottom:12px;padding:9px 12px;border-left:2px solid var(--acc);background:var(--acc-d);border-radius:0 7px 7px 0;}
.scr{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--tx2);line-height:1.85;background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:12px 13px;white-space:pre-wrap;max-height:200px;overflow-y:auto;}
.scr::-webkit-scrollbar{width:3px;}.scr::-webkit-scrollbar-thumb{background:var(--bds);border-radius:2px;}
.nt{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tx);background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;resize:vertical;min-height:100px;outline:none;transition:border-color .15s;}
.nt:focus{border-color:var(--acc);}
.nt::placeholder{color:var(--tx3);}
.rbtns{display:flex;gap:7px;margin-top:10px;}
.bsm{font-size:12px;font-family:'DM Sans',sans-serif;padding:6px 13px;border-radius:7px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;transition:all .15s;}
.bsm:hover{border-color:var(--bds);color:var(--tx);}
.bdel{color:var(--lo-c);border-color:rgba(255,95,95,.18);}.bdel:hover{background:var(--lo-bg);}
.bsav{color:var(--acc);border-color:rgba(196,255,69,.22);}.bsav:hover{background:var(--acc-d);}

/* STAT CARDS */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;}
.card-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.card-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--tx);}
.card-sub{font-size:12px;color:var(--tx2);margin-top:3px;}
.card.green .card-val{color:var(--green);}
.card.red .card-val{color:var(--red);}
.card.amber .card-val{color:var(--amber);}

/* PERFORMANCE */
.upload-zone{border:1px dashed var(--bds);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:20px;}
.upload-zone:hover{border-color:var(--acc);background:var(--acc-d);}
.upload-zone.drag-active{border-color:var(--acc);background:var(--acc-d);}
.upload-zone-title{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:4px;}
.upload-zone-sub{font-size:12px;color:var(--tx2);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.chart-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:18px;}
.chart-title{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:14px;}
.chart-wrap{position:relative;height:220px;}
.perf-table{width:100%;border-collapse:collapse;}
.perf-table th{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd);}
.perf-table td{font-size:13px;color:var(--tx2);padding:9px 12px;border-bottom:1px solid var(--bd);}
.perf-table tr:last-child td{border-bottom:none;}
.perf-table tr:hover td{background:var(--sur2);}
.perf-table td:first-child{color:var(--tx);font-weight:500;}
.roas-badge{font-family:'DM Mono',monospace;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.roas-g{background:var(--wi-bg);color:var(--wi-c);}
.roas-a{background:var(--au-bg);color:var(--au-c);}
.roas-r{background:var(--lo-bg);color:var(--lo-c);}

/* FINANCIAL */
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fin-left{display:flex;flex-direction:column;gap:12px;}
.fin-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:18px;}
.fin-card-title{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:14px;}
.fin-entry-list{max-height:300px;overflow-y:auto;}
.fin-entry{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);}
.fin-entry:last-child{border-bottom:none;}
.fin-entry-cat{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.fin-entry-desc{font-size:13px;color:var(--tx2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fin-entry-amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;flex-shrink:0;}
.fin-entry-date{font-size:11px;color:var(--tx3);flex-shrink:0;}
.fin-entry-del{font-size:11px;color:var(--tx3);background:none;border:none;cursor:pointer;opacity:0;transition:opacity .13s;padding:2px 5px;}
.fin-entry:hover .fin-entry-del{opacity:1;}
.fin-entry-del:hover{color:var(--red);}

/* HOOKS */
.hooks-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.hk{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border:1px solid var(--bd);border-radius:10px;cursor:pointer;background:var(--sur);transition:all .15s;}
.hk:hover{border-color:var(--bds);}
.hk.sel{border-color:rgba(196,255,69,.35);background:rgba(196,255,69,.04);}
.hk-box{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--bds);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .15s;}
.hk.sel .hk-box{background:var(--acc);border-color:var(--acc);color:#000;}
.hk-txt{font-size:13px;color:var(--tx2);line-height:1.6;}
.hk.sel .hk-txt{color:var(--tx);}

/* FORM */
.fcard{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:24px;max-width:540px;}
.fg{margin-bottom:14px;}
.fl{display:block;font-family:'DM Mono',monospace;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;}
input[type=text],input[type=number],input[type=date],textarea,select{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tx);background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:9px 11px;outline:none;transition:border-color .15s;}
input[type=text]:focus,input[type=number]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--acc);}
input::placeholder,textarea::placeholder{color:var(--tx3);}
textarea{resize:vertical;min-height:80px;}
select option{background:#1c1c1c;}
.bp{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 22px;border-radius:8px;background:var(--acc);color:#000;border:none;cursor:pointer;transition:all .15s;}
.bp:hover{background:#d4ff55;}

/* SETTINGS */
.settings-section{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:14px;max-width:540px;}
.settings-title{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:14px;}
.danger-btn{font-size:13px;padding:8px 18px;border-radius:8px;border:1px solid rgba(255,95,95,.3);background:var(--red-d);color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* UTILS */
.empty{text-align:center;padding:60px 0;color:var(--tx3);font-size:13px;}
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,10,.8);display:flex;align-items:center;justify-content:center;z-index:200;font-size:13px;color:var(--tx2);}
.toast{position:fixed;bottom:22px;right:22px;background:var(--sur3);border:1px solid var(--bds);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--tx);z-index:1000;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;max-width:280px;line-height:1.5;}
.toast.show{opacity:1;transform:none;}
.msg-ok{font-family:'DM Mono',monospace;font-size:11px;color:var(--wi-c);margin-top:8px;}
.sep{height:1px;background:var(--bd);margin:16px 0;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bds);border-radius:3px;}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">MOOV</div>
    <div class="setup-sub">Portal einrichten – verbinde dein Supabase Projekt um zu starten.</div>
    <label class="setup-label">Supabase Project URL</label>
    <input class="setup-input" id="cfg-url" type="text" placeholder="https://xxxxx.supabase.co">
    <label class="setup-label">Supabase Anon Key</label>

const COLS=[

];
function stC(id){return STATUSES.find(s=>s.id===id)?.cls||'csk';}
function stL(id){return STATUSES.find(s=>s.id===id)?.label||id;}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtCHF(n){return'CHF '+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,"'");}
function fmtPct(n){return(+n||0).toFixed(1)+'%';}
function fmtNum(n){return(+n||0).toLocaleString('de-CH');}
function roasCls(r){return r>=2.5?'roas-g':r>=1?'roas-a':'roas-r';}
function pipeDots(status){
  const s=STATUSES.find(x=>x.id===status),pi=s?.pi??0,ec=status==='winner'?'cwi':'clo';
  return [{c:'csk'},{c:'cau'},{c:'csc'},{c:'cte'},{c:ec}].map((p,i)=>{
    if(i===pi)return`<div class="pd act ${p.c}"></div>`;
    if(i<pi)return`<div class="pd dn"></div>`;
    return`<div class="pd"></div>`;
  }).join('');
}

/* ── STATE ── */
let sb=null, ads=[], hooks=[], metaData=[], financials=[];
let curTab='pipeline', openAdId=null, dragId=null, curAdFilter='all';
const charts={};

/* ── SUPABASE ── */
function initSB(url,key){
  const {createClient}=supabase;
  sb=createClient(url,key);
}
async function dbGet(table){
  const {data,error}=await sb.from(table).select('*').order('created_at',{ascending:true});
  if(error)throw error;
  return data||[];
}
async function dbInsert(table,row){
  const {data,error}=await sb.from(table).insert(row).select();
  if(error)throw error;
  return data;
}
async function dbUpdate(table,id,row){
  const {error}=await sb.from(table).update(row).eq('id',id);
  if(error)throw error;
}
async function dbDelete(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error)throw error;
}
async function dbDeleteSerial(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error)throw error;
}

/* ── SETUP ── */
async function saveConfig(){
  const url=document.getElementById('cfg-url').value.trim();
  const key=document.getElementById('cfg-key').value.trim();
  if(!url||!key)return;
  try{
    initSB(url,key);
    await sb.from('ads').select('id').limit(1);
    localStorage.setItem('sb_url',url);
    localStorage.setItem('sb_key',key);
    document.getElementById('setup-err').style.display='none';
    startApp();
  }catch(e){
    document.getElementById('setup-err').style.display='block';
  }
}

/* ── INIT ── */
async function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='flex';
  try{
    await loadAll();
    if(!ads.length) await seedDefaults();
    document.getElementById('loading').style.display='none';
    renderSidebar();
    renderPipeline();
  }catch(e){
    document.getElementById('loading').textContent='Fehler beim Laden: '+e.message;
  }
}

async function loadAll(){
  [ads,hooks,metaData,financials]=await Promise.all([
    dbGet('ads'),
    dbGet('hooks'),
    dbGet('meta_performance').catch(()=>[]),
    dbGet('financials').catch(()=>[])
  ]);
}

/* ── NAV ── */
function sw(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('nb-'+t);
  if(btn)btn.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('vw-'+t).classList.add('on');
  const isAds=t==='ads';
  document.getElementById('sb-filters').style.opacity=isAds?'1':'0.3';
  document.getElementById('sb-filters').style.pointerEvents=isAds?'auto':'none';
  if(t==='pipeline')renderPipeline();
  else if(t==='ads')renderAds();
  else if(t==='performance')renderPerformance();
  else if(t==='finanzen')renderFinanzen();
  else if(t==='hooks')renderHooks();
  else if(t==='new')renderNewAd();
  else if(t==='settings')renderSettings();
}

/* ── SIDEBAR ── */
function renderSidebar(){
  const cn={};STATUSES.forEach(s=>{cn[s.id]=ads.filter(a=>a.status===s.id).length;});
  document.getElementById('cnt-ads').textContent=ads.length;
  document.getElementById('cnt-hooks').textContent=hooks.length;
  let sf=`<button class="sf ${curAdFilter==='all'?'on':''}" onclick="setAF('all')"><div class="sf-dot" style="background:var(--tx3)"></div><span class="sf-lbl">Alli</span><span class="sf-n">${ads.length}</span></button>`;
  STATUSES.forEach(s=>{sf+=`<button class="sf ${curAdFilter===s.id?'on':''}" onclick="setAF('${s.id}')"><div class="sf-dot" style="background:${s.dot}"></div><span class="sf-lbl">${s.label}</span><span class="sf-n">${cn[s.id]||''}</span></button>`;});
  document.getElementById('sf-list').innerHTML=sf;
  const wi=cn.winner||0,lo=cn.loser||0,te=cn.testen||0,au=cn.aufnehmen||0;
  document.getElementById('sb-stats-inner').innerHTML=
    `<div class="stat-row"><div class="stat-dot" style="background:var(--wi-c)"></div><span class="stat-lbl">Winner</span><span class="stat-n" style="color:var(--wi-c)">${wi}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:var(--te-c)"></div><span class="stat-lbl">Testen</span><span class="stat-n" style="color:var(--te-c)">${te}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:var(--au-c)"></div><span class="stat-lbl">Aufnehmen</span><span class="stat-n" style="color:var(--au-c)">${au}</span></div>
     <div class="stat-row"><div class="stat-dot" style="background:var(--lo-c)"></div><span class="stat-lbl">Loser</span><span class="stat-n" style="color:var(--lo-c)">${lo}</span></div>`;
}

/* ── PIPELINE ── */
function renderPipeline(){
  renderSidebar();
  const wi=ads.filter(a=>a.status==='winner').length;
  document.getElementById('pipe-sub').textContent=`${ads.length} Ads · ${wi} Winner`;
  let html='';
  COLS.forEach(col=>{
    const colAds=ads.filter(a=>a.status===col.id);
    const cards=colAds.map(ad=>`
      <div class="kc" id="kc-${ad.id}" draggable="true"
        ondragstart="onDS(event,'${ad.id}')" ondragend="onDE()"
        onclick="openAdFromPipeline('${ad.id}')">
        <div class="kc-title">${esc(ad.title)}</div>
        ${ad.type?`<div class="kc-type">${esc(ad.type)}</div>`:''}
        <div class="kc-hint">↗ Detail öffne</div>
      </div>`).join('');
    const addBtn=col.id==='skript'?`<button class="kb-add" onclick="sw('new')"><span style="font-size:14px">+</span> Neue Ad</button>`:'';
    html+=`<div class="kb-col ${col.extra}" id="kbc-${col.id}"
      ondragover="onDO(event,'${col.id}')" ondragleave="onDL(event,'${col.id}')" ondrop="onDrop(event,'${col.id}')">
      <div class="kb-hdr"><div class="kb-dot" style="background:${col.color}"></div><div class="kb-name">${col.label}</div><div class="kb-cnt">${colAds.length}</div></div>
      <div class="kb-body">${cards}</div>
      <div class="kb-foot">${addBtn}</div>
    </div>`;
  });
  document.getElementById('kanban').innerHTML=html;
}
function openAdFromPipeline(id){openAdId=id;sw('ads');}
function onDS(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('kc-'+id);if(el)el.classList.add('dragging');},0);}
function onDE(){if(dragId){const el=document.getElementById('kc-'+dragId);if(el)el.classList.remove('dragging');}dragId=null;document.querySelectorAll('.kb-col').forEach(el=>el.classList.remove('dov','dov-w','dov-l'));}
function onDO(e,col){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.kb-col').forEach(el=>el.classList.remove('dov','dov-w','dov-l'));const el=document.getElementById('kbc-'+col);if(el)el.classList.add(col==='winner'?'dov-w':col==='loser'?'dov-l':'dov');}
function onDL(e,col){if(!e.currentTarget.contains(e.relatedTarget)){const el=document.getElementById('kbc-'+col);if(el)el.classList.remove('dov','dov-w','dov-l');}}
async function onDrop(e,col){
  e.preventDefault();
  const ad=ads.find(a=>a.id===dragId);
  if(ad&&ad.status!==col){
    ad.status=col;
    await dbUpdate('ads',ad.id,{status:col});
    if(col==='winner')showToast(`⭐ ${esc(ad.title)}\nAls Winner markiert!`);
    else if(col==='loser')showToast(`❌ ${esc(ad.title)}\nAls Loser markiert.`);
    else showToast(`✓ Status → ${stL(col)}`);
    renderPipeline();renderSidebar();
  }
  onDE();
}

/* ── ADS ── */
function setAF(f){curAdFilter=f;renderAds();}
function renderAds(){
  renderSidebar();
  const fil=curAdFilter==='all'?ads:ads.filter(a=>a.status===curAdFilter);
  let html=`<div class="vh"><div class="vh-title">${curAdFilter==='all'?'Ads':stL(curAdFilter)}</div><div class="vh-sub">${fil.length} Ad${fil.length!==1?'s':''}</div></div>`;
  if(!fil.length){html+=`<div class="empty">Kei Ads i dem Status.</div>`;document.getElementById('ads-content').innerHTML=html;return;}
  fil.forEach(ad=>{
    const sc=stC(ad.status),sl=stL(ad.status),isO=openAdId===ad.id;
    html+=`<div class="ac${isO?' exp':''}" id="acard-${ad.id}">
      <div class="ac-h" onclick="togAd('${ad.id}')">
        <div class="pipe-dots">${pipeDots(ad.status)}</div>
        <div class="ac-t">${esc(ad.title)}</div>
        ${ad.type?`<span class="typ">${esc(ad.type)}</span>`:''}
        <span class="sbb ${sc}">${sl}</span>
        <span class="arr${isO?' open':''}">▼</span>
      </div>`;
    if(isO){
      const ssO=STATUSES.map(s=>`<button class="ss${ad.status===s.id?' on '+s.cls:''}" onclick="setAdStatus('${ad.id}','${s.id}')">${s.label}</button>`).join('');
      html+=`<div class="ac-b">
        <div class="ml">Status änderä</div><div class="ss-row">${ssO}</div>
        <div class="body-grid">
          <div>
            ${ad.hook?`<div class="ml">Hook</div><div class="hook-disp">${esc(ad.hook)}</div>`:''}
            ${ad.script?`<div class="ml">Script</div><div class="scr">${esc(ad.script)}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <div class="ml">Notize</div>
            <textarea class="nt" id="nt-${ad.id}" placeholder="Zuesätzlichi Notize, Ideen...">${esc(ad.notes||'')}</textarea>
            <div class="rbtns">
              <button class="bsm bsav" onclick="saveNote('${ad.id}')">Speichere</button>
              <button class="bsm bdel" onclick="deleteAd('${ad.id}')">Lösche</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });
  document.getElementById('ads-content').innerHTML=html;
  if(openAdId){setTimeout(()=>{const el=document.getElementById('acard-'+openAdId);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);}
}
function togAd(id){
  if(openAdId===id){openAdId=null;}
  else{
    if(openAdId){const ta=document.getElementById('nt-'+openAdId);if(ta){const ad=ads.find(a=>a.id===openAdId);if(ad)ad.notes=ta.value;}}
    openAdId=id;
  }
  renderAds();
}
async function setAdStatus(adId,status){
  const ta=document.getElementById('nt-'+adId);
  const ad=ads.find(a=>a.id===adId);
  if(ad){
    if(ta)ad.notes=ta.value;
    ad.status=status;
    await dbUpdate('ads',adId,{status,notes:ad.notes});
    if(status==='winner')showToast(`⭐ Als Winner markiert!`);
    else if(status==='loser')showToast(`❌ Als Loser markiert.`);
    renderAds();renderSidebar();
  }
}
async function saveNote(adId){
  const ta=document.getElementById('nt-'+adId);
  const ad=ads.find(a=>a.id===adId);
  if(ad&&ta){
    ad.notes=ta.value;
    await dbUpdate('ads',adId,{notes:ta.value});
    ta.style.borderColor='var(--acc)';ta.style.boxShadow='0 0 0 2px var(--acc-d)';
    setTimeout(()=>{ta.style.borderColor='';ta.style.boxShadow='';},1300);
  }
}
async function deleteAd(adId){

  await dbDelete('ads',adId);

/* ── PERFORMANCE ── */

  const totalRevenue=metaData.reduce((s,r)=>s+(+r.revenue||0),0);
  const totalRoas=totalSpend>0?(totalRevenue/totalSpend):0;
  const totalProfit=totalRevenue-totalSpend;
  let html=`
    <div class="vh"><div class="vh-title">Performance</div><div class="vh-sub">${metaData.length} Datensätze</div></div>
    <div class="cards-row">
      <div class="card"><div class="card-lbl">Ad Spend</div><div class="card-val">${fmtCHF(totalSpend)}</div><div class="card-sub">Total ausgegeben</div></div>
      <div class="card ${totalRevenue>0?'green':''}"><div class="card-lbl">Revenue</div><div class="card-val">${fmtCHF(totalRevenue)}</div><div class="card-sub">Total Einnahmen</div></div>
      <div class="card ${totalRoas>=2?'green':totalRoas>=1?'amber':'red'}"><div class="card-lbl">ROAS</div><div class="card-val">${totalRoas.toFixed(2)}x</div><div class="card-sub">Return on Ad Spend</div></div>
      <div class="card ${totalProfit>=0?'green':'red'}"><div class="card-lbl">Profit</div><div class="card-val">${fmtCHF(totalProfit)}</div><div class="card-sub">${totalProfit>=0?'Im Plus 🎉':'Im Minus'}</div></div>
    </div>`;
  if(!metaData.length){
    html+=`
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('csv-input').click()"
        ondragover="event.preventDefault();this.classList.add('drag-active')"
        ondragleave="this.classList.remove('drag-active')"
        ondrop="handleCsvDrop(event)">
        <div class="upload-zone-title">📊 Meta CSV hochladen</div>
        <div class="upload-zone-sub">Klicke oder ziehe deine Meta Ads Manager CSV-Datei hierher</div>
      </div>
      <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCsvFile(event)">
      <div style="font-size:12px;color:var(--tx2);max-width:500px;line-height:1.7;">
        <strong style="color:var(--tx);">So exportierst du die CSV aus Meta:</strong><br>
        Meta Ads Manager → Berichte → Spalten anpassen → folgende auswählen:<br>
        Anzeigenname, Ausgegebener Betrag, Impressionen, Klicks, CTR, CPM, Käufe, Kaufkonversionswert, Kauf-ROAS → Exportieren als CSV
      </div>`;
  } else {
    const sorted=[...metaData].sort((a,b)=>(+b.roas||0)-(+a.roas||0));
    html+=`
      <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
        <button class="bsm bsav" onclick="document.getElementById('csv-input2').click()">+ Weitere CSV laden</button>
        <input type="file" id="csv-input2" accept=".csv" style="display:none" onchange="handleCsvFile(event)">
        <button class="bsm bdel" onclick="clearMetaData()">Alle löschen</button>
      </div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">ROAS pro Ad</div>
          <div class="chart-wrap"><canvas id="chart-roas"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Spend vs Revenue</div>
          <div class="chart-wrap"><canvas id="chart-spend"></canvas></div>
        </div>
      </div>
      <div style="background:var(--sur);border:1px solid var(--bd);border-radius:12px;overflow:hidden;">
        <table class="perf-table">
          <thead><tr>
            <th>Ad Name</th><th>Spend</th><th>Revenue</th><th>ROAS</th><th>Impressionen</th><th>CTR</th><th>CPM</th><th>Käufe</th>
          </tr></thead>
          <tbody>
            ${sorted.map(r=>`<tr>
              <td>${esc(r.ad_name||r.campaign_name||'–')}</td>
              <td>${fmtCHF(r.spend)}</td>
              <td>${fmtCHF(r.revenue)}</td>
              <td><span class="roas-badge ${roasCls(+r.roas)}">${(+r.roas||0).toFixed(2)}x</span></td>
              <td>${fmtNum(r.impressions)}</td>
              <td>${fmtPct(r.ctr)}</td>
              <td>${fmtCHF(r.cpm)}</td>
              <td>${fmtNum(r.purchases)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }
  html+=`<div class="sep"></div>
    <div style="font-size:12px;color:var(--tx2);">
      💡 <strong style="color:var(--tx);">Performance mit Claude analysieren:</strong>
      Klick auf «Export für Claude» in der Sidebar → schick mir die JSON-Datei → ich analysiere deine Ads und gib dir konkrete Empfehlungen.
    </div>`;
  document.getElementById('perf-content').innerHTML=html;
  if(metaData.length) setTimeout(()=>renderPerfCharts(sorted),50);

function renderPerfCharts(sorted){
  const top=sorted.slice(0,8);
  const labels=top.map(r=>(r.ad_name||r.campaign_name||'–').substring(0,20));
  const roasVals=top.map(r=>+(+r.roas||0).toFixed(2));
  const colors=roasVals.map(v=>v>=2.5?'rgba(127,255,71,.7)':v>=1?'rgba(245,166,35,.7)':'rgba(255,95,95,.7)');
  destroyChart('chart-roas');
  const c1=document.getElementById('chart-roas');
  if(c1)charts['chart-roas']=new Chart(c1,{type:'bar',data:{labels,datasets:[{label:'ROAS',data:roasVals,backgroundColor:colors,borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#777',font:{size:11}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#aaa',font:{size:11}},grid:{display:false}}}}});
  destroyChart('chart-spend');
  const c2=document.getElementById('chart-spend');
  if(c2)charts['chart-spend']=new Chart(c2,{type:'bar',data:{labels,datasets:[{label:'Spend',data:top.map(r=>+r.spend||0),backgroundColor:'rgba(255,95,95,.6)',borderRadius:4},{label:'Revenue',data:top.map(r=>+r.revenue||0),backgroundColor:'rgba(127,255,71,.6)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#777',font:{size:11}}}},scales:{x:{ticks:{color:'#777',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#777',font:{size:11}},grid:{color:'rgba(255,255,255,.05)'}}}}});
}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

/* META CSV PARSING */
function findCol(headers,candidates){for(const h of headers){for(const c of candidates){if(h.toLowerCase().includes(c.toLowerCase()))return h;}}return null;}
async function handleCsvFile(e){const f=e.target.files[0];if(f)await parseCsv(f);e.target.value='';}
async function handleCsvDrop(e){e.preventDefault();document.getElementById('upload-zone')?.classList.remove('drag-active');const f=e.dataTransfer.files[0];if(f)await parseCsv(f);}
async function parseCsv(file){
  return new Promise(resolve=>{
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:async(result)=>{
      const h=result.meta.fields||[];
      const get=(cands,row)=>{const col=findCol(h,cands);return col?row[col]:'';};
      const toNum=s=>{if(!s)return 0;return parseFloat(String(s).replace(/[^0-9.,-]/g,'').replace(',','.').replace("'",""))||0;};
      const toInt=s=>{if(!s)return 0;return parseInt(String(s).replace(/[^0-9]/g,''))||0;};
      const rows=result.data.map(row=>({
        ad_name:get(['ad name','anzeigenname','name der anzeige','ad set name'],row)||get(['campaign name','kampagnenname'],row)||'',
        campaign_name:get(['campaign name','kampagnenname'],row)||'',
        spend:toNum(get(['amount spent','ausgegebener betrag','spend'],row)),
        impressions:toInt(get(['impressions','impressionen'],row)),
        clicks:toInt(get(['clicks','klicks','link clicks'],row)),
        purchases:toInt(get(['purchases','käufe','results','conversions'],row)),
        revenue:toNum(get(['purchase conversion value','kaufkonversionswert','website purchase conversion','conversion value'],row)),
        roas:toNum(get(['purchase roas','kauf-roas','website purchase roas','roas'],row)),
        ctr:toNum(get(['ctr'],row)),
        cpm:toNum(get(['cpm'],row))
      })).filter(r=>r.ad_name||r.spend>0);
      if(!rows.length){showToast('❌ Keine Daten gefunden.\nSpaltennamen prüfen.');resolve();return;}
      try{
        await Promise.all(rows.map(r=>dbInsert('meta_performance',r)));
        metaData=[...metaData,...rows];
        showToast(`✓ ${rows.length} Einträge geladen!`);
        renderPerformance();
      }catch(err){showToast('❌ Fehler beim Speichern: '+err.message);}
      resolve();
    }});
  });
}
async function clearMetaData(){
  if(!confirm('Alle Meta-Daten wirklich löschen?'))return;
  await Promise.all(metaData.map(r=>dbDeleteSerial('meta_performance',r.id)));
  metaData=[];renderPerformance();showToast('✓ Daten gelöscht.');
}

/* ── FINANZEN ── */
function renderFinanzen(){
  const rev=financials.filter(f=>f.category==='revenue').reduce((s,f)=>s+(+f.amount||0),0);
  const adspend=financials.filter(f=>f.category==='adspend').reduce((s,f)=>s+(+f.amount||0),0);
  const cogs=financials.filter(f=>['cogs','shipping','other'].includes(f.category)).reduce((s,f)=>s+(+f.amount||0),0);
  const profit=rev-adspend-cogs;
  const recent=[...financials].reverse().slice(0,30);
  const catColor=id=>FIN_CATS.find(c=>c.id===id)?.color||'var(--tx2)';
  const catLabel=id=>FIN_CATS.find(c=>c.id===id)?.label||id;
  document.getElementById('fin-content').innerHTML=`
    <div class="vh"><div class="vh-title">Finanzen</div><div class="vh-sub">P&amp;L Übersicht</div></div>
    <div class="cards-row">
      <div class="card green"><div class="card-lbl">Einnahmen</div><div class="card-val">${fmtCHF(rev)}</div></div>
      <div class="card red"><div class="card-lbl">Ad Spend</div><div class="card-val">${fmtCHF(adspend)}</div></div>
      <div class="card amber"><div class="card-lbl">COGS + Sonstiges</div><div class="card-val">${fmtCHF(cogs)}</div></div>
      <div class="card ${profit>=0?'green':'red'}"><div class="card-lbl">Netto Gewinn</div><div class="card-val">${fmtCHF(profit)}</div><div class="card-sub">${profit>=0?'Im Plus 🎉':'Im Minus'}</div></div>
    </div>
    <div class="fin-grid">
      <div class="fin-left">
        <div class="fin-card">
          <div class="fin-card-title">Eintrag hinzufüege</div>
          <div class="fg"><label class="fl">Datum</label><input type="date" id="fin-date" value="${new Date().toISOString().split('T')[0]}"></div>
          <div class="fg"><label class="fl">Kategorie</label>
            <select id="fin-cat">
              ${FIN_CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}
            </select>
          </div>
          <div class="fg"><label class="fl">Betrag (CHF)</label><input type="number" id="fin-amount" placeholder="0.00" step="0.01"></div>
          <div class="fg"><label class="fl">Beschreibung</label><input type="text" id="fin-desc" placeholder="z.B. Facebook Ads KW22"></div>
          <button class="bp" onclick="addFinEntry()" style="width:100%">Hinzufüege</button>
          <div id="fin-msg"></div>
        </div>
      </div>
      <div class="fin-card" style="height:fit-content">
        <div class="fin-card-title">Letzte Einträge</div>
        <div class="fin-entry-list">
          ${recent.length?recent.map(f=>`
            <div class="fin-entry">
              <span class="fin-entry-cat" style="background:${catColor(f.category)}22;color:${catColor(f.category)}">${catLabel(f.category)}</span>
              <span class="fin-entry-desc">${esc(f.description||'–')}</span>
              <span class="fin-entry-date">${f.date||''}</span>
              <span class="fin-entry-amt" style="color:${f.category==='revenue'?'var(--green)':'var(--red)'}">${f.category==='revenue'?'+':'-'}${fmtCHF(f.amount)}</span>
              <button class="fin-entry-del" onclick="deleteFinEntry(${f.id})">✕</button>
            </div>`).join('')
          :`<div style="font-size:13px;color:var(--tx3);text-align:center;padding:20px 0;">Noch keine Einträge.</div>`}
        </div>
      </div>
    </div>`;
}
async function addFinEntry(){
  const date=document.getElementById('fin-date').value;
  const category=document.getElementById('fin-cat').value;
  const amount=parseFloat(document.getElementById('fin-amount').value);
  const description=document.getElementById('fin-desc').value.trim();
  if(!amount||isNaN(amount)){document.getElementById('fin-msg').innerHTML='<span style="color:var(--red);font-size:12px;">Betrag eingeben.</span>';return;}
  const result=await dbInsert('financials',{date,category,amount,description});
  if(result)financials.push(result[0]);
  document.getElementById('fin-msg').innerHTML='<div class="msg-ok">✓ Gespeichert!</div>';
  setTimeout(()=>renderFinanzen(),800);
}
async function deleteFinEntry(id){
  await dbDeleteSerial('financials',id);
  financials=financials.filter(f=>f.id!==id);
  renderFinanzen();
}

    <div class="settings-section">
      <div class="settings-title">Supabase Verbindung</div>

function updateConfig(){

  const key=document.getElementById('s-key').value.trim();
  localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);

}
async function reloadAll(){
  document.getElementById('loading').style.display='flex';
  await loadAll();
  document.getElementById('loading').style.display='none';
  renderSidebar();renderSettings();showToast('✓ Daten aktualisiert.');
}
async function resetAll(){
  if(!confirm('ACHTUNG: Alle Ads, Hooks, Meta-Daten und Finanzen werden gelöscht. Wirklich?'))return;
  await Promise.all([
    ...ads.map(a=>dbDelete('ads',a.id)),
    ...hooks.map(h=>dbDelete('hooks',h.id)),
    ...metaData.map(m=>dbDeleteSerial('meta_performance',m.id)),
    ...financials.map(f=>dbDeleteSerial('financials',f.id))
  ]);
  ads=[];hooks=[];metaData=[];financials=[];
  renderSidebar();renderSettings();showToast('✓ Alles gelöscht.');
}
function disconnect(){
  localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');
  location.reload();
}

/* ── EXPORT ── */
function exportData(){
  const blob=new Blob([JSON.stringify({exportDate:new Date().toLocaleDateString('de-CH'),hinweis:'Schick mir diese Datei im Chat und sag mir was du änderä wetsch!',ads,hooks,metaData,financials},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`moov_export_${new Date().toISOString().split('T')[0]}.json`});
  a.click();URL.revokeObjectURL(a.href);
  showToast('📤 Exportiert!\nSchick mir die Datei im Chat.');
}

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg.replace('\n','<br>');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── BOOT ── */
(function(){
  const url=localStorage.getItem('sb_url');
  const key=localStorage.getItem('sb_key');
  if(url&&key){initSB(url,key);startApp();}
})();
