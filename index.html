<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOOV Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#F7F7F5;--sur:#fff;--sur2:#F2F2F0;--sur3:#EAEAE8;--bd:#E8E8E6;--bds:#CECECE;--tx:#111827;--tx2:#6B7280;--tx3:#9CA3AF;--teal:#1D9E75;--teal-b:rgba(29,158,117,.3);--teal-d:rgba(29,158,117,.08);--td:rgba(29,158,117,.09);--green:#059669;--gd:#D1FAE5;--red:#DC2626;--rd:#FEE2E2;--lo-bg:#FEE2E2;--lo-c:#DC2626;--amber:#D97706;--ad:#FEF3C7;--blue:#2563EB;--bld:#DBEAFE;--shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 14px rgba(0,0,0,.09),0 2px 4px rgba(0,0,0,.05);}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
/* PASSWORD GATE */
#pw-gate{position:fixed;inset:0;background:#F7F7F5;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.pw-card{background:#fff;border:1px solid #E8E8E6;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px;width:100%;max-width:400px;text-align:center;}
.pw-logo{font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:#1D9E75;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.pw-title{font-size:18px;font-weight:700;color:#111827;margin-bottom:6px;letter-spacing:-.02em;}
.pw-sub{font-size:13px;color:#6B7280;margin-bottom:24px;}
.pw-input{width:100%;font-family:'Inter',sans-serif;font-size:16px;color:#111827;background:#F2F2F0;border:1.5px solid #E8E8E6;border-radius:10px;padding:12px 14px;outline:none;text-align:center;letter-spacing:.15em;transition:border-color .15s;margin-bottom:12px;}
.pw-input:focus{border-color:#1D9E75;background:#fff;}
.pw-btn{width:100%;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:13px;border-radius:10px;background:#1D9E75;color:#fff;border:none;cursor:pointer;transition:all .15s;}
.pw-btn:hover{background:#168a64;}
.pw-btn:disabled{opacity:0.6;cursor:not-allowed;}
.pw-err{font-size:12px;color:#DC2626;margin-top:8px;min-height:18px;}
/* APP LAYOUT */
#app{display:none;height:100vh;flex-direction:row;}
.sb{width:200px;min-width:200px;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;padding:16px 12px;overflow-y:auto;flex-shrink:0;}
.sb-logo{margin-bottom:20px;padding:0 4px;}
.sb-logo img{height:20px;filter:brightness(0);}
.sb-section{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);padding:0 8px;margin:14px 0 5px;}
.nb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);border:none;background:none;width:100%;text-align:left;transition:all .12s;}
.nb:hover{background:var(--sur2);color:var(--tx);}
.nb.on{background:var(--teal-d);color:var(--teal);font-weight:600;}
.nb-ct{font-family:'DM Mono',monospace;font-size:10px;background:var(--sur3);color:var(--tx3);border-radius:20px;padding:1px 7px;margin-left:auto;}
.nb.on .nb-ct{background:var(--teal-d);color:var(--teal);}
.sb-filters{margin-top:16px;border-top:1px solid var(--bd);padding-top:12px;opacity:.4;pointer-events:none;transition:opacity .2s;}
.sf{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--tx2);border:none;background:none;width:100%;text-align:left;}
.sf:hover{background:var(--sur2);}
.sf.on{color:var(--tx);font-weight:500;}
.sf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-overview{margin-top:auto;border-top:1px solid var(--bd);padding-top:12px;}
.ov-row{display:flex;justify-content:space-between;align-items:center;padding:3px 8px;font-size:12px;color:var(--tx2);}
.ov-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:600;}
.ov-num.w{color:var(--green);}
.ov-num.t{color:var(--amber);}
.ov-num.u{color:var(--amber);}
.ov-num.l{color:var(--red);}
.sb-export{margin-top:8px;padding:7px 10px;border-radius:8px;border:none;background:var(--teal-d);color:var(--teal);font-size:12px;font-weight:500;cursor:pointer;width:100%;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;}
.sb-export:hover{background:var(--td);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.view{flex:1;overflow-y:auto;display:none;padding:20px;}
.view.on{display:block;}
.scroll-view{height:100%;overflow-y:auto;}
#vw-pnl,#vw-lieferungen,#vw-studios{padding:0;}
#vw-pnl iframe,#vw-lieferungen iframe,#vw-studios iframe{width:100%;height:100%;border:none;}
/* CARDS */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
.stat-card.green .stat-card-val{color:var(--green);}
.stat-card.red .stat-card-val{color:var(--red);}
.stat-card.amber .stat-card-val{color:var(--amber);}
.stat-card-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:5px;}
.stat-card-val{font-size:22px;font-weight:700;letter-spacing:-.02em;color:var(--tx);}
/* KANBAN */
#kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.col-hdr{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.col-dot{width:7px;height:7px;border-radius:50%;}
.kcard{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);margin-bottom:8px;}
.kcard:hover{border-color:var(--bds);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.kcard.open{border-color:var(--teal-b);background:#FAFFFE;}
.kcard-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px;}
.kcard-type{font-size:11px;color:var(--tx3);}
.kcard-body{margin-top:10px;border-top:1px solid var(--bd);padding-top:10px;}
.kcard-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:4px;}
.kcard-text{font-size:12px;color:var(--tx2);white-space:pre-wrap;margin-bottom:8px;line-height:1.5;}
.kcard-inp{width:100%;font-family:'Inter',sans-serif;font-size:12px;color:var(--tx);background:var(--sur2);border:1px solid var(--bd);border-radius:7px;padding:6px 9px;outline:none;transition:border-color .12s;resize:vertical;}
.kcard-inp:focus{border-color:var(--teal);}
/* BUTTONS */
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 13px;border-radius:8px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--bds);color:var(--tx);}
.bsav{background:var(--teal);border-color:var(--teal);color:#fff;}
.bsav:hover{background:#168a64;border-color:#168a64;}
.bdel{color:var(--red);border-color:rgba(220,38,38,.2);background:rgba(220,38,38,.04);}
.bsm{font-size:11px;padding:4px 10px;border-radius:7px;}
/* AD STATUS FILTERS */
.sf-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
/* PERF TABLE */
.perf-table{width:100%;border-collapse:collapse;}
.perf-table th{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--bd);}
.perf-table td{font-size:12px;padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle;}
.perf-table tbody tr:hover td{background:var(--sur2);}
.roas-badge{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.roas-g{background:var(--gd);color:var(--green);}
.roas-a{background:var(--ad);color:var(--amber);}
.roas-r{background:var(--lo-bg);color:var(--lo-c);}
/* WEEK TABS */
.week-tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.week-tab{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--sur);color:var(--tx2);cursor:pointer;transition:all .13s;}
.week-tab:hover{border-color:var(--bds);color:var(--tx);}
.week-tab.on{background:var(--teal);border-color:var(--teal);color:#fff;}
.week-tab.add-tab{border-style:dashed;color:var(--teal);border-color:var(--teal-b);}
.week-tab.add-tab:hover{background:var(--teal-d);}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.chart-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.chart-title{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:10px;}
.chart-wrap{height:200px;position:relative;}
/* HOOKS */
.hook-card{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow);}
.hook-card.important{border-color:var(--teal-b);background:var(--teal-d);}
.hook-text{flex:1;font-size:13px;color:var(--tx);line-height:1.5;}
.hook-inp{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);background:transparent;border:none;outline:none;resize:none;line-height:1.5;}
/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--bd);border-radius:14px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sur);}
.upload-zone:hover,.upload-zone.drag-active{border-color:var(--teal);background:var(--teal-d);}
.upload-zone-title{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:5px;}
.upload-zone-sub{font-size:13px;color:var(--tx2);}
/* VH HEADER */
.vh{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.vh-title{font-size:20px;font-weight:700;letter-spacing:-.02em;}
.vh-sub{font-size:13px;color:var(--tx3);}
/* SETUP */
#setup{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
.setup-card{background:var(--sur);border-radius:16px;padding:32px;width:420px;box-shadow:var(--shadow-md);border:1px solid var(--bd);}
.setup-inp{width:100%;font-family:'Inter',sans-serif;font-size:13px;color:var(--tx);background:var(--sur2);border:1.5px solid var(--bd);border-radius:9px;padding:9px 12px;outline:none;margin-bottom:10px;transition:border-color .15s;}
.setup-inp:focus{border-color:var(--teal);}
/* LOADING */
#loading{display:none;align-items:center;justify-content:center;height:100vh;background:var(--bg);}
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-card">
    <div class="pw-logo">MOOV</div>
    <div class="pw-title">Portal</div>
    <div class="pw-sub">Passwort eingeben um fortzufahren</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password">
    <button class="pw-btn" id="pw-btn" onclick="checkPassword()">Einloggen</button>
    <div class="pw-err" id="pw-err"></div>
  </div>
</div>

<div id="setup">
  <div class="setup-card">
    <img src="/moov_logo.png" alt="MOOV" style="height:24px;filter:brightness(0);display:block;margin-bottom:20px;">
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Portal einrichten</div>
    <div style="font-size:13px;color:var(--tx2);margin-bottom:20px;">Verbinde dein Supabase Projekt um das Portal zu starten.</div>
    <label style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:5px;">Supabase Project URL</label>
    <input class="setup-inp" id="sb-url" placeholder="https://xxxxx.supabase.co">
    <label style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:5px;">Supabase Anon Key</label>
    <input class="setup-inp" id="sb-key" placeholder="eyJhbGciOi...">
    <button onclick="connectSB()" style="width:100%;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:12px;border-radius:10px;background:var(--teal);color:#fff;border:none;cursor:pointer;">Verbinden &#x2192;</button>
    <div style="margin-top:14px;font-size:11px;color:var(--tx3);text-align:center;">URL + Key &#x2192; <a href="https://supabase.com" target="_blank" style="color:var(--teal);">Supabase</a> &#x2192; Settings &#x2192; API &#x2192; Legacy keys</div>
  </div>
</div>

<div id="loading"><div style="font-size:14px;color:var(--tx3);">Lade...</div></div>

<div id="app">
  <div class="sb">
    <div class="sb-logo"><img src="/moov_logo.png" alt="MOOV"></div>
    <div style="font-family:'DM Mono',monospace;font-size:8px;color:var(--tx3);padding:0 4px;margin-bottom:12px;letter-spacing:.1em;">AD PORTAL</div>
    <div class="sb-section">ADS</div>
    <button class="nb" id="nb-pipeline" onclick="sw('pipeline')">&#x25A1; Pipeline</button>
    <button class="nb" id="nb-ads" onclick="sw('ads')">&#x25CF; Alle Ads <span class="nb-ct" id="ct-ads">0</span></button>
    <button class="nb" id="nb-performance" onclick="sw('performance')">&#x1F4CA; Performance</button>
    <button class="nb" id="nb-hooks" onclick="sw('hooks')">&#x1F3A3; Hooks <span class="nb-ct" id="ct-hooks">0</span></button>
    <button class="nb" id="nb-new" onclick="sw('new')">+ Neue Ad</button>
    <div class="sb-section">FINANZEN &amp; OPS</div>
    <button class="nb" id="nb-pnl" onclick="sw('pnl')">&#x1F4C8; P&amp;L Tracker</button>
    <button class="nb" id="nb-lieferungen" onclick="sw('lieferungen')">&#x1F4E6; Lieferungen</button>
    <button class="nb" id="nb-studios" onclick="sw('studios')">&#x1F3EA; Studios</button>
    <div id="sb-filters" class="sb-filters">
      <div class="sb-section" style="margin-top:0;">STATUS FILTER</div>
    </div>
    <div class="sb-overview">
      <div class="sb-section" style="margin-top:0;">ÜBERSICHT</div>
      <div class="ov-row"><span>Winner</span><span class="ov-num w" id="ov-w">0</span></div>
      <div class="ov-row"><span>Testen</span><span class="ov-num t" id="ov-t">0</span></div>
      <div class="ov-row"><span>Aufnehmen</span><span class="ov-num u" id="ov-u">0</span></div>
      <div class="ov-row"><span>Loser</span><span class="ov-num l" id="ov-l">0</span></div>
      <button class="sb-export" onclick="exportForClaude()">&#x2B; Export f&#xFC;r Claude</button>
      <button class="nb" id="nb-settings" onclick="sw('settings')" style="margin-top:4px;">&#x2699; Einstellungen</button>
    </div>
  </div>
  <div class="main">
    <div class="view on" id="vw-pipeline"><div class="scroll-view"><div id="kanban"></div></div></div>
    <div class="view" id="vw-ads"><div class="scroll-view" id="ads-list"></div></div>
    <div class="view" id="vw-performance"><div class="scroll-view"><div id="perf-content"></div></div></div>
    <div class="view" id="vw-hooks"><div class="scroll-view" id="hooks-list"></div></div>
    <div class="view" id="vw-new"><div class="scroll-view" id="new-form"></div></div>
    <div class="view" id="vw-pnl"><iframe src="/moov_pnl.html" id="pnl-iframe"></iframe></div>
    <div class="view" id="vw-lieferungen"><iframe src="/moov_lieferungen.html" id="lief-iframe"></iframe></div>
    <div class="view" id="vw-studios"><iframe src="/moov_studios.html" id="studios-iframe"></iframe></div>
    <div class="view" id="vw-settings"><div class="scroll-view" id="settings-content"></div></div>
  </div>
</div>

<script>
/* ── CONSTANTS ── */
const ST=[
  {id:'skript',   label:'Skripten',  cls:'csk',color:'#6B7280',pipe:false},
  {id:'aufnehmen',label:'Aufnehmen', cls:'cau',color:'#F59E0B',pipe:true},
  {id:'schneiden',label:'Schneiden', cls:'csc',color:'#8B5CF6',pipe:true},
  {id:'testen',   label:'Testen',    cls:'cte',color:'#3B82F6',pipe:true},
  {id:'winner',   label:'Winner ⭐', cls:'cwi',color:'#10B981',pipe:true},
  {id:'loser',    label:'Loser ✗',  cls:'clo',color:'#EF4444',pipe:false}
];
const COLS=[
  {id:'skript',  label:'Skripten',  color:'#6B7280'},
  {id:'aufnehmen',label:'Aufnehmen',color:'#F59E0B'},
  {id:'schneiden',label:'Schneiden',color:'#8B5CF6'},
  {id:'testen',  label:'Testen',    color:'#3B82F6'},
  {id:'winner',  label:'Winner ⭐', color:'#10B981'},
  {id:'loser',   label:'Loser ✗',  color:'#EF4444'}
];
const charts={};
let sb=null,ads=[],hooks=[],metaData=[],financials=[];
let curTab='pipeline',openAdId=null,dragId=null,curAdFilter='all';
let hkFilter='all', editingHookId=null, showArchived=false;
window.selectedKW='';

/* ── SUPABASE ── */
function initSB(url,key){
  sb=supabase.createClient(url,key);
}
async function dbGet(table){
  const{data,error}=await sb.from(table).select('*');
  if(error)throw error;
  return data||[];
}
async function dbInsert(table,row){
  const{data,error}=await sb.from(table).insert(row).select();
  if(error)throw error;
  return data;
}
async function dbUpdate(table,id,row){
  const{error}=await sb.from(table).update(row).eq('id',id);
  if(error)throw error;
}
async function dbDelSerial(table,id){
  const{error}=await sb.from(table).delete().eq('id',id);
  if(error)throw error;
}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtCHF(n){return'CHF '+(+n||0).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtNum(n){return(+n||0).toLocaleString('de-CH');}
function roasCls(r){return r>=2.5?'roas-g':r>=1?'roas-a':'roas-r';}

/* ── NAV ── */
function sw(t){
  curTab=t;
  const normalViews=['pipeline','ads','performance','hooks','new','settings'];
  const iframeViews=['pnl','lieferungen','studios'];
  normalViews.forEach(x=>{const el=document.getElementById('vw-'+x);if(el)el.classList.toggle('on',x===t);});
  iframeViews.forEach(x=>{const el=document.getElementById('vw-'+x);if(el)el.classList.toggle('on',x===t);});
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('nb-'+t);if(btn)btn.classList.add('on');
  const isAds=t==='ads';
  document.getElementById('sb-filters').style.opacity=isAds?'1':'0.4';
  document.getElementById('sb-filters').style.pointerEvents=isAds?'auto':'none';
  if(t==='pipeline')renderPipeline();
  else if(t==='ads')renderAds();
  else if(t==='performance'){var old=document.getElementById('perf-modal');if(old)old.remove();renderPerformance();}
  else if(t==='hooks')renderHooks();
  else if(t==='new')renderNewAd();
  else if(t==='settings')renderSettings();
}

/* ── LOAD ── */
async function loadAll(){
  [ads,hooks,metaData,financials]=await Promise.all([
    dbGet('ads'),dbGet('hooks'),
    dbGet('meta_performance').catch(()=>[]),
    dbGet('financials').catch(()=>[])
  ]);
}

/* ── PIPELINE ── */
function renderPipeline(){
  const pipe=ads.filter(a=>COLS.find(c=>c.id===a.status&&c.id!=='skript'&&c.id!=='loser')||['aufnehmen','schneiden','testen','winner'].includes(a.status));
  const colsToShow=COLS.filter(c=>['aufnehmen','schneiden','testen','winner','loser'].includes(c.id));
  let h='<div id="kanban" style="display:grid;grid-template-columns:repeat('+colsToShow.length+',1fr);gap:12px;padding:20px;">';
  colsToShow.forEach(col=>{
    const colAds=ads.filter(a=>a.status===col.id);

function getUploadKW(){
  const kw=parseInt(document.getElementById('upload-kw')?.value)||1;

async function handleKWFile(e){const f=e.target.files[0];if(f){const kw=getUploadKW();await parseCsvWithKW(f,kw);}e.target.value='';}
async function handleKWDrop(e){e.preventDefault();document.getElementById('kw-drop-zone')?.classList.remove('drag-active');const f=e.dataTransfer.files[0];if(f){const kw=getUploadKW();await parseCsvWithKW(f,kw);}}

function findCol(headers,candidates){
  for(const c of candidates){for(const h of headers){if(h.toLowerCase()===c.toLowerCase())return h;}}
  for(const c of candidates){for(const h of headers){if(h.toLowerCase().startsWith(c.toLowerCase()))return h;}}
  for(const c of candidates){for(const h of headers){if(h.toLowerCase().includes(c.toLowerCase()))return h;}}
  return null;
}

async function parseCsvWithKW(file,kw){
  const zone=document.getElementById('kw-drop-zone');
  if(zone)zone.innerHTML='<div class="upload-zone-title">\u23f3 Verarbeite...</div>';
  return new Promise(resolve=>{
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:async(result)=>{
      const h=result.meta.fields||[];
      const get=(cands,row)=>{const col=findCol(h,cands);return col?row[col]:'';};
      const toNum=s=>parseFloat(String(s||0).replace(/[^0-9.,-]/g,'').replace(',','.').replace("'",""))||0;
      const toInt=s=>parseInt(String(s||0).replace(/[^0-9]/g,''))||0;
      const rows=result.data.map(row=>{
        const sp=toNum(get(['ausgegebener betrag (chf)','amount spent','ausgegebener betrag'],row));
        const ro=toNum(get(['roas (return on ad spend)','roas f\u00fcr k\u00e4ufe','purchase roas','kauf-roas'],row));
        let rv=toNum(get(['purchase conversion value','kaufkonversionswert'],row));
        if(rv===0&&ro>0&&sp>0)rv=Math.round(ro*sp*100)/100;
        return{ad_name:get(['name der anzeige','ad name','anzeigenname'],row)||get(['campaign name','kampagnenname'],row)||'',
          campaign_name:get(['campaign name','kampagnenname'],row)||'',kw:kw,
          spend:sp,impressions:toInt(get(['impressionen','impressions'],row)),
          clicks:toInt(get(['link-klicks','clicks','klicks'],row)),
          purchases:toInt(get(['k\u00e4ufe','purchases','results'],row)),
          revenue:rv,roas:ro,
          ctr:toNum(get(['ctr (link-klickrate)','ctr'],row)),
          cpm:toNum(get(['cpm (kosten','cpm'],row))};
      }).filter(r=>r.ad_name||r.spend>0);
      if(!rows.length){if(zone)zone.innerHTML='<div class="upload-zone-title">\u274c Keine Daten</div>';resolve();return;}
      try{
        if(kw){
          const existing=metaData.filter(m=>m.kw===kw);
          if(existing.length){await Promise.all(existing.map(m=>dbDelSerial('meta_performance',m.id)));metaData=metaData.filter(m=>m.kw!==kw);}
        }
        const saved=await Promise.all(rows.map(r=>dbInsert('meta_performance',r)));
        saved.forEach(res=>{if(res&&res[0])metaData.push(res[0]);});
        window.selectedKW=kw||getWeeks().slice(-1)[0];
        document.getElementById('perf-modal')?.remove();
        renderPerformance();
      }catch(err){if(zone)zone.innerHTML='<div class="upload-zone-title">\u274c Fehler: '+esc(err.message)+'</div>';}
      resolve();
    }});
  });
}
async function clearMetaData(){if(!confirm('Alle Meta-Daten l\u00f6schen?'))return;await Promise.all(metaData.map(m=>dbDelSerial('meta_performance',m.id)));metaData=[];window.selectedKW='';renderPerformance();}

function roasCls(r){return r>=2.5?'roas-g':r>=1?'roas-a':'roas-r';}
function renderPerfCharts(sorted,weeks){
  const top=sorted.slice(0,10);
  const labels=top.map(r=>(r.ad_name||'\u2013').substring(0,20));
  const rv=top.map(r=>+(+r.roas||0).toFixed(2));
  const colors=rv.map(v=>v>=2.5?'rgba(5,150,105,.7)':v>=1?'rgba(217,119,6,.7)':'rgba(220,38,38,.7)');
  const destroy=id=>{if(charts[id]){charts[id].destroy();delete charts[id];}};
  const baseOpt={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},color:'#6B7280'}}},scales:{x:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{color:'#9CA3AF',font:{size:11}},grid:{color:'rgba(0,0,0,.06)'}}}};
  destroy('chart-roas');const c1=document.getElementById('chart-roas');
  if(c1)charts['chart-roas']=new Chart(c1,{type:'bar',data:{labels,datasets:[{label:'ROAS',data:rv,backgroundColor:colors,borderRadius:4}]},options:{...baseOpt,indexAxis:'y',plugins:{legend:{display:false}}}});
  destroy('chart-spend');const c2=document.getElementById('chart-spend');
  if(c2)charts['chart-spend']=new Chart(c2,{type:'bar',data:{labels,datasets:[{label:'Spend',data:top.map(r=>+r.spend||0),backgroundColor:'rgba(220,38,38,.6)',borderRadius:4},{label:'Revenue',data:top.map(r=>+r.revenue||0),backgroundColor:'rgba(5,150,105,.6)',borderRadius:4}]},options:baseOpt});
  if(!weeks||weeks.length<=1)return;
  const allAdNames=[...new Set(metaData.map(r=>r.ad_name).filter(Boolean))];
  const topAds=allAdNames.map(name=>{const d=metaData.filter(r=>r.ad_name===name);return{name,avgRoas:d.reduce((s,r)=>s+(+r.roas||0),0)/d.length,totalSpend:d.reduce((s,r)=>s+(+r.spend||0),0)};}).sort((a,b)=>b.totalSpend-a.totalSpend).slice(0,5);
  const trendColors=['#1D9E75','#2563EB','#7C3AED','#D97706','#DC2626'];
  destroy('chart-trend');const c3=document.getElementById('chart-trend');
  if(c3)charts['chart-trend']=new Chart(c3,{type:'line',data:{labels:weeks,datasets:topAds.map((ad,i)=>({label:ad.name,data:weeks.map(w=>{const rows=metaData.filter(r=>r.kw===w&&r.ad_name===ad.name);return rows.length?+(rows.reduce((s,r)=>s+(+r.roas||0),0)/rows.length).toFixed(2):null;}),borderColor:trendColors[i],tension:0.3,fill:false,pointRadius:5,spanGaps:true}))},options:baseOpt});
  destroy('chart-wk-spend');const c4=document.getElementById('chart-wk-spend');
  if(c4)charts['chart-wk-spend']=new Chart(c4,{type:'bar',data:{labels:weeks,datasets:[{label:'Spend',data:weeks.map(w=>metaData.filter(r=>r.kw===w).reduce((s,r)=>s+(+r.spend||0),0)),backgroundColor:'rgba(220,38,38,.6)',borderRadius:4},{label:'Revenue',data:weeks.map(w=>metaData.filter(r=>r.kw===w).reduce((s,r)=>s+(+r.revenue||0),0)),backgroundColor:'rgba(5,150,105,.6)',borderRadius:4}]},options:baseOpt});
  destroy('chart-wk-roas');const c5=document.getElementById('chart-wk-roas');
  if(c5){const wkRoas=weeks.map(w=>{const d=metaData.filter(r=>r.kw===w&&(+r.spend||0)>0);const sp=d.reduce((s,r)=>s+(+r.spend||0),0);const rv=d.reduce((s,r)=>s+(+r.revenue||0),0);return sp>0?+(rv/sp).toFixed(2):0;});charts['chart-wk-roas']=new Chart(c5,{type:'bar',data:{labels:weeks,datasets:[{label:'ROAS \u00d8',data:wkRoas,backgroundColor:wkRoas.map(v=>v>=2.5?'rgba(5,150,105,.7)':v>=1?'rgba(217,119,6,.7)':'rgba(220,38,38,.7)'),borderRadius:4}]},options:{...baseOpt,plugins:{legend:{display:false}}}});}
}

/* ── HOOKS ── */
function renderHooks(){
  document.getElementById('ct-hooks').textContent=hooks.filter(h=>!h.archived).length;
  const filtered=hooks.filter(h=>showArchived?h.archived:!h.archived);
  let h=`<div style="padding:20px"><div class="vh"><div class="vh-title">Hooks</div><div class="vh-sub">${filtered.length} Hooks</div>
    <button class="btn bsav bsm" onclick="addHook()">+ Hook</button>
    <button class="btn bsm" onclick="showArchived=!showArchived;renderHooks()">${showArchived?'Aktive':'Archiv'}</button>
  </div>`;
  filtered.forEach(hk=>{
    const isEdit=editingHookId===hk.id;
    h+=`<div class="hook-card${hk.important?' important':''}">
      <div style="flex:1">
        ${isEdit?`<textarea class="hook-inp" rows="3" id="edit-${hk.id}">${esc(hk.text||'')}</textarea>`:`<div class="hook-text">${esc(hk.text||'')}</div>`}
        ${hk.video_url?`<a href="${esc(hk.video_url)}" target="_blank" style="font-size:11px;color:var(--teal)">&#x1F3AC; Video</a>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn bsm" onclick="toggleImportant('${hk.id}')" title="${hk.important?'Wichtig':'Normal'}">&#x2B50;</button>
        <button class="btn bsm" onclick="editHook('${hk.id}')">${isEdit?'&#x2713;':'&#x270F;'}</button>
        <button class="btn bsm" onclick="archiveHook('${hk.id}')" title="Archivieren">&#x1F4C1;</button>
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('hooks-list').innerHTML=h;
}
async function addHook(){
  const text=prompt('Hook Text:');if(!text)return;
  const row={text,selected:false,important:false,archived:false,video_url:''};
  const data=await dbInsert('hooks',row);
  if(data&&data[0])hooks.unshift(data[0]);
  renderHooks();
}
function editHook(id){
  if(editingHookId===id){
    const hk=hooks.find(h=>h.id===id);
    const el=document.getElementById('edit-'+id);
    if(hk&&el){hk.text=el.value;dbUpdate('hooks',id,{text:hk.text});}
    editingHookId=null;
  }else{editingHookId=id;}
  renderHooks();
}
async function toggleImportant(id){const hk=hooks.find(h=>h.id===id);if(!hk)return;hk.important=!hk.important;await dbUpdate('hooks',id,{important:hk.important});renderHooks();}
async function archiveHook(id){const hk=hooks.find(h=>h.id===id);if(!hk)return;hk.archived=!hk.archived;await dbUpdate('hooks',id,{archived:hk.archived});renderHooks();}

/* ── SETTINGS ── */

  document.getElementById('settings-content').innerHTML=`<div style="padding:20px;max-width:500px">
    <div class="vh"><div class="vh-title">Einstellungen</div></div>
    <div style="background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:18px;box-shadow:var(--shadow)">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Supabase</div>
      <div style="margin-bottom:10px"><label style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:4px">Project URL</label>
      <input id="cfg-url" class="setup-inp" value="${esc(localStorage.getItem('sb_url')||'')}"></div>
      <div style="margin-bottom:14px"><label style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);display:block;margin-bottom:4px">Anon Key</label>
      <input id="cfg-key" class="setup-inp" value="${esc(localStorage.getItem('sb_key')||'')}"></div>

function saveSettings(){
  localStorage.setItem('sb_url',document.getElementById('cfg-url').value);
  localStorage.setItem('sb_key',document.getElementById('cfg-key').value);
  location.reload();
}
function logout(){localStorage.removeItem('sb_url');localStorage.removeItem('sb_key');location.reload();}

/* ── SIDEBAR ── */
function renderSidebar(){
  document.getElementById('ct-ads').textContent=ads.length;
  document.getElementById('ct-hooks').textContent=hooks.filter(h=>!h.archived).length;
  document.getElementById('ov-w').textContent=ads.filter(a=>a.status==='winner').length;
  document.getElementById('ov-t').textContent=ads.filter(a=>a.status==='testen').length;
  document.getElementById('ov-u').textContent=ads.filter(a=>a.status==='aufnehmen').length;

/* ── EXPORT ── */
function exportForClaude(){
  const data={exportDate:new Date().toLocaleDateString('de-CH'),hinweis:'Schick mir diese Datei im Chat und sag mir was du \u00e4ndern m\u00f6chtest!',ads,hooks,metaData,financials};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='moov_export_'+new Date().toISOString().split('T')[0]+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

/* ── SUPABASE SETUP ── */
function connectSB(){
  const url=document.getElementById('sb-url').value.trim();
  const key=document.getElementById('sb-key').value.trim();
  if(!url||!key){alert('URL und Key eingeben');return;}
  localStorage.setItem('sb_url',url);localStorage.setItem('sb_key',key);
  initSB(url,key);startApp();
}
async function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('app').style.display='none';
  try{
    await loadAll();
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='flex';
    renderSidebar();sw('pipeline');
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('setup').style.display='flex';
    alert('Verbindungsfehler: '+e.message);
  }
}

/* ── PASSWORD GATE ── */
(function(){
  var PW_KEY='moov_auth_v1';
  var LOCK_KEY='moov_lockout';
  var ATTEMPTS_KEY='moov_attempts';
  var VALID_HASH='71127895370ed7dc283b83efcd93cf2e9d537b1c6377cafccd8c94bc12ce24de';
  var MAX_ATTEMPTS=3;
  var LOCKOUT_MS=15*60*1000;
  var countdownInterval=null;

  async function hashPassword(pw){
    var enc=new TextEncoder().encode(pw+'moov_salt_2026');
    var buf=await crypto.subtle.digest('SHA-256',enc);
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }
  function getAttempts(){try{return parseInt(localStorage.getItem(ATTEMPTS_KEY)||'0');}catch(e){return 0;}}
  function setAttempts(n){try{localStorage.setItem(ATTEMPTS_KEY,String(n));}catch(e){}}
  function getLockout(){try{return parseInt(localStorage.getItem(LOCK_KEY)||'0');}catch(e){return 0;}}
  function setLockout(ts){try{localStorage.setItem(LOCK_KEY,String(ts));}catch(e){}}
  function isLockedOut(){return getLockout()>Date.now();}
  function formatCountdown(ms){var s=Math.ceil(ms/1000),m=Math.floor(s/60);s=s%60;return m+':'+(s<10?'0':'')+s;}
  function isAuthed(){try{return sessionStorage.getItem(PW_KEY)==='authenticated';}catch(e){return false;}}

  function showLockout(){
    var inp=document.getElementById('pw-input');
    var btn=document.getElementById('pw-btn');
    var err=document.getElementById('pw-err');
    if(inp)inp.disabled=true;
    if(btn){btn.disabled=true;btn.textContent='Gesperrt';btn.style.background='#DC2626';}
    if(countdownInterval)clearInterval(countdownInterval);
    function tick(){
      var rem=Math.max(0,getLockout()-Date.now());
      if(rem<=0){
        clearInterval(countdownInterval);
        if(inp){inp.disabled=false;inp.value='';inp.focus();}
        if(btn){btn.disabled=false;btn.textContent='Einloggen';btn.style.background='';}
        if(err)err.textContent='';
        setAttempts(0);return;
      }
      if(err)err.textContent='Gesperrt fuer '+formatCountdown(rem)+' (zu viele Fehlversuche)';
    }
    tick();countdownInterval=setInterval(tick,1000);
  }

  function hideGate(){
    var gate=document.getElementById('pw-gate');
    if(gate){gate.style.opacity='0';gate.style.transition='opacity .3s';setTimeout(function(){gate.style.display='none';},300);}
  }

  window.checkPassword=async function(){
    if(isLockedOut()){showLockout();return;}
    var inp=document.getElementById('pw-input');
    var err=document.getElementById('pw-err');
    var btn=document.getElementById('pw-btn');
    var pw=inp?inp.value:'';if(!pw)return;
    if(btn){btn.textContent='...';btn.disabled=true;}
    var hash=await hashPassword(pw);
    if(hash===VALID_HASH){
      setAttempts(0);setLockout(0);
      try{sessionStorage.setItem(PW_KEY,'authenticated');}catch(e){}
      hideGate();
    }else{
      var attempts=getAttempts()+1;setAttempts(attempts);
      var remaining=MAX_ATTEMPTS-attempts;
      if(attempts>=MAX_ATTEMPTS){
        setLockout(Date.now()+LOCKOUT_MS);setAttempts(0);showLockout();
      }else{
        if(err)err.textContent='Falsches Passwort \u2013 noch '+remaining+' Versuch'+(remaining===1?'':'e');
        if(inp){inp.value='';inp.focus();inp.style.borderColor='#DC2626';setTimeout(function(){if(inp)inp.style.borderColor='';},1500);}
        if(btn){btn.textContent='Einloggen';btn.disabled=false;}
      }
    }
  };

  window.addEventListener('keydown',function(e){
    var gate=document.getElementById('pw-gate');
    if(e.key==='Enter'&&gate&&gate.style.display!=='none')checkPassword();
  });

  if(!isAuthed()){
    var gate=document.getElementById('pw-gate');
    if(gate)gate.style.display='flex';
    if(isLockedOut()){showLockout();}
    else{setTimeout(function(){var inp=document.getElementById('pw-input');if(inp)inp.focus();},100);}
  }else{
    var gate=document.getElementById('pw-gate');
    if(gate)gate.style.display='none';
  }
})();

(function(){
  const url=localStorage.getItem('sb_url');
  const key=localStorage.getItem('sb_key');
  if(url&&key){initSB(url,key);startApp();}
})();
